sonar.projectKey=Priivacy-ai_spec-kitty
sonar.organization=priivacy-ai

sonar.sources=src
sonar.tests=tests
sonar.python.version=3.11

sonar.python.coverage.reportPaths=out/reports/coverage/coverage.xml
sonar.python.xunit.reportPath=out/reports/xunit-reports/xunit-result.xml

sonar.exclusions=**/__pycache__/**,**/*.pyc,**/migrations/**

# ---------------------------------------------------------------------------
# Rule-level ignores
# ---------------------------------------------------------------------------
# S2208 (wildcard import) on deprecation shims under specify_cli.{next,runtime}.
# These shims exist only to re-export the full public surface of the canonical
# runtime.* modules for backwards compatibility; `from X import *` is the
# correct 1:1 proxy. Shims are tracked in architecture/2.x/shim-registry.yaml
# and scheduled for removal in 3.4.0 — the suppression is time-boxed.
sonar.issue.ignore.multicriteria=shimwildcard
sonar.issue.ignore.multicriteria.shimwildcard.ruleKey=python:S2208
sonar.issue.ignore.multicriteria.shimwildcard.resourceKey=src/specify_cli/{next,runtime}/**/*.py
