sonar.projectKey=Priivacy-ai_spec-kitty
sonar.organization=priivacy-ai

sonar.sources=src
sonar.tests=tests
sonar.python.version=3.11

sonar.python.coverage.reportPaths=out/reports/coverage/coverage.xml
sonar.python.xunit.reportPath=out/reports/xunit-reports/xunit-result.xml

sonar.exclusions=**/__pycache__/**,**/*.pyc,**/migrations/**

# sonar.coverage.exclusions: coverage-only denominator fix (FR-012, GC-6).
# These files remain in Sonar's issue analysis (duplication/hotspots/
# maintainability) — they are only excluded from the coverage percentage.
# - **/static/** : dashboard JS/CSS (e.g. dashboard.js ~720 lines);
#   non-Python and untestable by pytest --cov.
# - **/__main__.py : thin CLI entrypoints.
#
# NOTE: src/specify_cli/migration/** is deliberately NOT excluded. It is a
# live, imported, tested package (~5.6k LOC, ~19 runtime importers, ~135 test
# functions), NOT one-shot glue — excluding it would drop covered+tested lines
# from the denominator to shed an uncovered remainder, which games the gate.
# Any 0%-covered one-shot entrypoints inside it are real coverage debt to
# surface, not hide. (The genuine run-once upgrade glue lives in
# src/specify_cli/upgrade/migrations/** and is already covered by the plural
# **/migrations/** entry in sonar.exclusions above.)
sonar.coverage.exclusions=**/static/**,**/__main__.py
