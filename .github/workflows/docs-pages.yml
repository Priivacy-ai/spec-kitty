name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [ main, 2.x ]
    paths:
      - 'docs/**'
      - 'kitty-specs/**'
      - '.kittify/glossaries/**'
      - 'scripts/docs/generate_kitty_specs_docs.py'
      - 'scripts/docs/seo_postprocess.py'
      - 'scripts/docs/glossary_linker.py'
      - 'scripts/docs/redirect_stub_generator.py'
      - 'scripts/docs/redirect_map.yaml'
      - 'scripts/docs/redirect_baseline_urls.json'
      - 'src/specify_cli/dashboard/templates/glossary.html'
      - '.github/workflows/docs-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  # Allow only one concurrent Pages deployment, but do NOT cancel an in-progress
  # one — cancelling a run mid-deploy leaves the Pages backend with a half-synced
  # deployment, and the next push then collides with "Deployment failed, try again
  # later". This matches GitHub's recommended Pages pattern (let production
  # deployments complete). Queued runs between the in-progress and latest are
  # still skipped by the group, so only the newest waiting deploy runs.
  cancel-in-progress: false

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for git info

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Build documentation
        run: |
          python3 scripts/docs/generate_kitty_specs_docs.py
          cd docs
          docfx docfx.json
          cd ..
          python3 scripts/docs/seo_postprocess.py

      # Auto-link the first mention of every glossary term on each rendered
      # page to its anchor on the glossary page (FR-011, NFR-004). Pure HTML
      # post-processing on the DocFX render output, so it must run after
      # `docfx docfx.json` — placed alongside seo_postprocess.py and before
      # redirect-stub generation so stub pages never get glossary links
      # injected. See scripts/docs/glossary_linker.py's module docstring.
      - name: Auto-link glossary terms (FR-011)
        run: python3 scripts/docs/glossary_linker.py --site-dir docs/_site

      # DocFX/GitHub Pages has no native redirect (FR-006). Inject a
      # <meta http-equiv="refresh"> stub at every moved old URL into the built
      # _site BEFORE upload, so no bookmarked URL 404s post-fold. The redirect
      # map is single-writer (WP07-owned), derived from occurrence_map.yaml
      # `moves:`. Runs after `Build documentation` (which emits docs/_site) and
      # before `Upload artifact`. Fails the job if any stub would point at a 404.
      - name: Inject redirect stubs into _site (FR-006)
        run: python3 scripts/docs/redirect_stub_generator.py generate --site-dir docs/_site

      # NFR-002 gate: assert every URL in WP02's committed pre-move baseline
      # resolves directly or via a live-target stub (uncovered == []). The check
      # is non-vacuous — it refuses to pass against an empty baseline.
      - name: Verify redirect coverage (NFR-002)
        run: python3 scripts/docs/redirect_stub_generator.py coverage --site-dir docs/_site

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_site

  deploy:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
