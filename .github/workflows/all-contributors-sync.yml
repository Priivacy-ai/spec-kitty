name: Sync All Contributors

on:
  schedule:
    - cron: '23 3 * * 1'
  workflow_dispatch:

concurrency:
  group: all-contributors-sync
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install contributor tooling
        run: npm ci

      - name: Sync All Contributors metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIVATE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/sync_all_contributors.py \
            --repo "${{ github.repository }}" \
            --config .all-contributorsrc \
            --contribution code \
            --deny-regex '(?:^|[-_])(claude|codex)(?:$|[-_])'

      - name: Create or update contributor sync PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/all-contributors-sync
          base: main
          delete-branch: true
          title: 'chore: sync all-contributors'
          commit-message: 'chore: sync all-contributors'
          body: |
            Automated contributor sync from repository activity.

            This PR was generated by `.github/workflows/all-contributors-sync.yml` and
            `scripts/sync_all_contributors.py`.

            Sources:
            - GitHub contributors API
            - Merged PR authors

            Filters:
            - Excludes bot accounts
            - Excludes usernames matching `claude|codex`
