# .github/workflows/ui-e2e.yml
#
# Playwright dashboard e2e gate — spec-kitty repo.
# Mission playwright-ui-e2e-bootstrap-01KWX72W (closes #1008).
#
# Runs the ONE representative kanban->modal Playwright regression test in
# tests/ui/ headless, with the Chromium browser installed and cached, so a
# change that reintroduces the #970 class of bug (the dashboard's WP-card
# click-through modal silently drops the agent identity) reds this check
# instead of shipping green under 338+ passing backend/architectural tests
# that never exercise the browser render (FR-002/FR-006 of the mission).
#
# Deliberately its OWN standalone workflow file — not a job appended to
# ci-quality.yml — so it never joins that workflow's dorny/paths-filter +
# quality-gate aggregator machinery (tests/architectural/_gate_coverage.py,
# ci_topology_census.json), which is keyed to src/specify_cli/* worklist
# dirs, not to tests/ui/ or the dashboard's rendered DOM. This mirrors
# .github/workflows/drift-detector.yml: one scoped job, one test, its own
# browser install — bounded CI cost (NFR-001), not a dependency bloating
# every unrelated shard.
#
# Required-check contract (mirrors drift-detector.yml): the single job named
# `ui-e2e` below is what branch protection should require. It runs on every
# PR/push to the branches listed regardless; a repo admin must add "ui-e2e"
# to the required-status-checks list for `main` under
# Settings -> Branches -> main -> Require status checks to pass before
# merging for a red result to actually block merge (same one-time admin
# step this repo already relies on for drift-detector — see that file's
# header and kitty-specs/identity-boundary-ci-gate-rerun-01KS51YK/contracts/
# check-names.md for precedent).
#
# See docs/development/ui-e2e.md for how to boot the synthetic dashboard
# fixture locally and add another e2e test to this suite.
#
# Coverage feed (FR-013, mission ci-test-topology-performance-01KXBJRT WP08):
# this job now emits Python coverage for src/specify_cli/dashboard/** (the
# server-side code Playwright drives) and uploads it as ui-e2e-coverage-
# reports. Deliberate scope decisions, both documented rather than silently
# left broken:
#
#   - FR-013a (Python, T023): the artifact is produced and uploaded, but
#     ci-quality.yml's sonarcloud job today only discovers artifacts from
#     its OWN workflow run (see that file's `download-artifact@v8` steps,
#     including the `prev_run` fallback scoped to
#     `workflow_id: 'ci-quality.yml'`) — a same-run pattern that cannot see
#     an artifact uploaded by this separate ui-e2e.yml workflow run. Wiring
#     a ui-e2e.yml-scoped download-artifact step into the sonarcloud job is
#     tracked as a fast-follow through ci-quality.yml's own owner (WP06);
#     it is out of this file's scope. Until that lands, coverage-ui-e2e.xml
#     is available for local/manual Sonar runs and for the future wiring,
#     but is NOT YET part of the automated Sonar-consumed coverage.xml set.
#
#   - FR-013b (JS, T024): dashboard.js (~720 lines) has no JS coverage
#     collection wired here. Spiking Playwright's CDP coverage API
#     (page.coverage.startJSCoverage/stopJSCoverage) or an nyc/istanbul
#     instrumented-serve step into an lcov report consumable via
#     sonar.javascript.lcov.reportPaths was judged out of budget for this
#     job's timeout-minutes: 15 within this mission. DEFERRED: the interim
#     mitigation is sonar-project.properties' sonar.coverage.exclusions
#     entry for **/static/** (WP07), which removes dashboard.js from the
#     coverage denominator instead of crediting it with real coverage. A
#     follow-up mission may wire real JS coverage; sonar-project.properties
#     is WP07's owned surface and is not edited from this file.

name: ui-e2e

on:
  pull_request:
    branches: [main, develop, 2.x]
  push:
    branches: [main, develop, 2.x]

concurrency:
  group: ui-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ui-e2e:
    name: ui-e2e
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.12'

      - name: Install dependencies (frozen)
        run: uv sync --frozen --extra test

      # Browser binaries are never committed (C-003); this cache just saves
      # re-downloading the ~150MB Chromium binary on every run so the job
      # stays bounded (NFR-001). Keyed on uv.lock so a playwright/pytest-
      # playwright version bump busts the cache instead of silently reusing
      # a stale browser.
      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      # --with-deps installs the OS packages Chromium needs via apt
      # (ubuntu-latest has passwordless sudo). On a cache hit this only
      # re-verifies the OS deps — it does not re-download the browser.
      - name: Install Playwright Chromium (cached, --with-deps)
        run: uv run playwright install --with-deps chromium

      - name: Create coverage output directory
        run: mkdir -p out/reports/coverage

      # Headless (NFR-002): tests/conftest.py hardcodes PWHEADLESS=1 for
      # every test process already; passing it explicitly here matches the
      # documented local-run command byte-for-byte (docs/development/ui-e2e.md).
      #
      # --cov is scoped to src/specify_cli/dashboard only (FR-013a) — the
      # server-side package Playwright actually drives through the browser.
      # Do not widen this scope: a broader --cov would double-credit code
      # already covered by other ci-quality.yml jobs and risks masking a
      # real coverage drop elsewhere (see this file's header comment for
      # the cross-workflow consumption gap this artifact does not yet close).
      - name: Run the dashboard e2e regression guard (headless)
        run: |
          PWHEADLESS=1 uv run pytest tests/ui/ \
            --cov=src/specify_cli/dashboard \
            --cov-report=xml:out/reports/coverage/coverage-ui-e2e.xml \
            -q

      - name: Upload ui-e2e coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-e2e-coverage-reports
          path: out/reports/coverage/coverage-ui-e2e.xml
          if-no-files-found: warn
