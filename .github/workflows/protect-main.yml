name: Protect Main Branch

# Required-checks contract (FR-010 of mission
# shared-package-boundary-cutover-01KQ22DS):
#
# This workflow only enforces "no direct push to main" via post-hoc commit
# inspection. The actual required-status-checks list is configured via
# GitHub branch protection rules at:
#   Settings -> Branches -> Branch protection rules -> main
#                                                   -> Required status checks
#
# The following checks MUST be in that list (in addition to whatever was
# there before this mission):
#
#   - clean-install-verification  (job in .github/workflows/ci-quality.yml)
#
# When this workflow file is updated, a maintainer with admin access on the
# repo MUST also add 'clean-install-verification' to the required-checks
# list. The CLAUDE.md / docs/migrations/shared-package-boundary-cutover.md
# guide owns the runbook for that change.

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-merge-compliance:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Verify commit came from PR
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          HEAD_COMMITTER_NAME: ${{ github.event.head_commit.committer.name }}
        run: |
          # Skip check for repository initialization (first commit)
          if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            echo "✅ Initial commit detected, skipping merge compliance check"
            exit 0
          fi

          # Get commit message and metadata
          COMMIT_MSG="$HEAD_COMMIT_MESSAGE"
          COMMIT_SUBJECT="${COMMIT_MSG%%$'\n'*}"
          COMMITTER="$HEAD_COMMITTER_NAME"

          echo "Commit subject: $COMMIT_SUBJECT"
          echo "Commit message: $COMMIT_MSG"
          echo "Committer: $COMMITTER"

          # Check if this is a merge commit from a PR
          # Valid patterns:
          # 1. "Merge pull request #..." (GitHub merge commits)
          # 2. Commits from "GitHub" or "github-actions[bot]" (automated merges)
          # 3. Tag pushes (handled by release workflow, not direct commits)

          if [[ "$COMMIT_SUBJECT" =~ ^Merge\ pull\ request\ #[0-9]+ ]] || \
             [[ "$COMMITTER" == "GitHub" ]] || \
             [[ "$COMMITTER" == "github-actions[bot]" ]]; then
            echo "✅ Commit is from an approved PR merge or automated process"
            exit 0
          fi

          # Check if this is a squash/rebase merge. GitHub appends the PR
          # number as an end-of-subject suffix; issue references in prose do
          # not count as PR merge evidence.
          if [[ "$COMMIT_SUBJECT" =~ \(#[0-9]+\)$ ]]; then
            echo "✅ Commit is from a squash/rebase merge (PR reference suffix)"
            exit 0
          fi

          # Check if this is a spec-kitty mission merge
          # spec-kitty merge produces squash commits whose message references the
          # mission branch (kitty/mission-NNN-slug) or records mission state
          # transitions. These are the authorised automated merge path for this repo.
          if [[ "$COMMIT_SUBJECT" =~ kitty/mission- ]] || \
             [[ "$COMMIT_SUBJECT" =~ ^chore\([0-9]+-.*\):\ (record done|review feedback|Move WP|Start WP|Mark|WP.*claimed|planning artifact) ]] || \
             [[ "$COMMIT_SUBJECT" =~ ^chore:\ (review feedback|planning artifacts) ]]; then
            echo "✅ Commit is from spec-kitty mission merge workflow"
            exit 0
          fi

          # Release commits are allowed only when the pushed commit is already
          # tagged with the matching release tag. This keeps release publication
          # explicit while preventing untagged version/changelog commits from
          # bypassing the normal PR or mission merge paths.
          if [[ "$COMMIT_SUBJECT" =~ ^Release\ spec-kitty\ ([0-9]+\.[0-9]+\.[0-9]+((a|b|rc)[0-9]+)?)$ ]]; then
            RELEASE_VERSION="${BASH_REMATCH[1]}"
            RELEASE_TAG="v${RELEASE_VERSION}"
            git fetch --force --depth=1 origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}" || true

            if git tag --points-at HEAD | grep -Fxq "$RELEASE_TAG"; then
              echo "✅ Commit is a tagged spec-kitty release commit (${RELEASE_TAG})"
              exit 0
            fi

            echo "::error::Release commit message found, but HEAD is not tagged with ${RELEASE_TAG}."
            echo "::error::Release commits must be pushed with their matching annotated tag."
            exit 1
          fi

          # If we get here, this appears to be a direct push
          echo "::error::❌ Direct push to main branch detected!"
          echo "::error::"
          echo "::error::All changes to main must go through a pull request."
          echo "::error::"
          echo "::error::To fix this:"
          echo "::error::1. Create a feature branch from the commit before this one"
          echo "::error::2. Cherry-pick or reapply your changes to that branch"
          echo "::error::3. Open a pull request for review"
          echo "::error::"
          echo "::error::To prevent this in the future:"
          echo "::error::1. Enable branch protection rules for main:"
          echo "::error::   - Go to Settings > Branches > Add rule"
          echo "::error::   - Enable 'Require pull request reviews before merging'"
          echo "::error::   - Enable 'Require status checks to pass before merging'"
          echo "::error::"
          echo "::error::📖 See: RELEASE_CHECKLIST.md for the complete workflow"

          # Add to job summary
          {
            echo "# ❌ Direct Push Detected"
            echo ""
            echo "This commit was pushed directly to \`main\` without going through a pull request."
            echo ""
            echo "## Required Action"
            echo ""
            echo "All changes to \`main\` must be reviewed via pull requests."
            echo ""
            echo "### How to Fix"
            echo ""
            echo "1. **Revert this commit** (if it hasn't been deployed):"
            echo "   \`\`\`bash"
            echo "   git revert HEAD"
            echo "   git push origin main"
            echo "   \`\`\`"
            echo ""
            echo "2. **Create a feature branch**:"
            echo "   \`\`\`bash"
            echo "   git checkout -b fix/proper-pr-workflow"
            echo "   git cherry-pick <this-commit-sha>"
            echo "   git push origin fix/proper-pr-workflow"
            echo "   \`\`\`"
            echo ""
            echo "3. **Open a pull request** for review"
            echo ""
            echo "### Prevent Future Issues"
            echo ""
            echo "Enable branch protection rules:"
            echo "- Go to **Settings > Branches > Add rule**"
            echo "- Branch name pattern: \`main\`"
            echo "- Enable **\"Require pull request reviews before merging\"**"
            echo "- Enable **\"Require status checks to pass before merging\"**"
            echo "- Select **release-readiness** as a required check"
            echo ""
            echo "## Reference"
            echo ""
            echo "📖 [Release Checklist](https://github.com/${{ github.repository }}/blob/main/RELEASE_CHECKLIST.md)"
          } >> $GITHUB_STEP_SUMMARY

          exit 1
