# JSON Schema (in YAML) for per-WP occurrence-classification artifacts.
# Applies to kitty-specs/<mission_slug>/occurrences/WP1.<n>.yaml
# Plan reference: D-5 in plan.md
# Spec requirement: FR-015

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "spec-kitty://phase1-excision/occurrence-artifact/v1"
title: Occurrence-Classification Artifact (per-WP)
type: object
required:
  - wp_id
  - mission_slug
  - requires_merged
  - categories
  - permitted_exceptions
  - verifier_command
additionalProperties: false
properties:
  wp_id:
    type: string
    pattern: "^WP1\\.[1-3]$"
    description: Work-package identifier.
  mission_slug:
    type: string
    const: "excise-doctrine-curation-and-inline-references-01KP54J6"
  requires_merged:
    type: array
    items:
      type: string
      pattern: "^WP1\\.[1-3]$"
    description: Preceding WP IDs that must be merged to main before this WP's verifier is allowed to pass.
  categories:
    type: array
    minItems: 1
    items:
      $ref: "#/$defs/OccurrenceCategory"
  permitted_exceptions:
    type: array
    items:
      $ref: "#/$defs/PermittedException"
  verifier_command:
    type: string
    description: >
      Shell command to invoke the verifier for this artifact.
      Canonical: `python scripts/verify_occurrences.py kitty-specs/<slug>/occurrences/<wp_id>.yaml`.

$defs:
  OccurrenceCategory:
    type: object
    required:
      - name
      - strings
      - include_globs
      - exclude_globs
      - expected_final_count
      - to_change
    additionalProperties: false
    properties:
      name:
        type: string
        enum:
          - import_path
          - symbol_name
          - yaml_key
          - filesystem_path_literal
          - cli_command_name
          - docstring_or_comment
          - template_reference
          - test_identifier
      strings:
        type: array
        minItems: 1
        items:
          type: string
      include_globs:
        type: array
        items:
          type: string
        description: Repo-root-relative glob patterns in scope for this category.
      exclude_globs:
        type: array
        items:
          type: string
      expected_final_count:
        type: integer
        minimum: 0
        description: Number of hits that should remain at WP completion. Almost always 0.
      to_change:
        type: array
        items:
          $ref: "#/$defs/FileHit"

  FileHit:
    type: object
    required:
      - file
      - line
      - snippet
      - action
    additionalProperties: false
    properties:
      file:
        type: string
        description: Repo-root-relative path.
      line:
        type: integer
        minimum: 1
      snippet:
        type: string
        description: The matched text for the category's strings.
      action:
        type: string
        enum: [delete, replace, rewrite]
        description: What the WP does to this occurrence.

  PermittedException:
    type: object
    required:
      - pattern
      - reason
      - owner_wp
    additionalProperties: false
    properties:
      pattern:
        type: string
        description: Glob or literal path/string the verifier must ignore.
      reason:
        type: string
      owner_wp:
        type: string
        pattern: "^WP1\\.[1-3]$"
