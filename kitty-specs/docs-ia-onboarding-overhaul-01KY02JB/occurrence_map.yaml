      WP03 renamed your-first-feature.md -> your-first-mission.md (Terminology
      Canon: Mission, not Feature). Collapses the pre-existing
      tutorials/ -> guides/ hop and this rename's hop into the final
      destination so the redirect stub is not dead.
  - from: ["docs/how-to", "docs/tutorials"]
