  # --- WP01 override (docs-ia-onboarding-overhaul-01KY02JB): 3 baseline URLs
  # that resolve through the pre-existing "docs/how-to" -> "docs/guides" bucket
  # move below now need a SECOND hop to "docs/development" (their WP01
  # destination). The generator resolves a baseline URL through the FIRST
  # matching `moves:` entry only (no multi-hop chaining), so this exact-path
  # override MUST be listed before the generic bucket move to win the match —
  # otherwise these 3 baseline URLs would resolve one hop short, to a dead
  # `guides/*.html` stub instead of their true `development/*.html` home.
  - from:
