      already resolved one hop to guides/*.html via the bucket move below;
      WP01 relocated them a second hop to development/*.html (contributor-only
      content misplaced in the end-user zone, FR-003). This override collapses
      both hops into the final destination so the redirect stub is not dead.
  # --- WP03 override (docs-ia-onboarding-overhaul-01KY02JB, mission-review
  # finding F2): same two-hop shape as the WP01 override above, for a file
  # WP01 didn't own. The baseline URL "tutorials/your-first-feature.html"
  # already resolves one hop to "guides/your-first-feature.html" via the
  # generic bucket move below; WP03 renamed it (FR-014, Terminology Canon)
  # a second hop to "guides/your-first-mission.html". Must be listed before
  # the generic bucket move to win the first-match resolution.
  - from:
