# DIRECTIVE_035 occurrence map — relationship-field retirement (hard cutover, FR-028).
# change_mode == bulk_edit. The gate validates this map for EVERY WP, but only WP06
# (code field removal) and WP07 (built-in YAML → DRG-fragment migration) actually touch
# the target term; all other WPs pass trivially (their diffs contain no target occurrences).
#
# THREE-PASS PLAN (the gate is single-target; the loader reads one map, so the retirement
# runs as three sequential gated passes, rewriting `target.term` between passes):
#   Pass 1: target.term = "enhances"          (this file as committed)
#   Pass 2: rewrite target.term = "overrides"
#   Pass 3: rewrite target.term = "specializes_from"
# Each pass: run the WP06/WP07 edits for that key, then the gate's diff-check confirms no
# changed file still contains the retired key unclassified. The DRG `Relation` ENUM string
# values (still "enhances"/"overrides"/"specializes_from") are KEPT — only the per-artifact
# FIELDS are removed; relationships are re-authored as DRG-fragment edges.

target:
  term: "enhances"
  operation: remove
  replacement: null

categories:

  code_symbols:
    action: manual_review
    notes: >
      Remove the `enhances` model field from Tactic/Styleguide/Paradigm/Procedure
      (and, in passes 2-3, `overrides` from those + `specializes_from`/`overrides` from
      the agent-profile schema). Delete dead readers and re-point augmentation emission
      to fragments. KEEP the Relation enum members and the auto-emit/validator logic.
      Per-occurrence decision: DELETE the field declaration + its readers.

  import_paths:
    action: do_not_change
    notes: >
      No module path is renamed by the field retirement. (The merge_three_layers
      relocation in WP03 is a separate, non-bulk code move.)

  filesystem_paths:
    action: do_not_change
    notes: >
      No files renamed/deleted; artifact YAML is edited in place (see serialized_keys).

  serialized_keys:
    action: manual_review
    notes: >
      Remove the `enhances:` key from every built-in/shipped artifact YAML (passes 2-3:
      `overrides:`, `specializes_from:`) and re-author the equivalent relationship as a
      DRG-fragment edge in graph.yaml. Per-occurrence decision: REMOVE_KEY_MIGRATE_TO_EDGE.
      Zero-loss: each removed key => exactly one merged DRG edge (WP07 NFR-007 test).
    # --- AS EXECUTED (WP07) -------------------------------------------------
    # Discovery (grep of built-in artifact YAML, not assumed counts): the ONLY
    # field-authored relationships in shipped doctrine are 4 agent-profile
    # `specializes-from:` keys. No built-in tactic/styleguide/paradigm/procedure
    # carries `enhances:`/`overrides:` values (those appear only in schemas +
    # Pydantic models, owned by WP06).
    as_executed:
      additive_migration_done:  # edges added to src/doctrine/graph.yaml
        - source: agent_profile:python-pedro
          target: agent_profile:implementer-ivan
          relation: specializes_from
        - source: agent_profile:java-jenny
          target: agent_profile:implementer-ivan
          relation: specializes_from
        - source: agent_profile:node-norris
          target: agent_profile:implementer-ivan
          relation: specializes_from
        - source: agent_profile:frontend-freddy
          target: agent_profile:implementer-ivan
          relation: specializes_from
      key_removal_deferred:
        files:
          - src/doctrine/agent_profiles/built-in/python-pedro.agent.yaml
          - src/doctrine/agent_profiles/built-in/java-jenny.agent.yaml
          - src/doctrine/agent_profiles/built-in/node-norris.agent.yaml
          - src/doctrine/agent_profiles/built-in/frontend-freddy.agent.yaml
        decision: KEEP_FIELD_UNTIL_WP05_RESOLVER_MIGRATION
        reason: >
          The `specializes-from:` FIELD is still the live authority for the agent-profile
          inheritance RESOLVER (`src/doctrine/agent_profiles/repository.py`
          resolve_profile/get_ancestors). Migrating that resolver to read the DRG
          `specializes_from` edge is owned by WP05 (per WP06's own note: "the lineage
          resolver migrates in WP05"). WP05 is NOT a declared dependency of WP07 and is
          absent from this integration base. Removing the field value now makes
          get_ancestors() return [] (verified empirically) — a silent inheritance
          regression, NOT zero-loss. The additive DRG edge above makes the graph the
          authoritative source today; physical field removal lands with WP05+WP06.

  cli_commands:
    action: do_not_change
    notes: >
      No CLI command names change; behavior changes (field now rejected) but the command
      surface strings are unchanged.

  user_facing_strings:
    action: manual_review
    notes: >
      Update authoring docs + the new schema validation error text to describe DRG-fragment
      edge authoring instead of the retired fields. Historical #1291 mission artifacts under
      kitty-specs/charter-ux-and-org-pack-vocabulary-01KSAF14/ are KEEP (do not rewrite history).

  tests_fixtures:
    action: manual_review
    notes: >
      Field-acceptance tests flip to field-rejection (negative) tests; relationship-behavior
      tests migrate fixtures to fragment edges. Add the legacy-field-pack negative fixture and
      the zero-loss migration test.
    # --- AS EXECUTED (WP07) -------------------------------------------------
    as_executed:
      added:
        - tests/doctrine/test_relationship_migration.py  # zero-loss (NFR-007) + fixture validation
        - tests/doctrine/_relationship_graph.py          # empty-built-in helper for fixture merges
        - tests/doctrine/fixtures/relationship_packs/README.md
        - tests/doctrine/fixtures/relationship_packs/lineage-pack/drg/fragment.yaml          # Scenario 1
        - tests/doctrine/fixtures/relationship_packs/augment-all-kinds-pack/drg/fragment.yaml # Scenario 10
        - tests/doctrine/fixtures/relationship_packs/legacy-field-pack/drg/fragment.yaml      # negative pack
        - tests/doctrine/fixtures/relationship_packs/legacy-field-pack/profiles/legacy-specialist.agent.yaml  # WP06 rejection target
      notes: >
        The zero-loss test DISCOVERS the field-authored baseline by grepping built-in
        artifact YAML (no hardcoded count) and asserts each maps to exactly one merged
        DRG edge. Scenario-10 mission_type augmentation is asserted at the fragment
        (authoring) level: the `doctrine.drg.merge` plural->singular bridge does not yet
        map `mission_types` (owned by the DRG merge/parity WPs, not WP07), so the merge
        assertion covers the bridge-supported subset.

  logs_telemetry:
    action: manual_review
    notes: >
      Reword any warning/advisory text that references the field form (e.g. the override
      advisory keyed on the field) to the fragment-edge model. No telemetry event keys renamed.

exceptions:
- path: kitty-specs/charter-ux-and-org-pack-vocabulary-01KSAF14
  reason: Historical #1291 mission artifacts documenting the original field-based vocabulary; preserved, not rewritten.
