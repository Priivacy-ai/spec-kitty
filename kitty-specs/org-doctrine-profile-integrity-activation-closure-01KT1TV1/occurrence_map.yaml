# DIRECTIVE_035 occurrence map — relationship-field retirement (hard cutover, FR-028).
# change_mode == bulk_edit. The gate validates this map for EVERY WP, but only WP06
# (code field removal) and WP07 (built-in YAML → DRG-fragment migration) actually touch
# the target term; all other WPs pass trivially (their diffs contain no target occurrences).
#
# THREE-PASS PLAN (the gate is single-target; the loader reads one map, so the retirement
# runs as three sequential gated passes, rewriting `target.term` between passes):
#   Pass 1: target.term = "enhances"          (this file as committed)
#   Pass 2: rewrite target.term = "overrides"
#   Pass 3: rewrite target.term = "specializes_from"
# Each pass: run the WP06/WP07 edits for that key, then the gate's diff-check confirms no
# changed file still contains the retired key unclassified. The DRG `Relation` ENUM string
# values (still "enhances"/"overrides"/"specializes_from") are KEPT — only the per-artifact
# FIELDS are removed; relationships are re-authored as DRG-fragment edges.

target:
  term: "enhances"
  operation: remove
  replacement: null

categories:

  code_symbols:
    action: manual_review
    notes: >
      Remove the `enhances` model field from Tactic/Styleguide/Paradigm/Procedure
      (and, in passes 2-3, `overrides` from those + `specializes_from`/`overrides` from
      the agent-profile schema). Delete dead readers and re-point augmentation emission
      to fragments. KEEP the Relation enum members and the auto-emit/validator logic.
      Per-occurrence decision: DELETE the field declaration + its readers.

  import_paths:
    action: do_not_change
    notes: >
      No module path is renamed by the field retirement. (The merge_three_layers
      relocation in WP03 is a separate, non-bulk code move.)

  filesystem_paths:
    action: do_not_change
    notes: >
      No files renamed/deleted; artifact YAML is edited in place (see serialized_keys).

  serialized_keys:
    action: manual_review
    notes: >
      Remove the `enhances:` key from every built-in/shipped artifact YAML (passes 2-3:
      `overrides:`, `specializes_from:`) and re-author the equivalent relationship as a
      DRG-fragment edge in graph.yaml. Per-occurrence decision: REMOVE_KEY_MIGRATE_TO_EDGE.
      Zero-loss: each removed key => exactly one merged DRG edge (WP07 NFR-007 test).

  cli_commands:
    action: do_not_change
    notes: >
      No CLI command names change; behavior changes (field now rejected) but the command
      surface strings are unchanged.

  user_facing_strings:
    action: manual_review
    notes: >
      Update authoring docs + the new schema validation error text to describe DRG-fragment
      edge authoring instead of the retired fields. Historical #1291 mission artifacts under
      kitty-specs/charter-ux-and-org-pack-vocabulary-01KSAF14/ are KEEP (do not rewrite history).

  tests_fixtures:
    action: manual_review
    notes: >
      Field-acceptance tests flip to field-rejection (negative) tests; relationship-behavior
      tests migrate fixtures to fragment edges. Add the legacy-field-pack negative fixture and
      the zero-loss migration test.

  logs_telemetry:
    action: manual_review
    notes: >
      Reword any warning/advisory text that references the field form (e.g. the override
      advisory keyed on the field) to the fragment-edge model. No telemetry event keys renamed.

exceptions:
- path: kitty-specs/charter-ux-and-org-pack-vocabulary-01KSAF14
  reason: Historical #1291 mission artifacts documenting the original field-based vocabulary; preserved, not rewritten.
