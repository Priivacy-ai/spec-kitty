  details: "- **F5 — Review-artifact frontmatter schema is strict + undocumented at the point of use. [STILL BITES]**\n  A
    hand-written `review-cycle-N.md` (plain-markdown feedback) → `move-task --to approved` fails with\n  `has no parseable
    review verdict`. The gate (`_get_wp_review_verdict`) needs YAML frontmatter\n  (`review_cycle` / `verdict: approved|rejected`
    / `reviewer` / …). The `--review-feedback-file` (reject)\n  path does NOT stamp this frontmatter, so the reviewer authors
    it by hand. Two schemas coexist in-tree\n  (older `work_package_id`/`changes_requested` vs current `cycle_number`/`approved|rejected`)."
