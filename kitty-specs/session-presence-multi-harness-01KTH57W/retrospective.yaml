gaps:
- id: g-001
  category: review_quality
  summary: C-005 violation shipped past WP review — Phase 2 migration iterated WRITER_REGISTRY instead of config.yaml
  details: >
    The mission-review catch: m_3_3_0_session_presence_all_harnesses._iter_pending() iterated all keys
    in WRITER_REGISTRY regardless of .kittify/config.yaml. This means running the migration on a project
    whose disk had harness directories not in config would write orientation to unconfigured agents —
    a direct violation of C-005. The defect was in scope of WP06 and its test suite, yet shipped through
    WP review undetected. Root cause: no test exercised the "disk dir present, config absent" case.
    Fixed post-merge in commit 9226887ec.
- id: g-002
  category: review_quality
  summary: FR-006 background-subprocess-on-fresh-cache violated — always-fire pattern in manager._build_content()
  details: >
    FR-006 states session-start must not spawn a background network call when the version cache is fresh.
    The implementation called check_in_background() unconditionally before get_available_version().
    The correct order is to check the cache first; only fire background refresh when cache is absent.
    This was not caught by WP03 review or the Phase 1 test suite. Fixed post-merge (9226887ec).
- id: g-003
  category: review_quality
  summary: RISK-3 off-by-one in _remove_section/_replace_section — assumes trailing newline always present
  details: >
    Both helpers in markdown_rules.py used `end += len(SECTION_CLOSE) + 1` which unconditionally
    consumed a byte past the closing marker. If the file ends without a trailing newline, this eats the
    first byte of post-section content. Found by mission review adversarial pass; no test exercised the
    no-trailing-newline edge case. Fixed post-merge (9226887ec).
- id: g-004
  category: tooling
  summary: spec-kitty merge baking step fails when mission coord worktree is under .worktrees/ (gitignored)
  details: >
    _bake_mission_number_into_mission_branch runs git add on a path relative to the main repo that goes
    through .worktrees/, which is listed in .gitignore. The command always fails with exit status 1.
    All 6 lanes merged cleanly; only mission number assignment is blocked. Tracked as issue #1767.
    Workaround: manually advance WPs to done and sync done events from worktree to main checkout.
