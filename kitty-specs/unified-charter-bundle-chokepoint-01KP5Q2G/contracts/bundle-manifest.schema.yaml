# JSON Schema (draft-7) for CharterBundleManifest
#
# Authoritative contract consumed by src/charter/bundle.py, the migration at
# src/specify_cli/upgrade/migrations/m_3_2_3_unified_bundle.py, and by
# tests/charter/test_bundle_contract.py.
#
# Schema version: 1.0.0 (D-1 / Q3=A — versioned independently of spec-kitty package).

$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://spec-kitty.dev/schemas/charter-bundle-manifest/1.0.0"
title: CharterBundleManifest
description: >
  Declares every file under .kittify/charter/ that constitutes the unified
  governance bundle, their tracked-vs-derived classification, derivation
  sources, and required .gitignore entries. The chokepoint (
  ensure_charter_bundle_fresh) uses this manifest as the authority for "what
  files must exist" during the completeness check.
type: object
additionalProperties: false
required:
  - schema_version
  - tracked_files
  - derived_files
  - derivation_sources
  - gitignore_required_entries
properties:
  schema_version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
    description: >
      Semver of the manifest schema itself. Bumped only when the manifest
      shape changes in a way that requires a new migration. Independent of
      the spec-kitty package version.
    examples:
      - "1.0.0"
  tracked_files:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      description: Path relative to the project root. Must exist and be git-tracked.
    description: >
      Every file the bundle requires to be committed to version control.
      For v1.0.0: [".kittify/charter/charter.md"].
  derived_files:
    type: array
    uniqueItems: true
    items:
      type: string
      description: Path relative to the project root. Regenerated by sync(); must be gitignored.
    description: >
      Every file the sync step produces. No file may appear in both
      tracked_files and derived_files.
  derivation_sources:
    type: object
    description: >
      Maps each derived file to the tracked source file it is derived from.
      Every key must appear in derived_files; every value must appear in
      tracked_files.
    additionalProperties:
      type: string
      description: Path of a tracked source file.
  gitignore_required_entries:
    type: array
    uniqueItems: true
    items:
      type: string
      description: >
        Exact-match string that must appear on its own line in the project
        .gitignore for the derived files to be correctly ignored.
    description: >
      The strings happen to be glob patterns because .gitignore interprets
      them as such; the manifest treats them as opaque exact-match strings.

# Example payload — the v1.0.0 CANONICAL_MANIFEST:
#
# schema_version: "1.0.0"
# tracked_files:
#   - ".kittify/charter/charter.md"
# derived_files:
#   - ".kittify/charter/governance.yaml"
#   - ".kittify/charter/directives.yaml"
#   - ".kittify/charter/metadata.yaml"
#   - ".kittify/charter/references.yaml"
#   - ".kittify/charter/context-state.json"
# derivation_sources:
#   ".kittify/charter/governance.yaml":     ".kittify/charter/charter.md"
#   ".kittify/charter/directives.yaml":     ".kittify/charter/charter.md"
#   ".kittify/charter/metadata.yaml":       ".kittify/charter/charter.md"
#   ".kittify/charter/references.yaml":     ".kittify/charter/charter.md"
#   ".kittify/charter/context-state.json":  ".kittify/charter/charter.md"
# gitignore_required_entries:
#   - ".kittify/charter/context-state.json"
#   - ".kittify/charter/directives.yaml"
#   - ".kittify/charter/governance.yaml"
#   - ".kittify/charter/metadata.yaml"
#   - ".kittify/charter/references.yaml"
