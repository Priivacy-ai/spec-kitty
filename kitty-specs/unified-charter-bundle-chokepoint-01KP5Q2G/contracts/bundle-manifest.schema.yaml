# JSON Schema (draft-7) for CharterBundleManifest
#
# Authoritative contract consumed by src/charter/bundle.py, the migration at
# src/specify_cli/upgrade/migrations/m_3_2_3_unified_bundle.py, and by
# tests/charter/test_bundle_contract.py.
#
# Schema version: 1.0.0 (D-1 / Q3=A — versioned independently of spec-kitty package).
#
# v1.0.0 scope (narrowed after design-review 2026-04-14):
#   The manifest v1.0.0 declares ONLY the files that src/charter/sync.py
#   materializes today: governance.yaml, directives.yaml, metadata.yaml.
#   (These are listed in src/charter/sync.py:32-36 as _SYNC_OUTPUT_FILES.)
#
#   references.yaml is produced by src/charter/compiler.py :: write_compiled_charter
#   — a separate pipeline invoked by `spec-kitty charter generate`, NOT by sync().
#
#   context-state.json is written lazily by src/charter/context.py ::
#   build_charter_context() as runtime state, NOT by sync().
#
#   Both are out of v1.0.0 scope by design. Expanding the manifest to cover them
#   requires a corresponding change to the chokepoint's completeness contract
#   and is deferred to a later tranche. The project .gitignore may continue to
#   list them; the manifest's gitignore_required_entries is a "must include"
#   set, not an exclusive "only these" set.

$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://spec-kitty.dev/schemas/charter-bundle-manifest/1.0.0"
title: CharterBundleManifest
description: >
  Declares the files under .kittify/charter/ that src/charter/sync.py
  materializes, their tracked-vs-derived classification, derivation sources,
  and required .gitignore entries. The chokepoint (ensure_charter_bundle_fresh)
  uses this manifest as the authority for "what files must exist" during the
  completeness check. v1.0.0 scope is limited to the sync-produced artifacts.
type: object
additionalProperties: false
required:
  - schema_version
  - tracked_files
  - derived_files
  - derivation_sources
  - gitignore_required_entries
properties:
  schema_version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
    description: >
      Semver of the manifest schema itself. Bumped only when the manifest
      shape or scope changes in a way that requires a new migration.
      Independent of the spec-kitty package version.
    examples:
      - "1.0.0"
  tracked_files:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      description: Path relative to the project root. Must exist and be git-tracked.
    description: >
      Every file the bundle requires to be committed to version control.
      For v1.0.0: [".kittify/charter/charter.md"].
  derived_files:
    type: array
    uniqueItems: true
    items:
      type: string
      description: Path relative to the project root. Regenerated by sync(); must be gitignored.
    description: >
      Every file that src/charter/sync.py materializes. For v1.0.0 the set
      is exactly governance.yaml, directives.yaml, metadata.yaml.
      references.yaml and context-state.json are explicitly out of scope
      (they are produced by different pipelines).
  derivation_sources:
    type: object
    description: >
      Maps each derived file to the tracked source file it is derived from.
      Every key must appear in derived_files; every value must appear in
      tracked_files.
    additionalProperties:
      type: string
      description: Path of a tracked source file.
  gitignore_required_entries:
    type: array
    uniqueItems: true
    items:
      type: string
      description: >
        Exact-match string that must appear on its own line in the project
        .gitignore for the derived files to be correctly ignored. The project
        .gitignore may contain additional entries (for files outside the v1.0.0
        manifest scope, e.g. context-state.json, references.yaml); the manifest
        does not forbid those.
    description: >
      Strings that .gitignore interprets as glob patterns; the manifest treats
      them as opaque exact-match strings. This is a MUST-INCLUDE set, not an
      ONLY-THESE set.

# Example payload — the v1.0.0 CANONICAL_MANIFEST:
#
# schema_version: "1.0.0"
# tracked_files:
#   - ".kittify/charter/charter.md"
# derived_files:
#   - ".kittify/charter/governance.yaml"
#   - ".kittify/charter/directives.yaml"
#   - ".kittify/charter/metadata.yaml"
# derivation_sources:
#   ".kittify/charter/governance.yaml": ".kittify/charter/charter.md"
#   ".kittify/charter/directives.yaml": ".kittify/charter/charter.md"
#   ".kittify/charter/metadata.yaml":   ".kittify/charter/charter.md"
# gitignore_required_entries:
#   - ".kittify/charter/directives.yaml"
#   - ".kittify/charter/governance.yaml"
#   - ".kittify/charter/metadata.yaml"
