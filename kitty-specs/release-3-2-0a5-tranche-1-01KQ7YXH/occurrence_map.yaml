  logs_telemetry:
    action: manual_review
    notes: |
      Historical migration ledger notes in .kittify/metadata.yaml record
      past deletions ("Removed: .claude/commands/spec-kitty.checklist.md").
      These represent historical truth; default policy is KEEP. Implementer
      may flip to REMOVE if a documentation-history cleanup pass is
      explicitly authorized in this tranche.
