# Occurrence map — Glossary Functional Module Extraction
# Mission: 01KPDYM9H8WGXC6HH6YKEQR9Q6 (mid8: 01KPDYM9)
# Authored: 2026-04-17
# DIRECTIVE_035: this artifact is required before any cross-file import-path
# rewrites may be committed. Category actions ratified by plan phase per spec
# decisions (C-005, FR-009) and charter-extraction exemplar.

target:
  term: "specify_cli.glossary"
  replacement: "glossary"
  operation: rename

# Category actions.
#
# IMPORTANT SCOPE NOTE on code_symbols (mirrors charter exemplar wording fix):
#   `code_symbols: rename` applies ONLY to fully-qualified module-path
#   references like `specify_cli.glossary.foo.Bar` appearing in strings, dotted
#   patch targets (mock.patch("specify_cli.glossary…")), type references, or
#   docs. Local symbol names (e.g., `Strictness`, `GlossaryStore`, `resolve_term`)
#   are NOT renamed just because the owning module moved — the symbols keep
#   their names, only their package location changes.

categories:
  code_symbols:         { action: rename }                 # FQ module paths only, per note above
  import_paths:         { action: rename }                 # primary target — `from specify_cli.glossary…` → `from glossary…`
  filesystem_paths:     { action: manual_review }          # src/specify_cli/glossary/*.py files are rewritten as shims (all 15 remaining modules) or relocated (rendering.py, prompts.py → CLI adapter subpackage); the monolithic src/specify_cli/cli/commands/glossary.py file is split into src/specify_cli/cli/commands/glossary/. Every filesystem change is per-WP reviewed individually.
  serialized_keys:      { action: do_not_change }          # Glossary store YAML/JSON schema keys and event names are persistence contracts (C-001, acceptance scenario 6); nothing in the rename touches field names.
  cli_commands:         { action: do_not_change }          # per C-004, no CLI UX changes; subcommand names, flag names, and help text remain identical.
  user_facing_strings:  { action: rename_if_user_visible } # docs, help text, CHANGELOG, migration guide references to `specify_cli.glossary` update to the canonical path; internal-only log labels / error message classifications do not.
  tests_fixtures:       { action: rename }                 # test imports follow production: `from specify_cli.glossary…` → `from glossary…` across tests/agent/glossary/**, tests/doctrine/missions/test_primitives.py, tests/agent/cli/commands/test_glossary.py.
  logs_telemetry:       { action: do_not_change }          # event names (term_candidate_observed, semantic_check_evaluated, generation_blocked, step_checkpointed, clarification_requested, clarification_resolved, sense_updated, scope_activated), log labels, and metric keys remain stable so dashboards and alerting don't break.

# -------------------------------------------------------------------------
# Exceptions to category-level rules.
# -------------------------------------------------------------------------
exceptions:
  # ------ Deprecation shim surface (subject of the rename, not a target) ------
  - path: "src/specify_cli/glossary/__init__.py"
    action: rewrite_as_shim
    reason: "Package __init__.py is rewritten to emit a single DeprecationWarning (stacklevel=2), set __deprecated__=True, __canonical_import__='glossary', __removal_release__='3.3.0', __deprecation_message__, and re-export the canonical public API from `glossary.*`. This is the primary shim file per #615 rulebook and FR-006. It is NOT a rename target."

  - path: "src/specify_cli/glossary/models.py"
    action: rewrite_as_shim
    reason: "Submodule shim — silent sys.modules alias of glossary.models. Does not emit its own DeprecationWarning (avoids double-warning on `from specify_cli.glossary.models import X`). Optional informational __deprecated__/__canonical_import__ attrs set."

  - path: "src/specify_cli/glossary/exceptions.py"
    action: rewrite_as_shim
    reason: "Submodule shim — silent sys.modules alias of glossary.exceptions."

  - path: "src/specify_cli/glossary/scope.py"
    action: rewrite_as_shim
    reason: "Submodule shim — silent sys.modules alias of glossary.scope. Promoted public helpers `parse_sense_status` and `load_seed_file` are re-exported from the canonical module through the shim."

  - path: "src/specify_cli/glossary/store.py"
    action: rewrite_as_shim
    reason: "Submodule shim — silent sys.modules alias of glossary.store."

  - path: "src/specify_cli/glossary/resolution.py"
    action: rewrite_as_shim
    reason: "Submodule shim — silent sys.modules alias of glossary.resolution."

  - path: "src/specify_cli/glossary/extraction.py"
    action: rewrite_as_shim
    reason: "Submodule shim — silent sys.modules alias of glossary.extraction."

  - path: "src/specify_cli/glossary/conflict.py"
    action: rewrite_as_shim
    reason: "Submodule shim — silent sys.modules alias of glossary.conflict."

  - path: "src/specify_cli/glossary/middleware.py"
    action: rewrite_as_shim
    reason: "Submodule shim — silent sys.modules alias of glossary.middleware (the semantic integrity middleware, FR-002)."

  - path: "src/specify_cli/glossary/strictness.py"
    action: rewrite_as_shim
    reason: "Submodule shim — silent sys.modules alias of glossary.strictness. Docstring `>>>` examples at lines 135 and 187 that currently reference `specify_cli.glossary.models` are rewritten to the canonical `glossary.models` path during shim conversion."

  - path: "src/specify_cli/glossary/checkpoint.py"
    action: rewrite_as_shim
    reason: "Submodule shim — silent sys.modules alias of glossary.checkpoint."

  - path: "src/specify_cli/glossary/clarification.py"
    action: rewrite_as_shim
    reason: "Submodule shim — silent sys.modules alias of glossary.clarification."

  - path: "src/specify_cli/glossary/events.py"
    action: rewrite_as_shim
    reason: "Submodule shim — silent sys.modules alias of glossary.events."

  - path: "src/specify_cli/glossary/pipeline.py"
    action: rewrite_as_shim
    reason: "Submodule shim — silent sys.modules alias of glossary.pipeline."

  - path: "src/specify_cli/glossary/attachment.py"
    action: rewrite_as_shim
    reason: "Submodule shim — silent sys.modules alias of glossary.attachment."

  # ------ Modules that LIFT to the CLI adapter layer (not shimmed) ------
  - path: "src/specify_cli/glossary/rendering.py"
    action: relocate_to_cli_adapter
    reason: "File imports `rich.console.Console`, `rich.panel.Panel`, `rich.table.Table` directly. Per FR-003, FR-004, and C-007, rendering/presentation code does NOT live under `src/glossary/`. The file relocates to `src/specify_cli/cli/commands/glossary/rendering.py` in the adapter layer. No shim is published for this module because it is not part of the canonical public API — it was always a CLI-layer concern mis-filed under the integrity package. External callers (if any) get an ImportError after the move, which is the desired outcome per FR-013: any discovered external caller is listed in the PR with a rationale or a follow-up tracker."

  - path: "src/specify_cli/glossary/prompts.py"
    action: relocate_to_cli_adapter
    reason: "File imports `typer` directly. Per FR-004 and C-007, Typer prompts do NOT live under `src/glossary/`. The file relocates to `src/specify_cli/cli/commands/glossary/prompts.py` in the adapter layer. No shim is published — same rationale as rendering.py."

  # ------ CLI adapter monolithic file → subpackage split ------
  - path: "src/specify_cli/cli/commands/glossary.py"
    action: split_into_subpackage
    reason: "Existing 700-LOC monolithic CLI file is split into `src/specify_cli/cli/commands/glossary/{__init__.py, commands.py, rendering.py, prompts.py}`. The old file is REMOVED. Imports that consumed private `specify_cli.glossary.scope._parse_sense_status` and `specify_cli.glossary.scope.load_seed_file` are rewritten to the promoted public `glossary.scope.parse_sense_status` and `glossary.scope.load_seed_file` (R-007)."

  # ------ Migration documentation (teaches the rename) ------
  - path: "docs/migration/glossary-extraction.md"
    action: do_not_change
    reason: "The migration guide deliberately quotes the deprecated path `specify_cli.glossary` to teach the rename. Auto-rewrites must not touch it."

