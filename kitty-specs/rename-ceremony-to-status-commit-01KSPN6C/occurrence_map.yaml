        paired_with: cs-001

  cli_commands:
    description: >
      CLI command/subcommand/flag/option names containing the forbidden terms.
    action: do_not_change
    notes: |
      No CLI command, subcommand, flag, or option is named "ceremony" or
      "status-writing". The proposed flag `vcs.allow_ceremony_commits_on_target_branch`
      exists only in the F-09 findings doc (handled under
      user_facing_strings → Rule R6) — it is not a live CLI surface.

  user_facing_strings:
