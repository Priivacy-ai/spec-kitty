        replacement: 'assert p.id == "mission-merge-workflow"'
        sense: workflow_sense
        rule: R2+R4
        paired_with: sk-001
      - id: sk-003
        file: tests/e2e/conftest.py
        line: 25
        source: '"e2e-ceremony"'
        replacement: '"e2e-status-commit"'
