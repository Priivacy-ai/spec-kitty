# Bulk-edit occurrence map — "ceremony" / "status-writing" → "status commit"
#
# Mission: rename-ceremony-to-status-commit-01KSPN6C
# Change mode: bulk_edit (declared in meta.json)
# Source: GitHub Issue #1325
# Spec: FR-001 through FR-014
#
# Valid action vocabulary (enforced by the bulk-edit gate):
#   - rename                  : straight rename of the literal token
#   - rename_if_user_visible  : rename only when occurrence is on a public surface
#   - manual_review           : implementer must inspect and decide per occurrence
#   - do_not_change           : preserve as-is (out of scope or N/A)
#
# This mission renames TWO related legacy terms to a single canonical replacement.
# `target` captures the primary term per the schema; `target.secondary_terms`
# enumerates additional forbidden terms covered by the same canonical replacement.

schema_version: "1.0"
mission: rename-ceremony-to-status-commit-01KSPN6C

target:
  term: "ceremony"
  operation: rename
  replacement: "status commit"
  secondary_terms:
    - term: "status-writing"
      operation: rename
      replacement: "status commit"
      rationale: |
        A prior partial rename of `commit_helpers.py` substituted "ceremony" with
        "status-writing" rather than the canonical "status commit". This mission
        reconciles both legacy terms to a single canonical form.
  scope_notes: |
    Targets every active-source occurrence of "ceremony" or "status-writing" in
    `src/`, `tests/`, and `docs/`. Two sense-classifications apply:
      - commit_class (mechanical substitution to "status commit"): occurrences
        that refer to the auto-commit class.
      - workflow_sense (semantic rewrite per decision 01KSPP3SSZ5GKHTTB1C9EJQ13V):
        occurrences where "ceremony" means "the multi-phase mission workflow",
        not a single commit. Mechanical substitution to "status commit" would
        produce nonsense ("full status commit"); rewrite to "the full mission
        workflow" or similar.

    Out of scope:
      - `kitty-specs/` historical mission artifacts (immutable per spec C-001).
      - The user's local checkout path (`spec-kitty-dev/ceremony/...`) per spec C-002.
      - Git history, past commit messages, past tags per spec C-003.

categories:

  code_symbols:
    description: >
      Python identifiers (constants, function names, class names) that contain
      "ceremony" or "status-writing".
    action: rename
    examples:
      - "tests/e2e/conftest.py:25 — E2E_CEREMONY_BRANCH constant → E2E_STATUS_COMMIT_BRANCH"
      - "tests/e2e/conftest.py:214 — _checkout_e2e_ceremony_branch fn → _checkout_e2e_status_commit_branch (callers at L324, L399)"
    occurrences:
      - id: cs-001
        file: tests/e2e/conftest.py
        line: 25
        source: 'E2E_CEREMONY_BRANCH = "e2e-ceremony"'
        replacement: 'E2E_STATUS_COMMIT_BRANCH = "e2e-status-commit"'
        sense: commit_class
        rule: R3+R4
      - id: cs-002
        file: tests/e2e/conftest.py
        line: 214
        source: 'def _checkout_e2e_ceremony_branch(project: Path) -> None:'
        replacement: 'def _checkout_e2e_status_commit_branch(project: Path) -> None:'
        sense: commit_class
        rule: R3
      - id: cs-003
        file: tests/e2e/conftest.py
        line: 324
        source: '_checkout_e2e_ceremony_branch(project)'
        replacement: '_checkout_e2e_status_commit_branch(project)'
        sense: commit_class
        rule: R3
      - id: cs-004
        file: tests/e2e/conftest.py
        line: 399
        source: '_checkout_e2e_ceremony_branch(project)'
        replacement: '_checkout_e2e_status_commit_branch(project)'
        sense: commit_class
        rule: R3

  import_paths:
    description: >
      Python module/package paths containing the forbidden terms.
    action: do_not_change
    notes: |
      No Python module path contains "ceremony" or "status-writing"; no module
      is being renamed. Constants in `tests/e2e/conftest.py` are renamed in
      place (under code_symbols); importers using `from tests.e2e.conftest
      import E2E_CEREMONY_BRANCH` (if any) become symbol renames, not
      import-path renames.

  filesystem_paths:
    description: >
      Repository file or directory names containing the forbidden terms.
    action: do_not_change
    notes: |
      No file or directory in the repository is named "ceremony" or
      "status-writing". The user's local working-directory path
      `spec-kitty-dev/ceremony/spec-kitty` is a local checkout choice,
      explicitly out of scope per spec C-002.

  serialized_keys:
    description: >
      JSON/YAML keys, frontmatter, fixture IDs, branch-name string literals.
    action: rename
    examples:
      - "tests/doctrine/procedures/conftest.py:48 — fixture id 'mission-merge-ceremony' → 'mission-merge-workflow' (workflow_sense)"
      - "tests/doctrine/procedures/test_models.py:31 — paired assertion update"
      - "tests/e2e/conftest.py:25 — string literal 'e2e-ceremony' → 'e2e-status-commit'"
    occurrences:
      - id: sk-001
        file: tests/doctrine/procedures/conftest.py
        line: 48
        source: '"id": "mission-merge-ceremony"'
        replacement: '"id": "mission-merge-workflow"'
        sense: workflow_sense
        rule: R2+R4
        notes: |
          This is a fixture ID for the *merge workflow* procedure, not a
