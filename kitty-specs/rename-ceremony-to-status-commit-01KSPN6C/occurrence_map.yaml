      - "src/doctrine/skills/spec-kitty-program-orchestrate/SKILL.md — 4 'full ceremony' → 'full mission workflow' (workflow_sense)"
      - "docs/development/org-doctrine-layer-architecture-review.md:481 — 'degrades to ceremony' → 'degrades to performative gesture' (English idiom rewrite)"
      - "docs/engineering_notes/finding/2026-05-24-mission-01KSAF14-orchestration-findings.md:280 — flag name `vcs.allow_ceremony_commits_on_target_branch` → `vcs.allow_status_commits_on_target_branch` (R6)"
    occurrences:
