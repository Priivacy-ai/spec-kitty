# ──────────────────────────────────────────────────────────────────────
# GLOSSARY EDITS (additive — not a rename but part of the same diff)
# ──────────────────────────────────────────────────────────────────────
glossary_edits:
  file: .kittify/glossaries/spec_kitty_core.yaml
  action: rename
  notes: |
    Insertions establish the canonical term and mark both legacy terms as
    deprecated synonyms, consistent with the existing schema (5 prior
    `status: deprecated` entries already use this pattern).
  insertions:
    - kind: canonical_entry
      surface: "status commit"
      status: active
      confidence: 0.95
      definition: |
        An auto-commit created by spec-kitty to record workflow state changes
        (task status transitions, lane metadata, WP claims). Status commits
        target lane branches, not protected branches.
      synonyms_to_avoid:
        - "ceremony commit"
        - "ceremony"
        - "ceremony write"
        - "status-writing operation"
        - "status-writing command"
      spec_anchor: FR-006
    - kind: deprecated_entry
      surface: "ceremony commit"
      status: deprecated
      confidence: 1.0
      definition: |
        DEPRECATED. Replaced by `status commit`. This term obscures intent
        and is forbidden in active source. See the canonical entry.
      spec_anchor: FR-007
    - kind: deprecated_entry
      surface: "status-writing operation"
      status: deprecated
      confidence: 1.0
      definition: |
        DEPRECATED. Replaced by `status commit`. This phrasing landed during
        a partial rename; it is forbidden in active source. See the canonical
        entry.
      spec_anchor: FR-007

# ──────────────────────────────────────────────────────────────────────
# NEW FILES (created as part of the same diff — regression guard)
# ──────────────────────────────────────────────────────────────────────
new_files:
  - file: tests/architectural/test_no_legacy_terminology.py
    purpose: |
      Architectural test asserting forbidden terms ("ceremony", "status-writing")
      do not reappear in `src/`, `tests/`, `docs/`. Excludes `kitty-specs/`
      historical artifacts and `.worktrees/`. Implements decision
      01KSPP3W3VW8GB4WCXFF7J7X1Z (add_pytest_grep_guard).
    spec_anchor: ["FR-013", "FR-014"]

# ──────────────────────────────────────────────────────────────────────
# OUT OF SCOPE
# ──────────────────────────────────────────────────────────────────────
historical_preservation:
  description: >
    Places where "ceremony" or "status-writing" MUST be preserved because they
    record history, not current behaviour. These are NOT in the rename set.
  action: do_not_change
  paths:
    - "kitty-specs/*/**/*.md (frozen historical mission artifacts; spec C-001)"
    - "Past git commit messages (history is not rewritten; spec C-003)"
    - "Past release tags (history is not rewritten; spec C-003)"
    - "The user's local checkout path `spec-kitty-dev/ceremony/...` (local naming; spec C-002)"

# ──────────────────────────────────────────────────────────────────────
# DEAD CODE CANDIDATES
# ──────────────────────────────────────────────────────────────────────
dead_code_candidates:
  description: >
    Occurrences that should be DELETED outright rather than renamed.
  action: manual_review
  notes: |
    None identified at plan time. All current occurrences serve an active
    documentation, identifier, or assertion purpose and should be renamed,
    not deleted. If implementation reveals a dead occurrence (e.g., a
    commented-out test fixture), surface for review rather than delete in-band.

# ──────────────────────────────────────────────────────────────────────
# ACCEPTANCE GATE (operational check; matches spec FR-013 + FR-014)
# ──────────────────────────────────────────────────────────────────────
acceptance_check:
  command: |
    (
      grep -rn 'ceremony' src/ tests/ docs/ --include='*.py' --include='*.md' --include='*.yaml' 2>/dev/null \
        | grep -v -E "(kitty-specs/|\\.worktrees/|tests/architectural/test_no_legacy_terminology\\.py)";
      grep -rn 'status-writing' src/ tests/ docs/ --include='*.py' --include='*.md' --include='*.yaml' 2>/dev/null \
        | grep -v -E "(kitty-specs/|\\.worktrees/|tests/architectural/test_no_legacy_terminology\\.py)"
    ) | wc -l
  expected: 0
  notes: |
    The architectural test `tests/architectural/test_no_legacy_terminology.py`
    (FR-013, FR-014) operationalises this check on every CI run via WP06. The
    shell snippet above is the quick local equivalent.

# ──────────────────────────────────────────────────────────────────────
# SUMMARY (bookkeeping)
# ──────────────────────────────────────────────────────────────────────
summary:
  total_files_modified: 12
  total_files_created: 1
  total_occurrences: 25
  by_category:
    code_symbols: 4
    serialized_keys: 3
    user_facing_strings: 16
    tests_fixtures: 3
    not_applicable: [import_paths, filesystem_paths, cli_commands, logs_telemetry]
  by_sense:
    commit_class: 14
    workflow_sense: 11
