# Reference-rewrite CHECKLIST (planning aid) for WP01 / WP02 — NOT a gate artifact.
#
# UPDATE (2026-06-09, analysis remediation O1): mission `change_mode: bulk_edit` was REVERTED.
# Reason: the canonical occurrence-map (DIRECTIVE_035) models a SINGLE `target.term → replacement`
# string-rename across 8 categories — it does NOT model this mission's MULTI-PATH directory
# restructure (glossary promotion + architecture moves). The bulk-edit gate is the wrong tool here.
# Instead, reference integrity is enforced by the WP01/WP02 Definition-of-Done: post-move grep,
# `spec-kitty glossary validate`, and `doctor doctrine` (this is R-05's original selective intent).
# This file remains a CHECKLIST of the rewrite surface for the implementer — not a runtime gate.
# Mechanism gap filed upstream (occurrence-map can't model structural restructures).

mission: doctrine-glossary-architecture-consolidation-01KTNWFC
status: draft
applies_to_concerns: [IC-01, IC-02]

# The two structural moves driving every rewrite:
moves:
  - glossary_promotion:     # IC-01
      from: ["architecture/glossary/", ".kittify/glossaries/ (canonical source)", "src/glossary content paths"]
      to:   "glossary/ (top-level canonical) + glossary/contexts/"
  - architecture_layout:    # IC-02
      from: ["architecture/2.x/** (C4)", "scattered top-level arch docs"]
      to:   "architecture/diagrams/{01_context,02_containers,03_components}/, architecture/{vision,audience}/, versioned history retained"

# 8 standard categories — action per category (finalize exact entries at tasks time)
categories:
  code_symbols:
    action: review
    notes: "GlossaryScope loader + any hard-coded glossary/arch path constants in src/glossary, src/doctrine."
  import_paths:
    action: review
    notes: "Python imports referencing moved glossary modules (if module paths change; content moves may not change imports)."
  filesystem_paths:
    action: rewrite
    notes: "PRIMARY category. All references to glossary/ and architecture/ paths: charter authority paths (.kittify/charter), src/glossary loader paths, .kittify/glossaries, doctrine artefacts, doc cross-links."
  serialized_keys:
    action: review
    notes: "YAML keys referencing scopes/paths (e.g. glossary scope filenames); GlossaryScope enum values unchanged (FR-011 defer)."
  cli_commands:
    action: none
    notes: "No CLI command names change; `spec-kitty glossary` surface unchanged."
  user_facing_strings:
    action: review
    notes: "Doc prose + README references to old architecture/glossary locations; explanation links updated to point up at architecture (no dup)."
  tests_fixtures:
    action: rewrite
    notes: "Tests asserting glossary/architecture paths (e.g. glossary loader tests, architectural authority-path tests)."
  logs_telemetry:
    action: none
    notes: "No path-bearing log/telemetry strings expected; confirm at implement."

exceptions:
  - "architecture/1.x/** and architecture/2.x/** historical snapshots: paths INSIDE frozen version dirs are NOT rewritten (history is immutable); only references that should point to the new living surface are updated."

verification:
  - "Post-move grep for old paths returns only intended/historical hits (see quickstart.md)."
  - "spec-kitty glossary validate + doctor doctrine + terminology guard pass."
