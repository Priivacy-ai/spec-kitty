# ============================================================================
# Bulk-Edit Gate Validation Notes
# ============================================================================
# Note 1 — Action semantics
#   The implement-review loop validates that every occurrence with action
#   `reframe`, `add`, or `remove` has a corresponding diff in the WP that
#   owns the file. Occurrences with `audit` action carry an explicit
#   `gate_tolerance` value:
#     - keep                  audit-and-leave-untouched is acceptable; no diff required
#     - keep-or-refactor      audit may resolve to either keep or refactor; either is acceptable
#     - keep-or-supersede     audit may resolve to keep, or to delete-with-rationale; either is acceptable
#     - keep-or-light-edit    audit may resolve to no-change or a minor edit; if edit, add to owned_files
#     (no value)              defaults to "keep" — no diff required
#   The bulk-edit gate at mission review accepts any of these resolutions
#   for `audit` items as compliant with FR-022.
#
# Note 2 — owned_files expansion for re-classified items
#   Two shape-B `audit` items were re-classified to `reframe` after
#   Reviewer Renata's pre-implementation review (Finding 17): the tutorial
#   `docs/tutorials/charter-governed-workflow.md` and the migration doc
#   `docs/migration/from-charter-2x.md`. These ARE owned by WP07 — see
#   `owned_by: WP07` on each. WP07's frontmatter `owned_files` lists them
#   explicitly. Other tutorial files remain `audit` with gate_tolerance
#   keep-or-light-edit; if WP07's implementer decides to edit them, that
#   WP review should expand owned_files in the same PR.
#
# Note 3 — Cross-WP coordination
#   - Shape A (env-var) ownership runs through WP06. WP06's test refactor
#     (T032) is a cross-cutting concern; pre-existing env-mutating tests
#     in tests/retrospective/ and tests/integration/retrospective/ are
#     audit items here. WP04/WP06 implementers decide each one's fate at
#     implementation time and record the decision in their commit notes.
#     Each affected WP's DoD includes a grep-based gate that no NEW
#     env-mutation appears in its owned tests (FR-016 enforcement).
#   - Shape B (doc semantics) ownership runs through WP07. The 4 shipped
#     skills regenerate snapshot tests on first edit.
#
# Note 4 — Provenance
#   `spec-kitty agent mission finalize-tasks --validate-only` ran clean on
#   commit `5f2a94d8`. This occurrence_map.yaml is the second-pass
#   artifact capturing the bulk-edit shape catalog per FR-022. Renata's
#   pre-implementation review surfaced the audit-tolerance question and
#   the WP07 owned_files expansion; both addressed in this revision.
