      - path: tests/specify_cli/skills/__snapshots__/codex/review.SKILL.md
        action: regenerate
      - path: tests/specify_cli/skills/__snapshots__/vibe/implement.SKILL.md
        action: regenerate
      - path: tests/specify_cli/skills/__snapshots__/vibe/review.SKILL.md
        action: regenerate
      - path: tests/specify_cli/regression/_twelve_agent_baseline/**
        action: audit
        notes: 12 agents' regression baselines may reference architecture/2.x/adr/ paths and retrospective workflow text. The architecture restructure earlier in this mission moved 3.x-era ADRs to 3.x/adr/ with back-compat symlinks at 2.x/adr/<file>. Baselines still resolve via the symlinks; text mentions of the 2.x/adr/ directory are still accurate as a back-compat shim. No regeneration expected unless WP07 edits propagate.
    logs_telemetry:
      - signal: provenance.kind enum
        action: add
        notes: Five values; new event field. NFR-007 additive.
      - signal: RetrospectiveCaptured event
        action: add
        notes: New event type (or reuse if already on the frozen surface — WP03 confirms). Carries findings_status, record_path, generator_version, policy_source, provenance_kind, proposal_count, evidence_ref_count.
