# Bulk-Edit Occurrence Map — Retrospective Learning Default-On Policy
#
# Mission: retrospective-default-policy-01KS049J
# Mission ID: 01KS049J4V9CSWBKJHTY2FB69H
# Generated: 2026-05-19
# FR: FR-022 (bulk-edit guardrails)
#
# Two bulk-edit shapes are present in this mission. Each shape is mapped across
# the 8 standard categories (code_symbols, import_paths, filesystem_paths,
# serialized_keys, cli_commands, user_facing_strings, tests_fixtures,
# logs_telemetry). Each occurrence carries an explicit `action`:
#
#   - reframe:  text remains but its semantic meaning changes
#   - add:      new occurrence introduced by this mission
#   - remove:   occurrence deleted by this mission
#   - keep:     occurrence kept verbatim (no action)
#   - audit:    inspect during the WP; final action decided by the implementer
#
# Resolved at /spec-kitty.tasks time per the plan's bulk-edit classification
# (FR-022). Carriers: WP06 (shape A), WP07 (shape B).

change_mode: bulk_edit

# ============================================================================
# SHAPE A — Env-var deprecation messaging
# ============================================================================
# Identifiers `SPEC_KITTY_RETROSPECTIVE` and `SPEC_KITTY_MODE` are demoted from
# durable product-configuration to test/dev overrides only. Every reference
# either gains a deprecation warning, gets re-framed as a test/dev escape
# hatch, or is replaced with the durable equivalent (`retrospective.enabled`,
# `retrospective.timing`, `retrospective.failure_policy`).
#
# Carrier WP: WP06 (Env-var deprecation + shim retirement)

shape_a_env_var_deprecation:
  description: |
    Demote SPEC_KITTY_RETROSPECTIVE and SPEC_KITTY_MODE to test/dev overrides.
    Durable replacements live in .kittify/config.yaml#retrospective and
    charter frontmatter. Env vars retain backward compatibility for one
    release cycle with a one-warning-per-process DeprecationWarning + Rich
    stderr notice (suppressible via SPEC_KITTY_NO_DEPRECATION_WARNINGS=1).
  identifiers:
    - SPEC_KITTY_RETROSPECTIVE
    - SPEC_KITTY_MODE
  carrier_wp: WP06
  durable_replacements:
    SPEC_KITTY_RETROSPECTIVE: retrospective.enabled
    SPEC_KITTY_MODE: retrospective.timing + retrospective.failure_policy
  categories:
    code_symbols:
      - path: src/specify_cli/next/runtime_bridge.py
        action: audit
        notes: Read-site for SPEC_KITTY_RETROSPECTIVE. WP06 wires deprecation; WP04 replaces facilitator_callback=None with the real generator using resolved policy. Env-var read may move into the deprecation module.
      - path: src/specify_cli/retrospective/config.py
        action: reframe
        notes: Env-var-driven config today. WP06 T033 decides fate (fold+delete OR retain-as-shim). Either way, no longer the canonical policy surface — that is policy.py.
      - path: src/specify_cli/retrospective/mode.py
        action: reframe
        notes: Same as config.py — covered by WP06 T033.
    import_paths:
      - path: src/specify_cli/retrospective/__init__.py
        action: audit
        notes: Re-exports today include config/mode entry points. WP06 updates exports to new policy.py surface; shim path depends on T033 decision.
    filesystem_paths:
      - path: .kittify/config.yaml
        action: add
        notes: New canonical home for the `retrospective:` block. WP01 resolver reads from this path. Documented in docs (WP07 T035).
      - path: .kittify/charter/charter.md
        action: add
        notes: Charter frontmatter may include `retrospective:` block. WP01 resolver reads frontmatter. Documented in docs (WP07).
    serialized_keys:
      - key: retrospective
        scope: .kittify/config.yaml top-level
        action: add
        notes: New top-level key with sub-keys enabled, timing, failure_policy, write_record, generate_proposals, apply_proposals, permissions. Schema in contracts/retrospective-policy.schema.json.
      - key: retrospective
        scope: charter frontmatter
        action: add
        notes: Same schema as config.yaml. Charter wins by default; may delegate via retrospective.precedence:config.
    cli_commands:
      - command: spec-kitty retrospect create --mission <handle>
        action: add
        notes: New authoring command (WP05). Replaces the de facto authoring use of `synthesize`.
      - command: spec-kitty retrospect backfill --since <date>
        action: add
        notes: New historical-authoring command (WP05).
      - command: spec-kitty merge --skip-retrospective
        action: add
        notes: Bypass flag for strict-gate completion. WP04. Logs actor/provenance.
    user_facing_strings:
      - source: src/specify_cli/retrospective/deprecation.py
        action: add
        text: "SPEC_KITTY_RETROSPECTIVE is a test/dev override only and will be removed. Set retrospective.enabled in .kittify/config.yaml or charter frontmatter instead."
        notes: One-warning-per-process per NFR-006. Rich stderr notice + Python DeprecationWarning.
      - source: src/specify_cli/retrospective/deprecation.py
        action: add
        text: "SPEC_KITTY_MODE is a test/dev override only and will be removed. Set retrospective.timing and retrospective.failure_policy in .kittify/config.yaml or charter frontmatter instead."
        notes: Same delivery as above.
    tests_fixtures:
      # Pre-existing test files outside any WP's owned_files. Per the
      # bulk-edit gate tolerance documented at the bottom of this file,
      # these `audit→keep-or-refactor` items are resolved during their
      # respective WP's implementation; the gate does NOT require a
      # diff for an audit-keep outcome. WP06 (T032) refactors env-mutating
      # pre-existing tests opportunistically; WP04 (T023) decides whether
      # any of these integration tests are superseded by the new
      # tests/integration/retrospective/ suite it creates.
      - path: tests/retrospective/test_config_opt_in.py
        action: audit
        gate_tolerance: keep-or-refactor
        notes: Pre-existing env-var-driven test. Resolution at WP06 T032 — either refactor to inject policy (preferred), or supersede + delete + cover the case in test_env_deprecation.py. Decision documented in WP06 commit.
      - path: tests/retrospective/test_mode_detection.py
        action: audit
        gate_tolerance: keep-or-refactor
        notes: Same as test_config_opt_in.py.
      - path: tests/integration/retrospective/conftest.py
        action: audit
        gate_tolerance: keep-or-refactor
        notes: Shared fixtures. WP04 T023 decides whether to extend (preferred — additive) or replace. If the new tests/integration/retrospective/ test suite shares this conftest, env-mutation in it gets refactored as part of WP04. If WP04 introduces a parallel suite, this stays as-is.
      - path: tests/integration/retrospective/test_lifecycle_hook.py
        action: audit
        gate_tolerance: keep-or-supersede
        notes: WP04 T023 may supersede this with `tests/integration/retrospective/test_strict_flow_block.py` and `test_strict_flow_skip.py`. If superseded, delete-with-rationale. If kept, refactor env-mutation per FR-016 in the same WP.
      - path: tests/integration/retrospective/test_hic_terminus_e2e.py
        action: audit
        gate_tolerance: keep-or-supersede
        notes: Decision at WP04 review. Likely superseded by `test_default_flow_healthy.py` / `test_default_flow_generator_failure.py`.
      - path: tests/integration/retrospective/test_autonomous_terminus_e2e.py
        action: audit
        gate_tolerance: keep-or-supersede
        notes: Likely superseded by `test_strict_flow_*.py`. Decision at WP04 review.
      - path: tests/integration/retrospective/test_next_mission_sees_change.py
        action: audit
        gate_tolerance: keep
        notes: Unrelated to the env-var deprecation; keep unless WP04 finds it duplicates new coverage.
      - path: tests/integration/retrospective/test_silent_auto_run_blocked.py
        action: audit
        gate_tolerance: keep-or-refactor
        notes: Tests the legacy silent-fabrication path. After WP05 T028 lands the default-error change, this test's premise is invalid — refactor to assert the new error code OR delete with rationale. Decision at WP05 review.
      - path: tests/integration/retrospective/test_silent_skip_blocked.py
        action: audit
        gate_tolerance: keep-or-refactor
        notes: Same as test_silent_auto_run_blocked.py.
      - path: tests/retrospective/test_env_deprecation.py
        action: add
        notes: New dedicated module (WP06 T034) for env-var deprecation behavior — one-warn-per-process, durable-wins, suppression flag.
    logs_telemetry:
      - signal: '<env:SPEC_KITTY_RETROSPECTIVE>' in RetrospectiveCaptured.policy_source
        action: add
        notes: When env var is observed (even though it never wins), record in source_map so log readers can see env-var presence. WP01 T005.
      - signal: '<env:SPEC_KITTY_MODE>' in RetrospectiveCaptured.policy_source
        action: add
        notes: Same pattern.
      - signal: DeprecationWarning category for env-var observation
        action: add
        notes: One per process. Captured by pytest's recwarn fixture in tests.

# ============================================================================
# SHAPE B — Doc semantics correction (summary / create / backfill / synthesize)
# ============================================================================
# Across docs, README, and shipped skills, the phrases "summary captures the
# retrospective" and "synthesize generates the retrospective" are replaced by
# four distinct CLI semantics:
#
#   - summary    aggregates across records (read-only)
#   - create     authors one record for a completed mission
#   - backfill   authors historical records in bulk
#   - synthesize previews/applies proposals from an existing record
#
# Carrier WP: WP07 (Docs + shipped skills + CONTRIBUTING note)

shape_b_doc_semantics_correction:
  description: |
    Replace PR #1136's framing that conflates `summary` and `synthesize` with
    authoring. The canonical post-merge sequence is:
    mission review -> create/capture retrospective -> summary or synthesize.
  carrier_wp: WP07
  source_phrases_to_remove:
    - "summary captures the retrospective"
    - "synthesize generates the retrospective"
    - "run summary to capture"
    - "run synthesize after merge to capture"
  canonical_replacements:
    summary: "aggregates findings across existing records (read-only)"
    create: "authors a real retrospective for one completed mission"
    backfill: "creates records for historical missions"
    synthesize: "previews or applies proposals from an existing record"
  categories:
    code_symbols:
      - path: src/specify_cli/cli/commands/agent_retrospect.py
        action: reframe
        notes: Existing `synthesize` command's default-path tightens per FR-014. WP05 T028.
      - path: src/specify_cli/cli/commands/retrospect.py
        action: add
        notes: New module hosting `create` and `backfill`. WP05 T024 / T026.
    import_paths: []
    filesystem_paths:
      - path: .kittify/missions/<mission_id>/retrospective.yaml
        action: reframe
        notes: This was previously sometimes populated by `synthesize`'s silent fabrication fallback. After this mission, it is populated by the runtime (default) or by explicit `retrospect create`. The path itself does not change; its provenance does.
    serialized_keys:
      - key: findings_status
        action: add
        scope: retrospective.yaml record
        notes: New top-level key per RetrospectiveRecord schema. Values has_findings | ran_no_findings. Distinguishes empty-but-ran from missing/failed at summary level.
      - key: policy_source
        action: add
        scope: retrospective.yaml record AND retrospective events
        notes: Snapshot of resolver source_map at authoring time. NFR-007 additive.
      - key: provenance
        action: add
        scope: retrospective.yaml record
        notes: Structured provenance with kind enum (runtime_post_completion, runtime_strict_gate, explicit_create, backfill, synthesize_fabricate).
      - key: provenance_history
        action: add
        scope: retrospective.yaml record (when --update used)
        notes: Most-recent-first list of prior provenances.
    cli_commands:
      - command: spec-kitty retrospect summary
        action: reframe
        notes: Stays read-only; output gains findings_status + policy_source keys per record + 4-state aggregate counts. WP05 T027.
      - command: spec-kitty agent retrospect synthesize
        action: reframe
        notes: Default path errors on missing record. --fabricate-empty preserves legacy behavior with logged provenance. WP05 T028.
      - command: spec-kitty agent retrospect synthesize --fabricate-empty
        action: add
        notes: New compat flag for the legacy fabrication path (FR-014).
    user_facing_strings:
      - source: docs/how-to/use-retrospective-learning.md
        action: reframe
        notes: T035 — canonical operator how-to. Rewrites the four-category mental model.
      - source: docs/how-to/accept-and-merge.md
        action: reframe
        notes: T036 — corrects PR #1136 wording. Post-merge sequence becomes "mission review -> create/capture retrospective -> summary or synthesize".
      - source: docs/how-to/merge-feature.md
        action: reframe
        notes: T036.
      - source: docs/explanation/retrospective-learning-loop.md
        action: reframe
        notes: T037 — adds bounded-context diagram and four-category model.
      - source: docs/reference/cli-commands.md
        action: reframe
        notes: T037 — adds retrospect create/backfill entries; updates summary/synthesize entries.
      - source: docs/reference/slash-commands.md
        action: audit
        notes: T037 — audit for PR #1136 contamination; edit only if found.
      - source: docs/tutorials/your-first-feature.md
        action: reframe
        notes: T038 — adds tutorial wrap-up pointing at the retrospective.yaml record.
      - source: docs/tutorials/charter-governed-workflow.md
        action: reframe
        owned_by: WP07
        notes: References strict-mode env vars per the grep. Refactor to charter `retrospective.timing: before_completion + failure_policy: block` per shape A. This file is added to WP07's owned_files (see Note 2 below).
      - source: docs/migration/from-charter-2x.md
