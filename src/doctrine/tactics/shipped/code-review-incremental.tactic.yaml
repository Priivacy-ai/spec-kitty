schema_version: "1.0"
id: code-review-incremental
name: Incremental Code Review
purpose: Review a change set to identify correctness, structural, and architectural risks without rewriting or expanding scope. Formulate feedback as observations and questions, not instructions.
steps:
  - title: Read the commit message or change description
    description: Understand stated intent before opening files. Do not start reading code yet.
  - title: Scan the diff for touched modules
    description: Identify which files and modules are affected. Note the change size.
  - title: Read modified files in full without commenting
    description: Build a mental model of the change before forming opinions.
  - title: Summarize the apparent intent
    description: Write one paragraph describing what the change attempts to accomplish. This anchors all subsequent feedback.
  - title: Identify risks in priority order
    description: >
      Evaluate in this sequence: correctness, architectural boundaries,
      maintainability, unintended side effects. Stop when the change size
      does not warrant deeper analysis.
  - title: Formulate feedback as observations and questions
    description: >
      Use observation language ("I notice...", "This appears to...").
      Frame concerns as questions ("Does this handle...", "What happens when...").
      Avoid prescriptive commands ("Change X to Y"). Reference specific lines or files.
  - title: Produce the review summary
    description: >
      Document: change intent (one paragraph), risks identified (by category),
      overall assessment (approve / request changes / comment).
    examples:
      - "Change Intent: Adds retry logic to the sync client. Risks: [Correctness] No backoff cap — unbounded retries under sustained failure. Overall: Request changes."
failure_modes:
  - "Suggesting refactors unrelated to the change."
  - "Rewriting code mentally instead of reviewing it."
  - "Treating stylistic preference as correctness issues."
  - "Prescriptive feedback that removes author agency."
timing_guidance:
  small: "5-15 minutes for changes under 200 lines."
  medium: "15-30 minutes for changes between 200-500 lines."
  large: "Request decomposition for changes over 500 lines."
references:
  - type: directive
    id: DIRECTIVE_024
    reason: Flag changes that expand scope beyond stated intent (locality of change).
  - type: tactic
    id: review-intent-and-risk-first
    reason: Shares the intent-first review philosophy; this tactic adds the incremental discipline.
  - type: tactic
    id: change-apply-smallest-viable-diff
    reason: Reviewer should verify the diff is the smallest viable change for the stated goal.
