schema_version: "1.0"
id: reasons-canvas-review
name: REASONS Canvas Review
purpose: >
  Use the canvas as a comparison surface during work-package review and classify
  any divergence as approved deviation, scope drift, or safeguard violation.
steps:
  - title: Detect activation
    description: Skip the gate entirely if the project's charter has not selected SPDD/REASONS doctrine.
  - title: Trace implementation to canvas
    description: For each Requirement and Operation in the active canvas, find concrete evidence in the diff or note its absence.
  - title: Detect uninvented entities and files
    description: Flag entities, files, or surfaces touched by the diff that do not appear in the canvas's Structure or Approach sections.
  - title: Verify Norms and Safeguards
    description: Verify that observability, testing, and safeguard rules in the canvas remain honored by the implementation.
  - title: Classify divergence
    description: Choose one of (a) approved deviation recorded in canvas, (b) unrecorded scope drift (block), (c) safeguard violation (block), (d) canvas update, (e) glossary update, (f) charter follow-up, (g) follow-up mission. Charter directives take precedence over canvas content.
