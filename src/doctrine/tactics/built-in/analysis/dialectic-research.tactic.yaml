schema_version: "1.0"
id: dialectic-research
name: Dialectical Research
purpose: >
  Test a claim, theory, or design hypothesis by running two independent
  investigations in parallel — one that argues FOR it (corroboration) and one
  that argues AGAINST it (refutation) — then reconcile them honestly into a
  revised position. Pairing a confirmation pass with an adversarial pass
  stress-tests a hypothesis before it becomes a decision, guarding against
  confirmation bias and plausible-but-wrong conclusions. Based on Hegelian
  thesis–antithesis–synthesis and red-team/blue-team review.
steps:
  - title: Frame the claim as a single falsifiable statement
    description: >
      State the theory under test as one precise proposition that evidence
      could confirm or break. Vague claims cannot be refuted. Where possible,
      name the decisive test — the single fact that would settle it.
    examples:
      - "'Mission and Mission Run are the same concept' — decisive test: is the relationship 1:1 or 1:many?"
      - "'This cache is the bottleneck' — decisive test: does removing it change the measured latency?"
  - title: Dispatch two independent investigators
    description: >
      Run a corroborator and a refuter in parallel, each blind to the other's
      findings, over the same sources. The corroborator builds the strongest
      evidence-cited case FOR the claim; the refuter defaults to skepticism and
      actively tries to break it. Require citations; forbid fabrication.
  - title: Demand steelman on both sides
    description: >
      The corroborator must find the genuinely strongest support, not
      cherry-pick weak hits; the refuter must steelman the counter-position with
      real evidence, not strawman it. Each side rates its own findings
      (strong / partial / weak; refuted / weakened / survives) and names its
      single most decisive fact.
  - title: Reconcile by taking the strongest from each
    description: >
      Do not average the two reports. Concede where the refutation lands real
      hits; keep what genuinely survives. Resist both confirmation bias
      (defending the original wording) and capitulation (yielding to a
      refutation that is itself flawed). The output is a revised claim, not a
      declared winner.
  - title: Record the revised position and its provenance
    description: >
      Write down the reconciled verdict, what changed, and the citations that
      drove each change, so future work inherits the corrected understanding
      instead of re-litigating it. Salvage partial truths even when the headline
      claim is refuted — a refuted theory often surfaces a real, separable finding.
    examples:
      - "Theory refuted (1:many cardinality), but it surfaced that the concept is degenerate in implementation — a separately-actionable finding worth tracking."
failure_modes:
  - "Confirmation-only: running just the corroboration pass and treating the absence of refutation as proof."
  - "Strawman refutation: attacking a weak version of the claim instead of steelmanning it."
  - "Capitulation: yielding to a refutation that is itself flawed, instead of weighing its evidence."
  - "Averaging: splitting the difference between the two reports rather than taking the strongest from each."
  - "No reconciliation: leaving two contradictory reports without a single revised, decided position."
  - "Discarding partial truths: declaring the claim refuted and throwing away the valid findings it surfaced."
references:
  - name: Bounded Context Identification
    type: tactic
    id: bounded-context-identification
    when: The theory concerns whether two terms name one concept or two.
  - name: Premortem Risk Identification
    type: tactic
    id: premortem-risk-identification
    when: The adversarial pass benefits from imagining concrete ways the claim fails.
