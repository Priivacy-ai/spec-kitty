schema_version: "1.0"
id: model-task-routing
name: Model Task Routing
purpose: >
  Match model strength to task difficulty: route hard-judgment work (sizing,
  fakeability, code-truth, review, architecture) to the strongest available
  model, and grounded or mechanical passes to a cheaper model. Advisory —
  the recommendation surfaces alongside the task, it never substitutes for
  the operator's or orchestrator's own judgment about who should run a step.
steps:
  - title: Classify the task's judgment weight
    description: >
      Decide whether the task is a hard-judgment pass (architecture, sizing,
      fakeability, code-truth, security-sensitive review) or a grounded /
      mechanical pass (formatting, boilerplate, well-specified rote edits).
      When in doubt, treat the task as hard-judgment — the cost of
      over-provisioning a cheap task is smaller than the cost of a shallow
      review on a hard one.
    examples:
      - "Sizing a mission's work packages, judging fakeability of a DoD, or
        reviewing architecture is hard-judgment; never delegate these to the
        cheapest model in the fleet."
      - "Renaming a variable across a bounded diff, or applying a mechanical
        occurrence-map edit, is grounded/mechanical."
  - title: Consult the model-to-task_type catalog
    description: >
      Resolve the task's judgment weight against the packaged
      model-to-task_type catalog at
      `src/doctrine/model_task_routing/catalog/model-to-task_type.yaml`
      (loaded via `doctrine.model_task_routing.loader.load()`). The catalog's
      `task_fit` scores, `routing_policy.objective`, and `tier_constraints`
      determine the recommended model for the classified task type.
    examples:
      - "Under `objective: quality_first`, the catalog favors the
        strongest-fit model for hard-judgment task types even when a cheaper
        model has a non-trivial fit score."
  - title: Apply the recommendation as advisory
    description: >
      Treat the routing recommendation as advisory only (`override_policy:
      advisory` in the catalog) — the seam never spawns a model on its own.
      The orchestrator or operator may override the recommendation; when
      they do, both the recommended and the chosen model should remain
      visible for provenance.
  - title: Never run high-stakes work on a light model
    description: >
      Sizing, fakeability judgment, code-truth verification, adversarial
      review, and architecture decisions must not be delegated to the
      cheapest available model, regardless of what the catalog's
      cost-optimized path would otherwise suggest. This rule overrides a
      `cost_first` or `balanced` objective for these task types.
failure_modes:
  - "Running an architecture or sizing pass on the cheapest available model
    to save cost or time — the resulting judgment is unreliable and the
    failure surfaces much later (undersized missions, missed fakeability)."
  - "Treating the recommendation as binding (gated/required) when the
    catalog declares `override_policy: advisory` — this seam is advisory
    only; it never spawns a model or blocks dispatch."
  - "Ignoring the catalog entirely and hand-picking a model from memory —
    the catalog is the single source of truth for task_fit and cost tiers,
    and hand-picking drifts from it silently."
references:
  - name: Canonical Sources and Unification
    type: directive
    id: DIRECTIVE_044
    when: >
      Consult to understand the binding rule this tactic operationalizes:
      the catalog is the single canonical source for model/task_type
      routing data — do not hand-roll a substitute mapping.
  - name: Autonomous Operation Protocol
    type: tactic
    id: autonomous-operation-protocol
    when: >
      Consult alongside this tactic when delegating work to a subagent —
      model routing decides *which* model runs the delegated work; the
      autonomous operation protocol decides *how* that agent should behave
      once dispatched.
