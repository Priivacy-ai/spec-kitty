schema_version: "1.0"
id: semantic-compression-abstraction-extraction
name: Semantic Compression Abstraction Extraction
purpose: Replace multiple implementations of one concept with one named abstraction.
steps:
  - title: Name the concept
    description: Write the responsibility in one sentence before moving code.
  - title: Pick the smallest abstraction
    description: Prefer a function, method, value object, strategy, or service only as large as the duplicated behavior requires.
  - title: Protect behavior
    description: Confirm characterization or regression coverage for every caller that will be rerouted.
  - title: Extract one concept
    description: Move only the duplicated responsibility into the new abstraction; leave unrelated cleanup out of the diff.
  - title: Reroute callers
    description: Update callers to use the abstraction and remove now-empty duplicate logic.
  - title: Verify the envelope
    description: Rerun the boundary checks and inspect the diff for scope creep.
failure_modes:
  - "Extracting a vague helper creates another dumping ground."
  - "Combining unrelated concepts hides behavior instead of compressing it."
references:
  - name: Semantic Compression
    type: paradigm
    id: semantic-compression
    when: Use when duplication can be reduced by one named owner per concept
  - name: Refactoring Extract First-Order Concept
    type: tactic
    id: refactoring-extract-first-order-concept
    when: The duplicated behavior reveals a missing domain or implementation concept
  - name: Architectural Integrity Standard
    type: directive
    id: DIRECTIVE_001
    when: The abstraction changes component boundaries
