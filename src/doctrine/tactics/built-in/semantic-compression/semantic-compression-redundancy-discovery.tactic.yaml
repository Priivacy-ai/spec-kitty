schema_version: "1.0"
id: semantic-compression-redundancy-discovery
name: Semantic Compression Redundancy Discovery
purpose: Find repeated behavior, not just repeated text, before choosing what to remove.
steps:
  - title: Scan for exact clones
    description: Identify copied functions, tests, branches, and modules that appear byte-for-byte or near-identical.
  - title: Group parameterized clones
    description: Find repeated algorithms that differ only by constants, names, or data shape.
  - title: Compare structural clones
    description: Look for different identifiers wrapped around the same control flow, validation order, or transformation pipeline.
  - title: Test semantic clones
    description: When implementations differ, compare outcomes under the same inputs to decide whether they express the same behavior.
  - title: Produce a duplication map
    description: Record each duplicate behavior, current implementations, known callers, risk, and candidate canonical owner.
failure_modes:
  - "Stopping at text clones misses duplicated business behavior."
  - "Declaring semantic duplication without examples risks deleting legitimate variation."
references:
  - name: Semantic Compression
    type: paradigm
    id: semantic-compression
    when: Use after boundary mapping to locate removable behavioral redundancy
  - name: Behavioral Boundary Mapping
    type: tactic
    id: semantic-compression-behavioral-boundary-mapping
    when: Use first when the protected behavior is unclear
  - name: Locality of Change
    type: directive
    id: DIRECTIVE_024
    when: Duplication removal should stay scoped to the mapped behavior
