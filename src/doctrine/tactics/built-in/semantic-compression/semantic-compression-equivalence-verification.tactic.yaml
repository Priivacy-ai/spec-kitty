schema_version: "1.0"
id: semantic-compression-equivalence-verification
name: Semantic Compression Equivalence Verification
purpose: Prove that the reduced implementation preserves the behavioral envelope.
steps:
  - title: Select the confidence level
    description: Match evidence to risk; use unit, integration, differential, static, or formal checks as needed.
  - title: Run regression checks
    description: Execute the characterization, regression, contract, snapshot, and integration checks that define the behavioral envelope.
  - title: Compare old and new when possible
    description: Use differential tests, replay traces, or parallel execution to compare outputs from old and new implementations under identical inputs.
  - title: Add static evidence
    description: Run type checks, linters, reachability checks, dead-code tools, or mutation checks when they increase confidence in the reduction.
  - title: Record evidence and residual risk
    description: Report which checks passed, which behavior was not covered, and why the remaining risk is acceptable.
failure_modes:
  - "Green unit tests alone do not prove boundary equivalence."
  - "Skipping evidence converts semantic compression into belief-based cleanup."
references:
  - name: Semantic Compression
    type: paradigm
    id: semantic-compression
    when: Use as the final compression gate before handoff
  - name: Test and Typecheck Quality Gate
    type: directive
    id: DIRECTIVE_030
    when: Every compression change needs relevant automated verification
  - name: Black-Box Integration Testing
    type: directive
    id: DIRECTIVE_036
    when: Equivalence must be proven at external boundaries
