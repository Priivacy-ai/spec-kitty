schema_version: "1.0"
id: semantic-compression-semantic-consolidation
name: Semantic Compression Semantic Consolidation
purpose: Collapse multiple active behavioral paths into one canonical path.
steps:
  - title: Find competing paths
    description: Identify duplicate calculators, validators, authorizers, serializers, handlers, or condition ladders used for the same behavior.
  - title: Discover canonical behavior
    description: Compare tests, production behavior, contracts, telemetry, and owner intent to decide which behavior is authoritative.
  - title: Choose the canonical owner
    description: Assign one function, module, service, strategy, or policy as the single implementation of the rule.
  - title: Route variants through the owner
    description: Replace alternate paths with calls, dispatch entries, strategies, or adapters that preserve required variation without duplicating the rule.
  - title: Remove obsolete paths
    description: Delete superseded versions only after callers and tests prove they use the canonical path.
failure_modes:
  - "Choosing a canonical path without owner evidence may standardize the wrong behavior."
  - "Leaving old paths callable preserves the split-brain rule."
references:
  - name: Semantic Compression
    type: paradigm
    id: semantic-compression
    when: Use when multiple active paths express one protected behavior
  - name: Split-Brain Authority Detection
    type: tactic
    id: split-brain-authority-detection
    when: Multiple writers or authorities disagree about the same state or rule
  - name: Conceptual Alignment
    type: directive
    id: DIRECTIVE_032
    when: Competing paths use different names for the same concept
