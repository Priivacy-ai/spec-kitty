schema_version: "1.0"
id: research-citation-discipline
title: Research Citation Discipline Styleguide
scope: docs
principles:
  - "Every claim carries a source: any assertion of fact in a research output must be traceable to a named source (a document, a data run, an interview, or a reproducible observation). An unsourced factual claim is a hypothesis, and must be labelled as one."
  - "Distinguish evidence from inference: separate what a source states from what the author concludes. State the source's claim first, then the interpretation, so a reader can accept the evidence while questioning the inference."
  - "Tier the evidence: rank sources by strength — primary/reproducible (direct measurement, source code, an official spec) over secondary (documentation, third-party analysis) over anecdotal (a single report, an unverified claim). Name the tier when the strength is material to the conclusion."
  - "Cite the specific locus, not the whole source: reference the exact section, line, table, or query that supports the claim, not merely the document title, so the reader can verify without re-deriving it."
  - "Record retrieval context: capture when and how a source was obtained (date, version, query, commit) because sources drift; a citation without a retrieval context cannot be re-verified later."
  - "Report contradicting evidence: when sources disagree, cite both and state how the disagreement was resolved. Suppressing a contradicting source to strengthen a conclusion is a citation failure, not an editorial choice."
  - "Mark confidence explicitly: where the evidence is thin or the inference is a judgement call, say so. Confident prose over weak evidence misleads the reader about how much the conclusion can bear."
  - "Keep a source register: maintain a running list of sources with their tiers and retrieval context so citations across the output stay consistent and auditable."
anti_patterns:
  - name: Unsourced Assertion
    description: "Stating a fact with no traceable source, leaving the reader unable to verify it or judge its strength."
    bad_example: "The framework handles ten thousand requests per second."
    good_example: "The framework sustained ~10k req/s in the maintainers' published benchmark (docs/benchmarks.md, v2.4, retrieved 2026-07-15); we did not reproduce it locally, so treat it as a secondary claim."
  - name: Citation Laundering
    description: "Citing a secondary source that merely repeats a claim as if it were primary evidence, hiding the absence of a verifiable origin."
    bad_example: "Multiple blog posts confirm the library is thread-safe."
    good_example: "The library documents thread-safety for its read path (README §Concurrency, v3.1); the write path is unspecified, and no primary source confirms it — flagged as an open uncertainty."
  - name: Buried Contradiction
    description: "Presenting only the sources that support the conclusion while omitting a known contradicting source."
    bad_example: "Benchmarks show approach A is faster."
    good_example: "Benchmark X favours approach A by 20%; benchmark Y (different workload) favours B by 15%. A wins for our read-heavy profile; see the workload comparison in the source register."
  - name: Confidence Inflation
    description: "Writing a tentative, weakly-evidenced finding in the assertive tone reserved for well-established fact."
    bad_example: "Approach B is the correct choice."
    good_example: "On the current evidence (one spike, one secondary benchmark) approach B looks preferable; confidence is low and a second measurement would raise it."
references:
  # Citation discipline is the evidentiary substrate of decision documentation:
  # a recorded decision is only auditable when its supporting claims are sourced,
  # tiered, and traceable. This styleguide supplies the sourcing rigour that
  # DIRECTIVE_003 records demand.
  - src/doctrine/directives/built-in/003-decision-documentation-requirement.directive.yaml
  # Dialectic research surfaces contradicting positions; citation discipline's
  # "report contradicting evidence" and evidence/inference separation are the
  # rules that keep that dialectic honest and re-verifiable.
  - src/doctrine/tactics/built-in/analysis/dialectic-research.tactic.yaml
