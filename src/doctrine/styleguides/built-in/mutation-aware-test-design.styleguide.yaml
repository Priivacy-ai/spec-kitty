schema_version: "1.0"
id: mutation-aware-test-design
title: Mutation-Aware Test Design
scope: testing

principles:
  - "Test boundary values: provide a test at the exact equality point for every >= or <= comparison, plus one step either side."
  - "Avoid identity inputs: use values where the operator swap produces a different result — 3 not 1 for multiplication, non-zero for addition."
  - "Cover both branches of logical operators: include at least one case where exactly one operand is true for every AND/OR guard."
  - "Assert observable outcomes: verify return values, state changes, or side effects — an assertion-free test cannot kill any mutant."
  - "Distinguish partial from total: test cases where some() and all() (or any() and all()) diverge."
  - "Target 80 %+ mutation score on core business logic; below 60 % indicates structurally weak tests."

patterns:
  - name: Boundary Pair
    description: >
      For every >=, <=, <, > guard provide three tests: value below the threshold,
      value exactly at the threshold, and value above. The exact-at-boundary test
      is the one that kills >= vs > mutations.
    bad_example: |
      def test_classify_pending():
          entry = make_entry(removal_target_release="3.3.0")
          assert _classify(entry, Version("3.2.0"), root) == ShimStatus.PENDING

      def test_classify_overdue():
          entry = make_entry(removal_target_release="3.3.0")
          assert _classify(entry, Version("4.0.0"), root) == ShimStatus.OVERDUE
    good_example: |
      def test_classify_before_deadline():
          entry = make_entry(removal_target_release="3.3.0")
          assert _classify(entry, Version("3.2.0"), root) == ShimStatus.PENDING

      def test_classify_at_deadline_is_overdue():        # kills >= → >
          entry = make_entry(removal_target_release="3.3.0")
          assert _classify(entry, Version("3.3.0"), root) == ShimStatus.OVERDUE

      def test_classify_past_deadline():
          entry = make_entry(removal_target_release="3.3.0")
          assert _classify(entry, Version("4.0.0"), root) == ShimStatus.OVERDUE

  - name: Non-Identity Inputs
    description: >
      Arithmetic tests must use values where operator substitution produces a
      visibly different result. Avoid inputs where + and - are equivalent (n=0),
      or where * and / are equivalent (n=1).
    bad_example: |
      def test_add():
          assert add(5, 0) == 5   # 5 + 0 == 5 - 0

      def test_multiply():
          assert multiply(10, 1) == 10  # 10 * 1 == 10 / 1
    good_example: |
      def test_add():
          assert add(5, 3) == 8   # 5 + 3 != 5 - 3

      def test_multiply():
          assert multiply(10, 3) == 30  # 10 * 3 != 10 / 3

  - name: Bi-Directional Logic
    description: >
      For every AND or OR condition, include a test case where exactly one
      operand is true and the other is false. All-true and all-false inputs
      cannot distinguish AND from OR.
    bad_example: |
      def test_can_access_both_true():
          assert can_access(is_admin=True, is_owner=True) is True

      def test_can_access_both_false():
          assert can_access(is_admin=False, is_owner=False) is False
    good_example: |
      def test_can_access_admin_only():           # kills AND → OR
          assert can_access(is_admin=True, is_owner=False) is True

      def test_can_access_owner_only():
          assert can_access(is_admin=False, is_owner=True) is True

      def test_can_access_neither():
          assert can_access(is_admin=False, is_owner=False) is False

anti_patterns:
  - name: Exception-Only Assertion
    description: >
      Test verifies only that no exception is raised. An empty function body also
      passes — no mutant can be killed.
    bad_example: |
      def test_process_order():
          process_order(order)  # No assertion — empty function also passes
    good_example: |
      def test_process_order():
          process_order(order)
          assert order_repository.find(order.id).status == "processed"

  - name: Identity Value Inputs
    description: >
      Using 0 for addition, 1 for multiplication, or an empty string makes the
      original operator and its mutation produce the same result.
    bad_example: |
      def test_discount():
          assert apply_discount(price=100, rate=0) == 100  # 100 * 0 == 100 / 0 would crash,
                                                           # but 100 - 0 == 100 + 0 == 100
    good_example: |
      def test_discount():
          assert apply_discount(price=100, rate=0.2) == 80.0  # 100 - 20 != 100 + 20

  - name: Single-Branch Condition
    description: >
      Testing only the all-true or all-false case of a logical condition leaves
      AND / OR mutations undetected.
    bad_example: |
      def test_has_valid_email():
          users = [User(email="a@b.com"), User(email="c@d.com")]
          assert has_valid_email(users) is True   # any = True, all = True — same result
    good_example: |
      def test_has_valid_email_one_present():     # kills any → all
          users = [User(email="a@b.com"), User(email=None)]
          assert has_valid_email(users) is True   # any = True, all = False

tooling:
  python: "mutmut>=3.5.0 — run: uv run mutmut run"
  typescript: "stryker — run: npx stryker run --incremental"

quality_test: >
  Run the mutation suite on the module under review before marking a work
  package for_review. Any surviving mutant that is not annotated as equivalent
  must be killed by a new or strengthened test.
