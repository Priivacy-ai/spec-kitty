schema_version: "1.0"
id: plain-language
title: Plain Language Styleguide
scope: docs
applies_to_languages: []

principles:
  - "Write for the named audience, at their level. Plain language is not a fixed reading grade — it is calibrated to the reader the page is for. A tutorial for first-time users assumes no jargon; a reference for working developers may use precise domain terms without re-defining them. The audience is named at discover time (see the discover action's target-audience governance); every page then writes to that named reader, never to the author."
  - "Prefer the short, common word. Choose 'use' over 'utilise', 'about' over 'approximately', 'help' over 'facilitate'. Reserve precise technical terms for where precision matters; do not reach for a longer word to sound authoritative. Every unnecessary syllable is friction between the reader and the answer."
  - "One idea per sentence; short paragraphs. Long, clause-stacked sentences hide the actionable core. Split them. Keep paragraphs to a few sentences so a scanning reader can find the paragraph that answers their question. Front-load each paragraph with its point (the 'bottom line up front')."
  - "Use the active voice and address the reader as 'you'. 'Run the command' and 'You then confirm the result' are direct and unambiguous about who does what. The passive voice ('the command should be run') hides the actor and reads as evasive in instructional prose."
  - "Define a term once, at first use, then use it consistently. Introduce a domain term with a one-line definition or a link to the glossary the first time it appears on a page, then use exactly that term — never a rotating set of near-synonyms. Consistent terminology is a readability feature, not pedantry; it lets the reader build a stable model. Follow the project glossary and terminology canon."
  - "Show, don't only tell. A concrete example, a command with its real output, or a short snippet communicates faster than a paragraph of description. Prefer a worked example over an abstract explanation wherever the reader's goal is to do something."
  - "Cut hedging, filler, and meta-narration. Delete 'simply', 'just', 'obviously', 'it should be noted that', and 'in order to'. 'Simply' and 'just' also shame a reader for whom the step is not simple. Say the thing directly."

patterns:
  - name: Bottom-line-up-front paragraph
    description: >
      Lead each paragraph and each section with its conclusion or the action,
      then support it. A reader scanning for their answer finds it in the first
      line rather than at the end of a build-up.
    good_example: |
      Run `spec-kitty doctor` to diagnose a broken install. It checks the
      command surface, the skills manifest, and the runtime prerequisites, and
      prints a remediation for each failure it finds.
    bad_example: |
      There are a number of things that can go wrong with an installation, and
      when they do, after some investigation, you may eventually find that the
      tool you want for this is `spec-kitty doctor`.
  - name: Define-once, then reuse the exact term
    description: >
      Introduce a term with a short gloss at first use and then reuse that exact
      term. Do not alternate between synonyms for the same concept — the reader
      cannot tell whether a new word means a new thing.
    good_example: |
      A **work package** (a reviewable unit of a mission) is claimed, then
      implemented, then reviewed. Each work package moves through the lanes
      independently.
    bad_example: |
      A work package is claimed. The task is then implemented. Once the work
      item is done, the deliverable is reviewed.

anti_patterns:
  - name: Jargon aimed at the wrong audience
    description: >
      Using unglossed domain jargon in a page written for beginners locks out
      exactly the reader the page exists to serve. Match vocabulary to the
      named audience; gloss or link the first occurrence.
    bad_example: |
      # In a first-run tutorial:
      Reduce the DRG over the activation set, then materialize the snapshot from
      the append-only event log before you emit the transition.
    good_example: |
      # In a first-run tutorial:
      Run `spec-kitty status` to see where each work package is. (Under the
      hood this reads an event log; you do not need to know the details yet.)
  - name: Passive, hedged, filler-laden instruction
    description: >
      Passive voice plus hedging plus filler turns a one-line instruction into a
      paragraph that hides who does what. Rewrite in the active voice, drop the
      hedges, and address the reader directly.
    bad_example: |
      It should be noted that, in order to proceed, the configuration file will
      need to be simply edited so that the value can be updated appropriately.
    good_example: |
      Edit `config.yaml` and set `timeout: 30`.

tooling:
  plain-language-review: "documentation mission validate action (human-in-the-loop readability review against this styleguide; no automated grade gate, but every published page is checked for audience fit, active voice, and consistent terminology)."

quality_test: >
  Can the named target reader for a page restate its point after one pass —
  with each paragraph leading with its bottom line, terms defined once and
  reused consistently, instructions in the active voice addressed to 'you', and
  no jargon that the named audience has not been given a gloss or link for?

references:
  - src/doctrine/missions/documentation/actions/discover/index.yaml
  - src/doctrine/styleguides/built-in/common-docs.styleguide.yaml
  - src/doctrine/tactics/built-in/communication/glossary-curation-interview.tactic.yaml
