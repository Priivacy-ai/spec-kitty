schema_version: "1.0"
id: docs-freshness-sla
title: Documentation Freshness SLA Styleguide
scope: docs
applies_to_languages: []

principles:
  - "Every page carries a freshness date. Frontmatter carries `updated: YYYY-MM-DD`, set to the date the page's content was last verified against reality — not the date of an incidental typo fix. The freshness date is the input to every staleness check; a page without one cannot be triaged and is treated as stale by default."
  - "Staleness thresholds are explicit and tiered by page volatility. A page is flagged stale when its `updated` date is older than the threshold for its tier. Tutorials and how-tos that track fast-moving surfaces (CLI, API) carry the tightest threshold; reference that is generated is re-freshened on every build; explanation and ADRs age slowest because rationale changes rarely. State the tier's threshold rather than leaving 'stale' to opinion."
  - "Behaviour change resets the clock regardless of the SLA. The freshness SLA is a backstop for silent drift, not a licence to defer. Any behaviour-changing change updates the affected pages and their `updated` date in the same change (the source-of-truth rule). The SLA catches the pages nobody touched; it never replaces same-change updates."
  - "Generated pages are freshened by regeneration, and their lockfile is freshness-gated. Auto-generated reference (rustdoc / JSDoc / Sphinx autodoc) and generated rollups (the page-inventory lockfile) are regenerated from source and a gate reds when the committed artifact drifts from what regeneration would produce. A generated page is never hand-patched to look fresh; it is regenerated."
  - "A stale page is triaged, not silently left live. When a page trips its threshold it enters a review: verify it against current behaviour and bump `updated`, or distil-and-retire it if the behaviour is gone. Prioritise the triage by reader impact — a stale tutorial for a core workflow blocks more users than a stale explanation of an edge case — using the gap-prioritization procedure. A tripped threshold is a work item, not a warning to ignore."
  - "Review cadence is scheduled, not incidental. Documentation is reviewed for freshness on a recurring cadence (for example, a periodic audit sweep), independent of whether anyone happened to edit it. The cadence is what surfaces the pages that no behaviour change touched but that reality has quietly outgrown."
  - "Deprecation and retirement are freshness outcomes, not clutter. The result of a freshness triage may be to mark a page `doc_status: deprecated | superseded` and schedule its retirement. Freshness is not only 'update the date' — it includes deciding a page should no longer be live."

patterns:
  - name: Verified-content freshness date
    description: >
      Set `updated` to the date the content was last checked against reality, so
      the staleness check measures information age, not edit age.
    good_example: |
      ---
      title: Claim and Implement a Work Package
      type: how-to
      doc_status: active
      updated: 2026-07-15   # content verified against current CLI behaviour today
      ---
    bad_example: |
      ---
      title: Claim and Implement a Work Package
      updated: 2026-07-15   # only a typo was fixed; behaviour last checked months ago
      ---
  - name: Tiered staleness threshold
    description: >
      Assign a staleness threshold by the page's volatility tier so fast-moving
      surfaces are flagged sooner than slow-moving rationale.
    good_example: |
      # Freshness tiers (illustrative):
      #   tutorial / how-to (CLI, API):   flag after 90 days
      #   hand-written reference:          flag after 180 days
      #   generated reference:             re-freshened every build
      #   explanation / ADR:               flag after 365 days
    bad_example: |
      # "It feels old" — no threshold, so nothing is ever consistently flagged.

anti_patterns:
  - name: Freshness date bumped without re-verifying content
    description: >
      Touching `updated` for a cosmetic edit resets the staleness clock without
      anyone having checked the page against current behaviour, defeating the
      whole SLA. Bump the date only when the content was actually verified.
    bad_example: |
      A find-and-replace across 200 pages bumps every `updated` to today; the
      staleness sweep now reports a fully-fresh corpus that nobody verified.
    good_example: |
      Only the pages whose content was re-checked against current behaviour get
      a bumped `updated`; the rest keep their real date and stay eligible to be
      flagged.
  - name: Hand-patching a generated page to look current
    description: >
      Editing generated output by hand to fix a drifted value makes the page
      diverge from its source and defeats the regeneration gate. Fix the source
      and regenerate.
    bad_example: |
      Hand-editing a signature in Sphinx-generated `docs/api/` so it matches the
      code, instead of re-running autodoc.
    good_example: |
      Update the annotated source and re-run the generator; the freshness gate
      then confirms the committed output matches regeneration.

tooling:
  freshness-date-present: "documentation mission validate action (asserts every page carries an `updated: YYYY-MM-DD` and flags pages past their tier threshold as stale)."
  generated-page-lockfile-gate: "page-inventory lockfile freshness gate (regenerates the rollup FROM frontmatter and reds on drift; see common-docs.styleguide.yaml `frontmatter-ssot-lockfile`)."
  stale-page-triage: "src/doctrine/procedures/built-in/documentation-gap-prioritization.procedure.yaml (triage flagged-stale pages by reader impact and fill or retire in priority order)."

quality_test: >
  For any documentation page, can you tell whether it is fresh — does it carry a
  verified `updated` date, is it within its tier's staleness threshold, was its
  clock reset by any behaviour change that touched it, are generated pages kept
  current by regeneration rather than hand-patching, and does every tripped
  threshold become a prioritised triage rather than a page silently left live?

references:
  - src/doctrine/directives/built-in/037-living-documentation-sync.directive.yaml
  - src/doctrine/procedures/built-in/documentation-gap-prioritization.procedure.yaml
  - src/doctrine/styleguides/built-in/common-docs.styleguide.yaml
  - src/doctrine/styleguides/built-in/publication-authority.styleguide.yaml
