schema_version: "1.0"
id: divio-type-discipline
title: Divio Type Discipline Styleguide
scope: docs
applies_to_languages: []

principles:
  - "One document, one Divio type. Every documentation page is exactly one of the four Divio quadrants — Tutorial, How-To, Reference, or Explanation — and declares that type in its frontmatter. A page that tries to be two types at once serves neither audience: a tutorial that pauses to explain architecture loses the beginner; a reference that narrates rationale loses the working developer scanning for a signature."
  - "Match the type to the reader's situation, not to the author's convenience. Tutorials serve a beginner who is learning by doing and needs a guaranteed-to-work path. How-tos serve a competent user with a specific goal in the middle of real work. Reference serves a working developer who already knows what they want and needs an accurate, exhaustive description. Explanation serves an architect or decision-maker who wants to understand why. Choosing the wrong quadrant is the most common documentation defect."
  - "Tutorials are learning-oriented and must not branch. A tutorial holds the reader's hand from a known start to a concrete, motivating result. It makes decisions for the reader, avoids alternatives and caveats, and every step must succeed for a first-time user on a clean environment. Optional detours, edge cases, and 'you could also' asides belong in a how-to or reference, never in a tutorial."
  - "How-tos are task-oriented and goal-scoped. A how-to answers 'how do I achieve X?' for a reader who already has context. It states the goal, lists prerequisites, and gives the minimal ordered steps to the outcome. It does not teach fundamentals (link to a tutorial) and does not exhaustively describe every option (link to reference)."
  - "Reference is information-oriented, exhaustive, and neutral. Reference describes the machinery — APIs, CLI flags, configuration keys, schema fields — accurately and completely, in a consistent structure, without narrative or opinion. It is consulted, not read front-to-back. Reference is where auto-generation (rustdoc, JSDoc, Sphinx autodoc) belongs; hand-written prose in a reference page is a smell unless it documents contract semantics the generator cannot infer."
  - "Explanation is understanding-oriented and discusses trade-offs. Explanation illuminates a topic from a higher altitude — design rationale, historical context, alternatives considered, why the system is shaped the way it is. It is the natural home for the asides that would derail a tutorial or clutter a reference. An Architecture Decision Record is a bounded, dated form of explanation."
  - "Cross-link across quadrants instead of merging them. When a reader following one quadrant needs another, link — a tutorial links to reference for the full option list; a how-to links to explanation for the rationale. Linking preserves each page's single-audience focus while giving the reader a path to the adjacent need."

patterns:
  - name: Frontmatter declares the Divio type
    description: >
      Every documentation page names its Divio type in frontmatter so the
      docsite can group by quadrant and a reviewer can check type discipline
      mechanically. Low-confidence auto-classification is resolved by an
      explicit type declaration, not left ambiguous.
    good_example: |
      ---
      title: Send Your First Request
      type: tutorial
      doc_status: active
      ---
    bad_example: |
      ---
      title: Requests
      # no type — the docsite cannot group it, a reviewer cannot check discipline
      ---
  - name: Split a mixed page along the quadrant seam
    description: >
      When a page mixes a walkthrough with an exhaustive option table and a
      paragraph of rationale, split it into a tutorial, a reference page, and an
      explanation, then cross-link. Each surviving page serves one reader.
    good_example: |
      docs/guides/first-request.md      # type: tutorial (the happy path)
      docs/api/request-options.md       # type: reference (every flag)
      docs/architecture/why-requests.md # type: explanation (the rationale)
    bad_example: |
      docs/requests.md  # a tutorial intro, then every CLI flag, then a
                        # "Design Notes" section — three audiences, one page

anti_patterns:
  - name: Tutorial that branches on reader choices
    description: >
      A tutorial that says "if you prefer X do this, otherwise do that" forces a
      first-time learner to make a decision they lack the context to make. The
      guaranteed-path contract of a tutorial is broken the moment it branches.
    bad_example: |
      ## Step 3
      If you use Postgres, run the migration with `--pg`; if you use SQLite,
      skip the flag; if you are on Windows you may need to quote the path...
    good_example: |
      ## Step 3
      Run the migration:
          spec-kitty migrate
      (This tutorial uses the default SQLite backend. To target Postgres, see
      the how-to: Configure a Postgres backend.)
  - name: Reference page carrying narrative rationale
    description: >
      Reference must be scannable and neutral. Folding the "why" into a
      reference entry bloats it and buries the fact the reader came to look up.
      Move rationale to an explanation page and link to it.
    bad_example: |
      ### `--force`
      Forces the transition. We added this in 2026 after a long debate about
      whether terminal lanes should ever be re-openable; the team decided...
    good_example: |
      ### `--force`
      Overrides the terminal-lane guard, permitting a transition out of `done`
      or `canceled`. See Explanation: Terminal lane semantics for the rationale.

tooling:
  divio-type-frontmatter: "documentation mission validate action (asserts every published page declares exactly one Divio type in frontmatter and that tutorials contain no branching prose)."

quality_test: >
  For any documentation page, can a reader name its single Divio quadrant from
  the frontmatter, and does the page's content stay within that quadrant's
  contract — a tutorial that never branches, a how-to that never teaches
  fundamentals, a reference that never narrates, an explanation that never
  walks a first-run — with cross-links (not merges) to the adjacent needs?

references:
  - src/doctrine/missions/documentation/templates/divio/tutorial-template.md
  - src/doctrine/missions/documentation/templates/divio/howto-template.md
  - src/doctrine/missions/documentation/templates/divio/reference-template.md
  - src/doctrine/missions/documentation/templates/divio/explanation-template.md
  - src/doctrine/styleguides/built-in/common-docs.styleguide.yaml
