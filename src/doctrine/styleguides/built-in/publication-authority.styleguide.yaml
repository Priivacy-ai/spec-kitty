schema_version: "1.0"
id: publication-authority
title: Publication Authority Styleguide
scope: docs
applies_to_languages: []

principles:
  - "Code is the source of truth; documentation mirrors shipped behaviour. Documentation describes what the system actually does, never what it was hoped to do or what an old design intended. When code and docs disagree, the code is right and the docs are the defect. A page that documents behaviour the code does not implement is worse than no page — it manufactures false confidence. This is the source-of-truth half of publication authority (FR-005: source-of-truth)."
  - "Every behaviour-changing change updates its documentation in the same change. A change that alters observable behaviour — a CLI flag, an API response, a config key, a workflow step — carries the matching documentation edit in the same commit or the same mission. Documentation is not a follow-up ticket; deferring it is how docs drift from reality. This operationalises the living-documentation-sync directive at authoring time."
  - "Reference that can be generated from the code is generated, not hand-copied. API signatures, CLI flags, and schema fields are extracted from the source (rustdoc, JSDoc, Sphinx autodoc) so they cannot drift from it. Hand-transcribing a signature into prose creates a second copy that silently goes stale. Hand-write only the contract semantics a generator cannot infer."
  - "Publication is a gate, not a default. A page is published only after it passes the mission's validate action — Divio-type discipline, plain-language, accessibility, freshness, and source-of-truth fidelity are all green. Publishing is a deliberate, gated step in the publish action; a draft is never live by accident. This is the publication half of publication authority (FR-005: publication)."
  - "One canonical home per fact; cross-reference instead of copying. Each fact lives in exactly one authoritative page and every other page links to it. Copy-pasting a fact into a second page creates two sources of truth that drift apart; the reader then cannot tell which is current. Curate by linking, and by distilling-then-retiring stale copies, not by duplicating."
  - "Retire superseded documentation deliberately; do not leave it live. When a document no longer describes supported behaviour, distil its still-useful content into a decision (an ADR) or a design page and then retire the original, rather than leaving a stale page published where a reader will trust it. Deprecation is marked (`doc_status: deprecated | superseded`), not silent."
  - "Provenance is explicit: mark drafts, generated pages, and deprecations. Frontmatter states a page's lifecycle (`doc_status`) and whether it is generated, so a reader and a gate can tell a live authoritative page from a draft, an auto-generated reference, or a retired one. Authority you cannot see is authority you cannot trust."

patterns:
  - name: Behaviour change ships with its doc edit
    description: >
      Bundle the documentation update into the same change as the behaviour it
      describes, so the published docs never lag the shipped code.
    good_example: |
      # One commit / one mission:
      src/.../transitions.py      # add the --force override
      docs/reference/status.md    # document --force in the same change
    bad_example: |
      # Behaviour merged now; docs "to be updated later" in a follow-up
      # ticket that is never picked up — published docs now lie.
  - name: Generated reference over hand-copied signatures
    description: >
      Extract reference content from the source so it cannot drift; reserve
      hand-written prose for semantics the generator cannot infer.
    good_example: |
      docs/api/  generated by Sphinx autodoc from the annotated source;
      a short hand-written note explains the contract each endpoint upholds.
    bad_example: |
      docs/api/  a hand-maintained list of function signatures, already three
      releases out of date because nobody re-typed the last change.

anti_patterns:
  - name: Aspirational documentation ahead of the code
    description: >
      Documenting intended-but-unshipped behaviour makes the docs assert
      something the code does not do. The reader trusts the page and is misled.
      Document shipped behaviour only; keep intent in the spec or an ADR.
    bad_example: |
      # In published reference, for a flag that does not exist yet:
      Use `--parallel` to run work packages concurrently.
    good_example: |
      # The flag is still a proposal — it lives in the spec, not in reference.
      # Published reference documents only the flags the CLI actually exposes.
  - name: Duplicated fact with no canonical home
    description: >
      Copying the same fact into several pages creates rival sources of truth
      that drift. Keep one canonical page and link to it from the rest.
    bad_example: |
      The retention window "30 days" is stated verbatim in the tutorial, the
      how-to, and two reference pages; a policy change updates only one.
    good_example: |
      The retention window is stated once in docs/reference/retention.md; the
      tutorial and how-to link to it. One change updates every reader.

tooling:
  living-documentation-sync: "src/doctrine/directives/built-in/037-living-documentation-sync.directive.yaml (binds every behaviour-changing change to a same-change documentation update)."
  publication-gate: "documentation mission publish action (a page goes live only after the validate action is green — Divio type, plain language, accessibility, freshness, and source-of-truth fidelity all pass)."

quality_test: >
  Does every published page describe only behaviour the code actually ships,
  with each fact living in exactly one canonical home, generated reference
  extracted from source rather than hand-copied, behaviour changes carrying
  their doc edits in the same change, and publication reached only through the
  green validate gate — never as a silent default?

references:
  - src/doctrine/directives/built-in/037-living-documentation-sync.directive.yaml
  - src/doctrine/directives/built-in/042-common-docs.directive.yaml
  - src/doctrine/tactics/built-in/communication/usage-examples-sync.tactic.yaml
  - src/doctrine/styleguides/built-in/common-docs.styleguide.yaml
