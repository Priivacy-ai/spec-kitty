schema_version: "1.0"
id: docs-accessibility
title: Documentation Accessibility Styleguide
scope: docs
applies_to_languages: []

principles:
  - "Every non-decorative image carries descriptive alt text. Screenshots, diagrams, and figures that convey information must have alt text that communicates the same information to a reader using a screen reader. The alt text describes what the image says, not that it is an image — 'Kanban board with WP01 in review and WP02 approved', not 'screenshot'. Purely decorative images carry empty alt (`alt=\"\"`) so assistive tech skips them."
  - "Headings form a strict, unbroken outline. Heading levels descend by exactly one and never skip — an H2 is followed by H3 for its subsection, never by H4. There is exactly one H1 (the page title). Screen-reader users navigate by heading outline; a skipped or misused level breaks that navigation. Headings are used for structure, never for visual size."
  - "Link text is meaningful out of context. A link's visible text states its destination or action — 'read the execution-lanes architecture' — because assistive tech can present a list of links stripped of surrounding prose. 'Click here', 'this', 'read more', and a bare URL are prohibited as link text; they are meaningless in that list and give no cue about where the link goes."
  - "Do not rely on colour, or on diagrams, as the sole carrier of meaning. Information encoded only in colour (red = failed, green = passed) is lost to colour-blind readers and to anyone reading in monochrome. Pair colour with a label, shape, or text. Likewise, never state a fact only inside a diagram: a Mermaid or PlantUML diagram is an enhancement, and the same relationship must also be stated in the surrounding prose so a reader who cannot see the render still gets it."
  - "Diagrams meet contrast and labelling standards, and are text-authored. Author diagrams as text (Mermaid / PlantUML) so they are diffable, greppable, and re-themable, and so their node labels are real text rather than baked-in pixels. Ensure node/edge labels have sufficient contrast against their fill; do not encode a category by fill colour alone — also label it."
  - "Tables have headers; data is not laid out with whitespace. Use real table markup with a header row so screen readers can announce each cell's column. Never simulate a table with aligned spaces or tabs — it collapses into an unreadable run of text for assistive tech."
  - "Code blocks are fenced with a language, and prose never depends on syntax colour. Fence every code block and tag its language so it is announced and highlighted consistently. Any meaning a reader might take from highlight colour must also be present in the code or a comment, because highlighting is theme- and reader-dependent."

patterns:
  - name: Informative alt text that carries the image's message
    description: >
      Write alt text that conveys what the image communicates, so a
      screen-reader user receives the same information a sighted reader does.
      Reserve empty alt for purely decorative images.
    good_example: |
      ![Kanban board: WP01 in review, WP02 approved, WP03 blocked on WP01](board.png)
    bad_example: |
      ![screenshot](board.png)
      ![image1](board.png)
  - name: Self-describing link text
    description: >
      Make the visible link text name its destination so it stands alone in a
      screen reader's link list.
    good_example: |
      See the [execution-lanes architecture](docs/architecture/execution-lanes.md)
      for how worktrees map to lanes.
    bad_example: |
      For how worktrees map to lanes, [click here](docs/architecture/execution-lanes.md).

anti_patterns:
  - name: Skipped or size-driven heading levels
    description: >
      Jumping heading levels, or picking a level for its font size, destroys the
      document outline that screen-reader users navigate by. Descend one level
      at a time and use headings only for structure.
    bad_example: |
      # Configuration
      #### A small note        <!-- jumped H1 -> H4 for visual smallness -->
    good_example: |
      # Configuration
      ## Backends
      ### SQLite
  - name: Meaning carried only by colour or only by a diagram
    description: >
      Encoding status purely in colour, or stating a relationship only inside a
      diagram, excludes colour-blind readers and anyone who cannot see the
      render. Add a text label and restate the diagram's facts in prose.
    bad_example: |
      Lanes shown in red are blocked.   <!-- colour is the only signal -->
      (relationship shown only in the Mermaid graph, never in the text)
    good_example: |
      Blocked lanes are marked **blocked** and shown in red.
      As the diagram shows, WP03 is blocked on WP01 — WP03 cannot be claimed
      until WP01 is approved (this dependency is also stated here in prose).

tooling:
  alt-text-and-heading-check: "documentation mission validate action (asserts every non-decorative image has non-empty alt text, the heading outline descends without skips, and no link text is a bare 'click here'/URL)."
  diagram-accessibility: "src/doctrine/toolguides/built-in/mermaid-diagramming.toolguide.yaml and plantuml-diagramming.toolguide.yaml (text-authored diagrams with labelled, contrasting nodes; relationships also stated in prose)."

quality_test: >
  Can a reader using a screen reader or a monochrome display obtain every fact
  the page carries — each informative image described in alt text, the heading
  outline unbroken, every link self-describing, no meaning locked in colour or
  inside a diagram alone, and every table and code block properly marked up?

references:
  - src/doctrine/toolguides/built-in/mermaid-diagramming.toolguide.yaml
  - src/doctrine/toolguides/built-in/plantuml-diagramming.toolguide.yaml
  - src/doctrine/styleguides/built-in/common-docs.styleguide.yaml
