schema_version: "1.0"
id: legacy-codebase-triage
name: Legacy Codebase Triage
purpose: >
  Convert an unfamiliar brownfield codebase into a defensible action plan
  by gathering version-control evidence, overlaying structural and
  complexity signals, optionally classifying domains, and bucketing the
  resulting findings into fix-this-week, fix-this-quarter, do-not-worry,
  and parallelisable work. The output is a triage document that anchors
  subsequent planning conversations and ADRs; it is not a replacement
  for deeper investigation, only a fast, evidence-backed first pass.
entry_condition: >
  A brownfield engagement has begun (new maintainer, acquisition,
  takeover, or audit request) and the team has no current architectural
  map of the codebase, OR an explicit audit has been requested by the
  decision authority. Entry also fires when an existing project has
  drifted enough that the previous map is no longer trustworthy.
exit_condition: >
  A triage report has been produced containing: the audit exclusion list,
  hotspot table (churn, bug, complexity overlay), bus-factor table,
  velocity series, firefighting count and ratio, optional domain
  classification overlay, and a bucketed action plan
  (fix-this-week / fix-this-quarter / don't-worry / parallelisable).
  Each bucket lists concrete files or modules with a short rationale.
  The triage report has been reviewed by at least one human stakeholder
  and is linked from any subsequent ADR, prestudy, or work package that
  cites it.
steps:
  - title: Confirm scope and exclusion list
    description: >
      With the requesting stakeholder, agree the audit window (default
      one year), the repositories in scope, and the vanity-file exclusion
      list (lockfiles, generated bundles, vendored dependencies, snapshot
      fixtures, translation catalogs). Record the agreement in the triage
      report header so the audit is reproducible.
    actor: human
    on_failure: >
      If scope cannot be agreed (for example because ownership of related
      repositories is unclear), record the gap as a known limitation in
      the report and proceed with the narrower scope rather than blocking.
  - title: Run the forensic repository audit
    description: >
      Execute the forensic-repository-audit tactic end-to-end against
      the agreed scope. Produce the churn table, bus-factor table,
      bug-hotspot table, velocity series, firefighting count, and
      complexity overlay. Do not interpret the findings yet; this step
      is evidence collection only. The audit report sections feed
      directly into the triage report.
    actor: agent
  - title: Cross-reference hotspots with bug and complexity data
    description: >
      Compute the intersection sets from the audit output: files in
      both the top churn list and the top bug-hotspot list (refactor
      priorities); files in both the top complexity list and the top
      churn list (load-bearing complexity); files with single-author
      ownership above seventy percent that also appear in any hotspot
      list (knowledge-transfer priorities). Each intersection becomes a
      candidate for the action buckets in step 6.
    actor: agent
  - title: Optional — apply strategic domain classification overlay
    description: >
      If the project has identifiable bounded contexts (or the engagement
      has produced a context map separately), apply the
      strategic-domain-classification tactic to the audit findings.
      Hotspots in core domains warrant disproportionate investment;
      hotspots in generic subdomains may be candidates for replacement
      with off-the-shelf alternatives rather than refactoring. Skip this
      step entirely if no context map exists yet — do not stall the
      triage on a discovery exercise that is out of scope here.
    actor: agent
    on_failure: >
      If the overlay reveals that domains are too tangled to classify
      meaningfully, record the observation as a follow-up
      (event-storming or context discovery) rather than blocking the
      triage. The triage proceeds without the overlay.
  - title: Optional — gather security and dependency signals
    description: >
      Run lightweight security and dependency probes appropriate to the
      stack (`pip-audit`, `npm audit`, `bundler-audit`, `cargo audit`,
      or equivalent SBOM scan) and capture the headline counts of high
      and critical findings. Attach as an appendix to the triage report.
      This is a lightweight overlay, not a full security assessment;
      flag any finding that meaningfully changes the action buckets.
    actor: agent
  - title: Bucket findings using Eisenhower prioritisation
    description: >
      Apply the eisenhower-prioritisation tactic to the consolidated
      findings. Map every candidate to one of four buckets:
      'fix this week' (high importance, high urgency: load-bearing
      complexity that recently produced a fire);
      'fix this quarter' (high importance, lower urgency: hotspots that
      have not yet failed but will);
      'don't worry' (low importance regardless of urgency: noisy but
      stable, or out of scope);
      'parallelisable' (independent of the critical path, candidates for
      delegation, automation, or a separate work package).
      Each bucket entry must cite the evidence that placed it there
      (which table, which intersection).
    actor: agent
  - title: Compile the triage report and review with stakeholders
    description: >
      Assemble the triage report: scope and exclusion list, audit
      tables, intersections, optional domain overlay, optional security
      appendix, and the bucketed action plan. Review with the
      requesting stakeholder and the team that will execute the
      remediation work. Capture corrections, accept the report, and
      link it from any subsequent ADR, prestudy, or work package.
    actor: human
    on_success: >
      The triage is complete. The accepted report is the canonical
      input to the planning conversation that follows. When the
      brownfield-investigation skill (issue #665/#666) becomes
      available, this triage feeds into it as the first-pass evidence
      base; until then, the triage stands on its own as the
      decision-grade output of the procedure.
anti_patterns:
  - name: Treating triage as a verdict
    description: >
      The buckets are an action plan, not a judgement on the team or
      the codebase. Files in 'fix this week' are not bad; they are
      load-bearing and fragile, which is information about how to
      invest, not a moral claim.
  - name: Skipping the exclusion list
    description: >
      Without the vanity-file exclusion list agreed in step 1, the
      churn and bug-hotspot tables will be dominated by lockfiles and
      generated bundles. Any triage that omits the exclusion list is
      invalid and must be re-run.
  - name: Blocking on the optional steps
    description: >
      The domain-classification overlay (step 4) and the security
      overlay (step 5) are explicitly optional. Treat them as
      enrichments, not gates. A triage with a clean audit and a
      sound bucket plan is decision-grade even without either overlay.
  - name: Substituting triage for deeper investigation
    description: >
      This procedure produces a first-pass evidence base. It is not
      the brownfield-investigation skill (issue #665/#666), is not a
      default gate on any mission, and does not replace event storming,
      context discovery, threat modelling, or full architecture review
      where those are warranted. Cite this triage as input to those
      activities; do not let it stand in for them.
  - name: Over-reading squash-merged history
    description: >
      Repositories that squash every PR collapse multi-commit work into
      single events; the audit recipes will undercount activity. The
      triage must note the merge strategy and corroborate with PR
      metadata or issue-tracker data before drawing strong conclusions.
references:
  - type: tactic
    id: forensic-repository-audit
    reason: The forensic-repository-audit tactic is the evidence-gathering core of this procedure; step 2 invokes it directly.
  - type: tactic
    id: strategic-domain-classification
    reason: Optional overlay invoked in step 4 when the project has identifiable bounded contexts.
  - type: tactic
    id: eisenhower-prioritisation
    reason: Step 6 buckets the consolidated findings into the urgency-and-importance matrix that drives the action plan.
  - type: tactic
    id: connascence-analysis
    reason: After triage identifies refactor priorities, connascence analysis classifies the coupling that drives the hotspot status.
  - type: tactic
    id: premortem-risk-identification
    reason: Before scheduling any large remediation work that the triage flags, run a premortem on the proposed plan.
  - type: procedure
    id: situational-assessment
    reason: When the triage uncovers questions larger than its scope, escalate into a full situational assessment to establish shared context before design.
  - type: directive
    id: DIRECTIVE_028
    reason: Governs the local tooling (git, cloc, language-specific complexity probes) the procedure relies on.
  - type: directive
    id: DIRECTIVE_001
    reason: Triage findings that surface load-bearing complexity or single-author critical modules feed architectural-integrity decisions.
  - type: directive
    id: DIRECTIVE_003
    reason: The accepted triage report is itself a documented decision input and is linked from any subsequent ADR or prestudy.
notes: |
  Out of scope.

  This procedure is *not* the brownfield-investigation skill described in
  issues #665 and #666. When that skill ships, this triage feeds into it
  as a first-pass evidence base; until then, the triage stands on its
  own as a decision-grade output. This procedure is also *not* a default
  gate on any mission — it fires only when the entry conditions match —
  and it does not encode the full body of Adam Tornhill's behavioural
  code analysis methodology, which the underlying audit tactic
  acknowledges as theoretical underpinning rather than cited recipe
  source.
