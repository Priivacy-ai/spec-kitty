schema_version: "1.0"
id: development-assist-test-cleanup
name: Development-Assist Test Cleanup
purpose: >
  Retire or re-home the development-assist tests a mission wrote to facilitate its
  own slices, once those slices have landed. It is common and legitimate to write
  targeted, narrowly-scoped tests to drive a development slice — characterization
  and parity oracles, before/after timing gates, per-work-package shape / delegate /
  __module__ assertions. Once the slice lands, those tests frequently become
  friction: inert (a self-compare against what is now the merged state), duplicative
  of a broader standing guard, or pinning transient code-shape that fights the next
  refactor. This procedure runs a judge-the-test pass at mission close so scaffolding
  is not carried forward as permanent suite bloat. It is the proactive,
  wrap-up-point-cut companion to DIRECTIVE_041's reactive judge-a-failing-test rubric.
entry_condition: >
  A mission's work packages are approved and the mission is at wrap-up (the
  dev-assist-test-cleanup step of the mission-wrap-up sequence, immediately after
  the accept step). The mission added or heavily modified test
  files to facilitate its own slices — characterization oracles, parity/timing
  gates, per-WP shape/delegate/re-export checks — that were justified while the slice
  was in flight.
exit_condition: >
  Every development-assist test the mission added has a recorded verdict — keep,
  retire, or split-by-kind. Retired tests are deleted (or folded into the standing
  guard they duplicated); kept tests that guard real behavior or standing
  architecture are named off any WP##/NFR-### mission label; mission mega-files that
  mixed kinds are split into purpose-named files. Any source docstring that named a
  moved or deleted test file is re-pointed. When the same spent pattern is
  copy-pasted across sibling files beyond this mission's diff, a suite-wide audit is
  filed as a tracked follow-up rather than swept inside the landing PR. The hand-off
  summary records which tests were retired / split / kept-and-renamed.
steps:
  - title: Identify — list the tests this mission added to assist development
    description: >
      From the mission's aggregate diff, list the test files and cases the mission
      created or heavily rewrote to drive its own slices, as opposed to guarding
      pre-existing product behavior. Typical tells: a WP##/NFR-### label in the name;
      a docstring that says the test exists to catch a regression "before" a
      broader guard for a more localized message; a subprocess `git show HEAD:...`
      snapshot compared against the working tree; a one-shot metric/LOC "recorder";
      a per-WP `__module__` / re-export / delegate-shape assertion. Do not touch
      tests that predate the mission — those are governed by DIRECTIVE_025 (tidy the
      campsite) and DIRECTIVE_041, not by this procedure.
    actor: agent
  - title: Judge — assign each a keep / retire / split verdict against the rubric
    description: >
      For each identified test, assign one verdict — KEEP, RETIRE, or
      SPLIT-BY-KIND — applying DIRECTIVE_041's keep-vs-delete axis and its rule that
      duplicate test knowledge has one source of truth, rather than inventing a
      parallel test-quality standard. KEEP — a genuine functional
      regression guard (real behavior, real fixtures, an observable contract) or a
      standing architectural invariant (complexity ceiling, import-cycle/DAG check)
      that outlives any one mission. RETIRE — a test that is (i) inert once the
      triggering slice lands (a self-compare whose "before" snapshot became the
      merged state; a metric/LOC recorder with no failure condition), (ii)
      duplicative of a broader standing guard (a per-WP shape/__module__/re-export
      check that repeats a family-wide compat-surface test — duplicate test
      knowledge has one source of truth), or (iii) pinning transient code-shape that
      will fight the next behavior-preserving refactor rather than protect real
      behavior. SPLIT-BY-KIND — a mission mega-file that mixes the two; do not delete
      it wholesale.
    actor: agent
  - title: Execute — retire, split, and re-home per the verdicts
    description: >
      Delete each RETIRE test (or fold it into the standing guard it duplicated),
      following delete-the-assertion-not-the-test: excise only the spent assertion,
      never coverage of a live contract. For each SPLIT file, separate the cases into
      purpose-named files — functional / behavioral-compat / standing-arch — that
      survive the next refactor, instead of a per-WP mission-named file that reads as
      disposable. For each KEEP promoted out of a mission file, strip the WP##/NFR-###
      label from its name so it no longer signals "belongs to a finished slice" and
      re-invite the same audit question next time. Re-point any source docstring that
      named a moved or deleted test file. Re-run the affected tests to confirm the
      retained coverage is green.
    actor: agent
    on_failure: >
      If deleting a duplicate would drop the only coverage of a contract the standing
      guard does not actually assert, it was not a duplicate — keep and rename it
      instead of deleting. If a promoted test then goes red, it caught a real product
      break: fix the product, never weaken the test to land the cleanup (DIRECTIVE_041).
  - title: Scope the residue — file the suite-wide audit rather than sweep it
    description: >
      The same spent pattern is usually copy-pasted across sibling files beyond this
      mission's diff. Do not sweep the whole suite inside the landing PR — that
      inflates the diff and re-triggers review of unrelated files. File a tracked
      issue for the suite-wide audit (verdict per candidate: keep-and-rename or
      retire), referencing this procedure and the test-suite-friction epic, and note
      in the hand-off which candidates are in-mission (done here) versus deferred to
      that audit.
    actor: agent
anti_patterns:
  - name: Merge the scaffolding, clean it up "later"
    description: >
      Landing a mission's development-assist tests as-is and trusting a future pass
      to retire them. The friction compounds: inert self-compares and duplicated
      shape checks accumulate as permanent suite bloat, and the "later" audit rarely
      comes. Judge at the point-cut where the scaffolding was created.
  - name: Delete a mega-file wholesale
    description: >
      Treating a mixed mission test file as all-scaffold and deleting it to remove
      the friction, dropping the genuine functional and arch invariants buried in it.
      Split by kind and keep those; only the spent cases are retired.
  - name: Retire coverage disguised as a duplicate
    description: >
      Deleting a per-WP check as "duplicative" when the family-wide guard does not
      actually assert the same contract. Confirm the standing guard covers it before
      deleting; if it does not, the test is not a duplicate — keep and rename it.
  - name: Keep the WP/NFR label on a promoted test
    description: >
      Leaving a WP##/NFR-### label on a test promoted to standing status. The label
      signals "belongs to a finished slice," inviting the same audit churn next time
      and misrepresenting a durable guard as disposable.
  - name: Sweep the whole suite in the landing PR
    description: >
      Auditing and rewriting every sibling file that shares the pattern inside the
      mission's own PR, inflating the diff far past the mission's scope. The
      in-mission cleanup covers the tests the mission created; the wider sweep is a
      tracked follow-up.
notes: |
  Trigger point-cut: the mission-wrap-up sequence, alongside the accept step and the
  tracer-files assess step. This procedure is proactive (audit passing dev-assist
  tests at close) where DIRECTIVE_041 is reactive (judge a test when it goes red);
  the two share one standard — a test earns its place by guarding a live contract,
  and duplicate test knowledge has one source of truth — rather than two rubrics.
  Note 041's STALE / PATCHWORK / VALID labels classify a *failing* test's
  provenance; this procedure's keep / retire / split classify a *passing* scaffold
  test's disposition — a distinct axis at a distinct trigger, not the same labels.

  Scope boundary: this governs test debt the CURRENT mission created as scaffolding.
  Pre-existing test debt in a touched area is DIRECTIVE_025 (Boy Scout Rule); a
  failing test mid-remediation is DIRECTIVE_041. Test-quality problems present at
  write time (xfail-masking, file:line ratchets, wiring-only assertions, placeholder
  data) are DIRECTIVE_041 and issue #2077 — a different trigger from this lifecycle
  check.

  Rubric summary: identify (what the mission added to assist itself) -> judge
  (keep / retire / split, applying DIRECTIVE_041's keep-vs-delete axis) -> execute
  (delete-the-assertion,
  split-by-kind, strip WP/NFR labels, re-point docstrings) -> scope the residue
  (file the suite-wide audit). Feeds the wrap-up hand-off summary the way tracer-files
  assess does.

  Provenance: folds the post-slice test-cleanup practice surfaced at mission
  runtime-bridge-degod (#2531) closeout and scoped by issue #2557, under the
  "tests as scaffold, not friction" test-suite-hygiene epic #2071.
references:
  - type: directive
    id: DIRECTIVE_041
    reason: >
      This procedure applies DIRECTIVE_041's keep-vs-delete axis and its
      duplicate-test-knowledge-has-one-source rule at a different trigger point — a
      proactive wrap-up audit of passing dev-assist tests, versus 041's reactive
      judgment of a failing test (whose STALE / PATCHWORK / VALID provenance labels
      are a distinct classification).
  - type: directive
    id: DIRECTIVE_025
    reason: >
      DIRECTIVE_025 (Boy Scout Rule) governs pre-existing debt in a touched area; this
      procedure governs debt the current mission itself created as scaffolding. The
      identify step defers to 025 for anything that predates the mission.
  - type: tactic
    id: delete-the-assertion-not-the-test
    reason: >
      The execute step retires spent assertions and folds duplicates into the standing
      guard following this tactic — excise the spent assertion, never coverage of a
      live contract.
  - type: procedure
    id: mission-tracer-files
    reason: >
      This cleanup fires at the same mission-close point-cut as the tracer-files
      assess step and feeds the same hand-off summary; both convert mission-local
      by-products (friction notes; scaffolding tests) into durable outcomes.
