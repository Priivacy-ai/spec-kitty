schema_version: "1.0"
id: spike-timebox-policy
name: Spike Timebox Policy
purpose: >
  Keep an investigative spike bounded and decision-driven. A spike exists to
  buy down a specific uncertainty, not to build production code or drift into
  open-ended exploration. This policy frames every spike around a written
  hypothesis, a fixed time budget, explicit exit criteria, and a
  decision-or-abandon outcome so that the investment is proportionate to the
  risk it retires and the finding is captured whether the spike succeeds or
  fails.
entry_condition: >
  A research or investigation mission has surfaced a specific, high-risk
  uncertainty (a technology fit, a feasibility question, an unknown domain
  behaviour, or an integration hazard) that cannot be resolved by reasoning
  or existing evidence alone, and the team is tempted to start building or
  investigating without a stated hypothesis or a stop rule.
exit_condition: >
  The spike has produced a written finding that either confirms or refutes the
  hypothesis, or a documented decision to abandon the line of investigation
  because the budget was exhausted without a conclusive result. In every case
  the outcome — decision, remaining uncertainty, and follow-up — is recorded
  as evidence so the next mission step can proceed on a documented basis
  rather than on recollection.
steps:
  - title: State the hypothesis
    description: >
      Write a single falsifiable hypothesis the spike will test — a claim that
      a concrete observation could confirm or refute. Name the specific
      uncertainty being retired and why it matters to the mission. A spike
      without a written hypothesis is exploration, not a spike; do not proceed
      until the hypothesis is stated in one or two sentences.
    actor: agent
    on_failure: >
      If the uncertainty cannot be phrased as a falsifiable hypothesis, the
      question is not yet ready for a spike. Return to scoping and decompose
      it into a sharper question before allocating any budget.
  - title: Fix the time budget
    description: >
      Agree an explicit, small time budget (hours or a single day, not open
      ended) proportionate to the risk the hypothesis retires. Record the
      budget and its start time. The budget is a hard stop, not a target — a
      spike that overruns has already produced its most important finding:
      that the question is larger than assumed.
    actor: human
    on_failure: >
      If no bounded budget can be agreed because the risk feels unbounded,
      escalate the uncertainty to the decision authority as a named risk
      rather than opening an unbounded spike.
  - title: Define the exit criteria
    description: >
      Before starting, write down what observation will count as confirming
      the hypothesis, what will count as refuting it, and what will count as
      inconclusive. Exit criteria are set in advance so the outcome cannot be
      rationalised after the fact. Keep the spike safe-to-fail: run it in a
      throwaway branch, sandbox, or scratch space, never against production
      surfaces.
    actor: agent
  - title: Run the spike within the budget
    description: >
      Investigate against the exit criteria and stop when either an exit
      criterion is met or the time budget is exhausted, whichever comes first.
      Do not extend the budget silently mid-run; capture observations as they
      accumulate so a partial result is still usable if the budget expires.
    actor: agent
    on_failure: >
      If the budget expires before any exit criterion is met, stop anyway and
      record the result as inconclusive. Do not roll the budget forward on the
      same hypothesis without an explicit new decision.
  - title: Decide or abandon and record the finding
    description: >
      Convert the spike into a documented decision: confirmed, refuted, or
      abandoned as inconclusive. Record the hypothesis, the budget spent, the
      observations, the decision, any residual uncertainty, and the
      recommended follow-up as evidence. A spike whose finding is not written
      down has not retired its uncertainty for anyone but its author.
    actor: agent
    on_success: >
      The finding is captured as evidence and linked from the mission's
      research output. The retired (or explicitly deferred) uncertainty feeds
      the next scoping, synthesis, or decision step.
anti_patterns:
  - name: Budgetless Spike
    description: >
      Starting an investigation with no agreed stop rule, so the spike
      silently expands into open-ended work that competes with delivery.
  - name: Rationalised Outcome
    description: >
      Deciding what the spike "proved" after the fact because no exit criteria
      were written in advance, turning an investigation into confirmation of a
      pre-held belief.
  - name: Unwritten Finding
    description: >
      Reaching a conclusion in the investigator's head and moving on without
      recording the hypothesis, evidence, and decision, so the uncertainty is
      only retired for one person.
references:
  - type: directive
    id: DIRECTIVE_003
    reason: >
      The spike terminates in a documented decision-or-abandon outcome; the
      decision-documentation requirement governs how that finding is recorded.
  - type: tactic
    id: safe-to-fail-experiment
    reason: >
      A timeboxed spike is a safe-to-fail experiment: bounded, reversible, and
      run in a throwaway space so a failed hypothesis costs only the budget.
