schema_version: "1.0"
id: example-mapping-workshop
name: Example Mapping Workshop
purpose: >
  Turn a behavior request into concrete rules, examples, and open questions
  that stakeholders and implementers can share as a canonical specification
  set.
entry_condition: >
  A feature, change request, or ambiguous requirement needs shared
  understanding before planning or implementation. At least one stakeholder,
  domain expert, or authoritative source is available to validate examples.
exit_condition: >
  A small set of business-readable examples, explicit rules, open questions,
  and candidate acceptance checks has been captured and confirmed as the
  current source of truth for the behavior.
steps:
  - title: Frame the behavior slice
    description: >
      State the user goal, the system boundary under discussion, and what would
      count as success or rejection for this slice of behavior.
    actor: agent
  - title: Collect concrete examples and counterexamples
    description: >
      Gather representative happy-path, edge-case, and failure examples using
      domain language. Prefer real business situations over invented technical
      cases.
    actor: human
  - title: Separate rules, examples, and questions
    description: >
      Sort the conversation into stable rules, illustrative examples, and open
      questions that block shared understanding. Remove implementation detail
      from the examples.
    actor: agent
  - title: Choose canonical examples
    description: >
      Select the smallest example set that still exposes the important rules,
      boundaries, and exceptions. Mark which examples should become executable
      acceptance checks first.
    actor: agent
  - title: Confirm the source-of-truth set
    description: >
      Review the selected examples and rules with the stakeholder or
      human-in-charge. Resolve wording issues and confirm the examples match
      the intended business behavior.
    actor: human
    on_failure: >
      If agreement cannot be reached, record the disputed rules and open
      questions explicitly. Do not present the example set as settled
      doctrine.
  - title: Publish traceable outputs
    description: >
      Record the approved examples, their linked requirement or task IDs, and
      the chosen verification approach so later implementation and review work
      can follow the chain.
    actor: agent
anti_patterns:
  - name: Example theater
    description: >
      Producing many examples that are never used for acceptance or review,
      turning the workshop into documentation overhead instead of a delivery
      aid.
  - name: Implementation leakage
    description: >
      Writing examples in terms of database fields, internal services, or UI
      widgets rather than observable business behavior.
  - name: Happy-path only
    description: >
      Capturing only success stories and missing the boundaries, exceptions,
      and rejection cases that actually define the contract.
  - name: Unvalidated examples
    description: >
      Treating agent-generated examples as authoritative without stakeholder or
      source validation.
references:
  - type: directive
    id: DIRECTIVE_037
    reason: >
      The workshop produces the canonical examples governed by the Examples Are
      Source of Truth directive.
  - type: tactic
    id: acceptance-test-first
    reason: >
      Stable canonical examples should hand off cleanly into executable
      acceptance checks.
  - type: tactic
    id: living-documentation-sync
    reason: >
      Approved examples need an explicit sync step so docs, specs, and
      verification artifacts do not drift.
