# Fix 2 (mission #2364 aggregate-review remediation, #2369): task_class_map.py
# emits 21 distinct task_type ids across the maintained verb namespace, but
# this catalog originally defined only 5 -- overlapping on exactly
# code-review. Every other verb's recommendation was silently inert
# (recommendation.candidates always empty -> _compute_recommendation always
# None). Expanded here so every task_class_map task_type has task_fit
# coverage across all three models, grouped into the three capability tiers
# already implicit in the original 5:
#
# - hard-judgment (strong model favored, quality_sensitivity high,
#   cost_sensitivity low): architecture-design, sizing-judgment, code-review
#   (pre-existing) + analysis, design, investigation, planning,
#   prioritization, quality-assessment, quality-audit, synthesis,
#   task-decomposition, validation (new). task_fit mirrors
#   architecture-design's per-model profile.
# - implementation (balanced, quality_sensitivity medium, cost_sensitivity
#   medium): implementation (pre-existing) + code-generation,
#   code-implementation, code-refinement (new). task_fit mirrors
#   implementation's per-model profile.
# - mechanical (cheap model favored, quality_sensitivity low,
#   cost_sensitivity high): mechanical-edit (pre-existing) + classification,
#   drafting, summarization, curation, monitoring, coordination, delegation
#   (new). task_fit mirrors mechanical-edit's per-model profile; each new
#   mechanical task_type also gets the same tier_constraints cap as
#   mechanical-edit (max_tier: medium), mirroring the existing pattern.
task_types:
  - id: architecture-design
    title: Architecture & Design Judgment
    description: >
      Bounded-context modeling, module-boundary decisions, and evaluating
      trade-offs between competing designs.
    quality_sensitivity: high
    cost_sensitivity: low
  - id: sizing-judgment
    title: Sizing & Fakeability Judgment
    description: >
      Judging whether a work-package decomposition is realistically sized
      and whether a Definition of Done is fakeable.
    quality_sensitivity: high
    cost_sensitivity: low
  - id: code-review
    title: Adversarial Code Review
    description: >
      Reviewing a diff for correctness, fidelity to spec, and code-truth —
      catching what a confident summary or a green check would hide.
    quality_sensitivity: high
    cost_sensitivity: medium
  - id: implementation
    title: Implementation
    description: >
      Writing production code and tests against an approved spec/plan.
    quality_sensitivity: medium
    cost_sensitivity: medium
  - id: mechanical-edit
    title: Grounded / Mechanical Edit
    description: >
      Well-specified, rote changes — formatting, boilerplate, bulk renames
      driven by an occurrence map.
    quality_sensitivity: low
    cost_sensitivity: high
  # -- hard-judgment tier (new, Fix 2) --
  - id: analysis
    title: Analytical Reasoning
    description: >
      Investigating a question across a codebase or dataset and drawing a
      supported conclusion.
    quality_sensitivity: high
    cost_sensitivity: low
  - id: design
    title: Design Judgment
    description: >
      Proposing and evaluating a concrete design shape ahead of
      implementation.
    quality_sensitivity: high
    cost_sensitivity: low
  - id: investigation
    title: Investigation
    description: >
      Open-ended research to ground a decision before it is committed to
      spec or plan.
    quality_sensitivity: high
    cost_sensitivity: low
  - id: planning
    title: Planning Judgment
    description: >
      Turning a spec into an implementation strategy, sequencing, and risk
      accounting.
    quality_sensitivity: high
    cost_sensitivity: low
  - id: prioritization
    title: Prioritization Judgment
    description: >
      Ordering competing work items by risk, dependency, and value under
      constraint.
    quality_sensitivity: high
    cost_sensitivity: low
  - id: quality-assessment
    title: Quality Assessment
    description: >
      Judging whether a deliverable meets its acceptance bar before it is
      escalated to a full audit.
    quality_sensitivity: high
    cost_sensitivity: low
  - id: quality-audit
    title: Quality Audit
    description: >
      A structured, adversarial pass over a deliverable to catch drift,
      fakeability, and coverage gaps.
    quality_sensitivity: high
    cost_sensitivity: low
  - id: synthesis
    title: Synthesis
    description: >
      Combining findings from multiple sources or reviewers into one
      coherent, decision-ready artifact.
    quality_sensitivity: high
    cost_sensitivity: low
  - id: task-decomposition
    title: Task Decomposition
    description: >
      Breaking a plan into work packages with sound boundaries and
      dependency ordering.
    quality_sensitivity: high
    cost_sensitivity: low
  - id: validation
    title: Validation Judgment
    description: >
      Confirming a claim, artifact, or invariant actually holds rather than
      appears to hold.
    quality_sensitivity: high
    cost_sensitivity: low
  # -- implementation tier (new, Fix 2) --
  - id: code-generation
    title: Code Generation
    description: >
      Producing new production code from an approved spec/plan.
    quality_sensitivity: medium
    cost_sensitivity: medium
  - id: code-implementation
    title: Code Implementation
    description: >
      Implementing a specified feature or fix end-to-end, including tests.
    quality_sensitivity: medium
    cost_sensitivity: medium
  - id: code-refinement
    title: Code Refinement
    description: >
      Improving already-working code (cleanup, simplification, targeted
      fixes) without changing its approved shape.
    quality_sensitivity: medium
    cost_sensitivity: medium
  # -- mechanical tier (new, Fix 2) --
  - id: classification
    title: Classification
    description: >
      Sorting items into predefined categories against a documented
      rubric.
    quality_sensitivity: low
    cost_sensitivity: high
  - id: drafting
    title: Drafting
    description: >
      Producing a first-pass artifact (doc, template, scaffold) from a
      clear brief.
    quality_sensitivity: low
    cost_sensitivity: high
  - id: summarization
    title: Summarization
    description: >
      Condensing a longer artifact into a shorter, faithful summary.
    quality_sensitivity: low
    cost_sensitivity: high
  - id: curation
    title: Curation
    description: >
      Selecting, tagging, and organizing existing artifacts against a
      maintained taxonomy.
    quality_sensitivity: low
    cost_sensitivity: high
  - id: monitoring
    title: Monitoring
    description: >
      Watching a running process or pipeline for a well-specified
      condition and reporting status.
    quality_sensitivity: low
    cost_sensitivity: high
  - id: coordination
    title: Coordination
    description: >
      Routing well-specified work between agents/roles against a fixed
      handoff contract.
    quality_sensitivity: low
    cost_sensitivity: high
  - id: delegation
    title: Delegation
    description: >
      Assigning a well-specified unit of work to the correct
      agent/profile.
    quality_sensitivity: low
    cost_sensitivity: high

