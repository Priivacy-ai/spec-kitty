routing_policy:
  objective: quality_first
  weights:
    quality: 0.6
    cost: 0.15
    risk: 0.15
    latency: 0.1
  tier_constraints:
    - task_type: mechanical-edit
      max_tier: medium
    # -- mechanical tier new task_types (Fix 2): mirror mechanical-edit's cap --
    - task_type: classification
      max_tier: medium
    - task_type: drafting
      max_tier: medium
    - task_type: summarization
      max_tier: medium
    - task_type: curation
      max_tier: medium
    - task_type: monitoring
      max_tier: medium
    - task_type: coordination
      max_tier: medium
    - task_type: delegation
      max_tier: medium
  override_policy:
    mode: advisory
    require_reason: true
  # Fix 4 (mission #2364 aggregate-review remediation): the shipped/packaged
  # catalog must never wall-clock-expire -- a fixed max_catalog_age_hours on
  # package data would silently flip every recommendation to None ~180 days
  # post-generated_at with no code change. loader._is_stale() treats an
  # absent freshness_policy (or an absent max_catalog_age_hours within it) as
  # "never stale" by design, so the packaged default omits the field
  # entirely. A project-local override catalog MAY still set its own
  # freshness_policy.max_catalog_age_hours if it wants staleness checking.

