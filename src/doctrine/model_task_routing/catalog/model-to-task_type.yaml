task_types:
  - id: architecture-design
    title: Architecture & Design Judgment
    description: >
      Bounded-context modeling, module-boundary decisions, and evaluating
      trade-offs between competing designs.
    quality_sensitivity: high
    cost_sensitivity: low
  - id: sizing-judgment
    title: Sizing & Fakeability Judgment
    description: >
      Judging whether a work-package decomposition is realistically sized
      and whether a Definition of Done is fakeable.
    quality_sensitivity: high
    cost_sensitivity: low
  - id: code-review
    title: Adversarial Code Review
    description: >
      Reviewing a diff for correctness, fidelity to spec, and code-truth —
      catching what a confident summary or a green check would hide.
    quality_sensitivity: high
    cost_sensitivity: medium
  - id: implementation
    title: Implementation
    description: >
      Writing production code and tests against an approved spec/plan.
    quality_sensitivity: medium
    cost_sensitivity: medium
  - id: mechanical-edit
    title: Grounded / Mechanical Edit
    description: >
      Well-specified, rote changes — formatting, boilerplate, bulk renames
      driven by an occurrence map.
    quality_sensitivity: low
    cost_sensitivity: high

