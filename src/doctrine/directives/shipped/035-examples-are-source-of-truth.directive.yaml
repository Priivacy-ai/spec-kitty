schema_version: "1.0"
id: DIRECTIVE_035
title: Examples Are Source of Truth
intent: >
  Approved behavior examples are canonical specification assets. When behavior
  changes, the examples, linked acceptance checks, and human-readable
  documentation must change together before acceptance.
tactic_refs:
  - acceptance-test-first
  - atdd-adversarial-acceptance
  - living-documentation-sync
enforcement: required
scope: >
  Applies to specification, implementation, and review work that defines or
  changes externally observable behavior.
procedures:
  - Establish a small set of business-readable examples before planning implementation for new behavior.
  - Promote stable examples into executable acceptance checks or document why automation is not yet feasible.
  - Update example narratives, acceptance checks, and task or spec references in the same change when behavior evolves.
integrity_rules:
  - Canonical examples must stay readable by domain stakeholders and must not depend on internal implementation detail.
  - Behavior-changing work must not leave example, acceptance, and documentation assets in disagreement.
  - Example-to-requirement traceability must remain inspectable during review.
validation_criteria:
  - New or changed behavior is represented by at least one concrete example or an explicit no-example rationale approved in review.
  - Acceptance checks or recorded manual verification map back to the updated canonical examples.
  - Review evidence shows example, spec, and observed behavior remain aligned.
