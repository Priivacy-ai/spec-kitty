schema_version: "1.0"
id: DIRECTIVE_036
title: Black-Box Integration Testing
intent: >
  Exercise the system under test through its external interfaces only,
  without reference to its internal code structure, implementation details,
  or internal paths. Test cases derive from specifications, requirements,
  and design parameters, and assertions are made on observable outputs
  returned through those external interfaces. "Black-box" refers to the
  technique (absence of structural knowledge) and is independent of test
  scope — the scope is selected separately by responsibility, not by
  default to end-to-end.
enforcement: required
scope: >
  Applies to integration-level tests — tests that exercise more than one
  collaborator together through an external interface of the system under
  test. The system under test may be a deployed service, a compose stack,
  or an in-process composition of a module and its collaborators; the
  responsibility boundary — not the deployment topology — determines
  what is inside the system under test for a given test. Unit-level
  tests and full end-to-end tests are governed by their own directives.
procedures:
- Select the responsibility boundary for the test using the 
  test-boundaries-by-responsibility tactic before writing the test.
- Derive test cases from specifications, requirements, and design parameters 
  rather than from reading the implementation.
- Drive the system under test exclusively through its published external 
  interface (e.g., HTTP request, CLI invocation, message send, public module 
  API).
- Select both valid and invalid inputs and determine the expected output in 
  advance of execution.
- Assert on observable outputs returned across the external interface — 
  responses, status codes, persisted records, emitted events, logs, stored 
  artifacts.
- Apply standard black-box design techniques where relevant — equivalence 
  partitioning, boundary value analysis, decision table testing, state 
  transition testing, error guessing — to choose inputs.
integrity_rules:
- Black-box integration tests must not import inside-boundary modules of the 
  system under test to invoke business logic directly.
- Black-box integration tests must not patch, monkeypatch, or otherwise replace 
  inside-boundary collaborators of the system under test.
- Substitution of outside-boundary dependencies — other services, third-party 
  systems, filesystem, network, clock — is permitted when the substitute 
  preserves the observable contract the system under test relies on.
- Assertions must target externally observable state, not private attributes or 
  internal call sequences of inside-boundary components.
- The responsibility boundary used by the test must be stated (in test name, 
  docstring, or supporting doc) so reviewers can judge which components were 
  exercised for real and which were substituted.
validation_criteria:
- Each black-box integration test can be read and understood without reference 
  to the internal code structure of inside-boundary components.
- Each black-box integration test exercises the system under test through an 
  external interface and asserts on observable outputs of that interface.
- Inputs for each test trace back to a specification, requirement, or design 
  parameter rather than to an implementation detail.
- The responsibility boundary applied by the test is identifiable from the test 
  itself.
references:
- type: directive
  id: DIRECTIVE_030
- type: directive
  id: DIRECTIVE_034
