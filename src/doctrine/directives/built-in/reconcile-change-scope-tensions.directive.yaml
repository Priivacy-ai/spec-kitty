schema_version: "1.0"
id: RECONCILE_CHANGE_SCOPE_TENSIONS
title: Reconciling Change-Scope Tensions
intent: >
  Locality of Change (DIRECTIVE_024), the Boy Scout Rule (DIRECTIVE_025), and
  the Change Apply Smallest Viable Diff tactic each bound the size of a
  change from a different angle, and by design they are not fully
  compatible: Locality of Change minimizes blast radius, Boy Scout Rule
  licenses opportunistic in-place improvement of touched areas, and
  smallest-viable-diff minimizes the diff itself. This directive gives an
  operator or agent a single place to weigh the three together on a given
  change, instead of applying each in isolation, so the default doctrine
  pack stays coherent even though the underlying tension between the three
  rules is real and intentionally left unresolved at the rule level.
enforcement: advisory
scope: >
  Applies whenever a change is evaluated against DIRECTIVE_024, DIRECTIVE_025,
  or tactic:change-apply-smallest-viable-diff -- in practice, any code, test,
  or documentation change that must decide how far to extend beyond its
  stated goal.
procedures:
  - "Start from the smallest viable diff for the stated goal (the tactic):
    identify the minimal file set and the minimal edit within each file
    before considering any further change."
  - "Within files already opened for the change, apply Boy Scout Rule by
    default: fix failing tests, lint findings, and type errors surfaced in
    the touched area, without expanding the file set chosen above."
  - "Before extending beyond the touched area, apply Locality of Change: the
    extension must be directly connected to the stated goal, proportional,
    and documented with a one-line rationale (or a tracker reference for
    anything genuinely broad)."
  - "When the three pull in different directions on a specific change,
    resolve in this order: smallest-viable-diff picks the file set and edit
    size first; Boy Scout Rule then governs cleanup strictly inside that
    file set; Locality of Change is the brake that stops either rule from
    growing the file set itself."
  - Record the resolution (what was folded in, what was deferred, and why)
    in the task or review context rather than silently picking a side.
integrity_rules:
  - Boy Scout Rule cleanup performed under this directive never expands the
    file set chosen by smallest-viable-diff; it only improves files already
    inside that set.
  - A genuinely broad refactor surfaced while applying Boy Scout Rule is
    deferred to a dedicated task with a one-line rationale, never folded
    into the current diff on this directive's authority alone.
  - This directive resolves the tension for a given change; it does not
    retire, weaken, or supersede DIRECTIVE_024, DIRECTIVE_025, or
    tactic:change-apply-smallest-viable-diff -- all three remain
    independently valid, co-activatable rules.
validation_criteria:
  - "Reviewers can trace each changed file to either the stated goal
    (smallest-viable-diff) or a touched-area fix/cleanup (Boy Scout Rule)
    without needing to guess which rule licensed it."
  - Any change that grew beyond the touched area carries an explicit
    rationale connecting it to the stated goal (Locality of Change).
