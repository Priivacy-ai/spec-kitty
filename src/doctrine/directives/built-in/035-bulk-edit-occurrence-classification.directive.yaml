schema_version: "1.0"
id: DIRECTIVE_035
title: Bulk Edit Occurrence Classification
intent: >
  Codebase-wide renames, terminology migrations, and bulk string changes
  must classify string occurrences by semantic context before edits begin.
  Different contexts (code symbols, imports, filesystem paths, serialized keys,
  CLI commands, docs, tests, logs) may have different change rules.
enforcement: required
scope: >
  Applies to any mission marked with change_mode: bulk_edit.
procedures:
- Declare the mission as occurrence-sensitive by setting change_mode to 
  bulk_edit in mission metadata.
- Before implementation, produce an occurrence_map.yaml classifying the target 
  term by semantic category.
- For each category, assign an explicit action (rename, manual_review, 
  do_not_change, rename_if_user_visible).
- Document exceptions for specific files or patterns that override 
  category-level rules.
- Implementation must not begin until the occurrence map exists and passes 
  validation.
- Review must reference the occurrence map as the governing artifact for 
  evaluating changes.
integrity_rules:
- Every occurrence category in the map must have an explicit action assignment.
- Categories marked do_not_change must not be modified without updating the map.
- The occurrence map is the sole authority for what categories may change.
validation_criteria:
- Implementation is blocked when change_mode is bulk_edit and 
  occurrence_map.yaml is missing or invalid.
- Review rejects work that lacks an admissible occurrence map.
- The occurrence map covers at least 3 distinct categories.
