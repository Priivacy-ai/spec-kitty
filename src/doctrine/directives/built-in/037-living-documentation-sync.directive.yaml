schema_version: "1.0"
id: DIRECTIVE_037
title: Living Documentation Sync
intent: >
  Behavior-describing artifacts must evolve together. When observable
  behavior changes, the canonical examples, acceptance checks, narrative
  specifications, user documentation, glossary terms, code-level
  documentation, and architecture records must be updated in the same
  change so no reader is left with a stale picture of the system.
enforcement: required
scope: >
  Applies to specification, implementation, review, and documentation
  work that defines or changes externally observable behavior or the
  language used to describe it.
procedures:
  - Establish a small set of business-readable examples before planning implementation for new behavior.
  - Promote stable examples into executable acceptance checks or document why automation is not yet feasible.
  - Update example narratives, acceptance checks, spec references, user-facing docs, code-level docs, architecture notes, and glossary entries in the same change when behavior or domain language evolves.
  - Remove or mark stale examples, doc passages, and glossary terms once they no longer describe supported behavior.
integrity_rules:
  - Canonical examples must stay readable by domain stakeholders and must not depend on internal implementation detail.
  - Behavior-changing work must not leave example, acceptance, spec, user-doc, code-doc, architecture, or glossary assets in disagreement.
  - Example-to-requirement traceability must remain inspectable during review.
  - Domain terms introduced or redefined by a change must be reflected in the glossary before the change is accepted.
validation_criteria:
  - New or changed behavior is represented by at least one concrete example or an explicit no-example rationale approved in review.
  - Acceptance checks or recorded manual verification map back to the updated canonical examples.
  - Review evidence shows examples, specs, user docs, code-level docs, architecture records, and glossary entries remain aligned with observed behavior.
