schema_version: "1.0"
id: DIRECTIVE_040
title: Recurring-Bug Structural-Intervention Discipline
intent: >
  When a bug class has recurred and prior reactive point-fixes have not
  stopped the chain, the next response must be a structural intervention
  that closes the class — not another point fix. Use the five-paradigm
  parallel-debugging tactic to identify the structural root cause,
  enumerate dormant masks, and author one fix plan that closes the whole
  class.
enforcement: required
scope: >
  Applies when any of the following are true: a bug class has recurred
  three or more times under different surface symptoms; two or more
  reactive PRs have shipped point-fixes for the same class; the bug
  crosses a contested system boundary (CLI ↔ SaaS, producer ↔ schema,
  snapshot ↔ fixture); the mean-time-to-recur is shorter than the
  mean-time-to-fix.
procedures:
  - When a recurring-bug class is detected, dispatch the five-paradigm parallel-debugging tactic before authoring any further fix.
  - Frame a single bug statement that all five paradigms investigate independently. Do not include hypotheses in the statement.
  - Dispatch all five paradigms in parallel — The Falsifier, The Five-Whys Cartographer, The Bisector, The Matrix-Maker, The Stenographer. Sequential dispatch is non-compliant.
  - Synthesize the five verdicts. Convergence is the deliverable; divergence is signal that must be investigated, not suppressed.
  - Author a single structural fix plan that closes all currently-known masks plus the dormant masks identified by The Matrix-Maker.
  - Persist the falsified-hypothesis catalog and divergence matrix on the parent issue so future recurrences start ahead.
integrity_rules:
  - A second reactive point-fix for the same bug class without a structural-intervention plan is non-compliant.
  - Shipping a structural fix that closes fewer than all known masks is non-compliant — the matrix from The Matrix-Maker defines the minimum scope.
  - Falsified hypotheses must be persisted on the parent issue so the next investigator cannot re-litigate them without new evidence.
  - Divergence between paradigms must be recorded; suppressing divergence to force convergence is non-compliant.
validation_criteria:
  - "For every recurring-bug class (recurrence count ≥ 3), there exists a parent issue with: a structural fix plan, a falsified-hypothesis catalog, a divergence matrix including dormant masks, and a bisection timeline."
  - Each prior point-fix issue in the class is cross-linked to the parent issue and to the named structural root cause.
  - The structural fix includes a quality gate (test, CI check, or schema validator) that prevents the class from recurring.
  - Where divergence between paradigms exists, the parent issue records the divergence and the decision that resolved or accepted it.
