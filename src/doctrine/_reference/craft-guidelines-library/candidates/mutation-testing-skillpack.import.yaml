id: "imp-mutation-testing-skillpack-001"
source:
  title: "Mutation Testing Skill Pack"
  type: "external-skillpack"
  publisher: "Envy-7z/mobile-agent-skillpack"
  url: "https://github.com/Envy-7z/mobile-agent-skillpack/tree/main/skills/mutation-testing"
  accessed_on: "2026-04-20"
classification:
  target_concepts:
    - "tactic"
    - "styleguide"
    - "toolguide"
  rationale: >
    The skillpack bundles mutation testing workflow, operator reference tables for Python
    and TypeScript, and test design principles in a single agent-facing document. The
    doctrine split separates language-neutral guidance (tactic, styleguide) from
    language-specific tooling (toolguides), making each artifact independently usable
    and linkable in the DRG graph.
adaptation:
  summary: >
    Produced four artifacts: (1) mutation-testing-workflow tactic — five-step human
    review process applicable to any language; (2) mutation-aware-test-design styleguide
    — language-neutral principles and patterns for writing tests that kill mutants;
    (3) python-mutation-tools toolguide — mutmut-specific operator table and workflow;
    (4) typescript-mutation-tools toolguide — Stryker-specific operator table and
    workflow covering ?., ??, some/every, and optional chaining families.
  notes:
    - "Language-specific operator tables extracted into dedicated toolguides rather than a monolithic document."
    - "Red flag checklists and mutation score targets are duplicated in both toolguides for self-contained use."
    - "Styleguide examples use Python for conciseness; TypeScript equivalents live in the TS toolguide."
    - "Import candidate YAML written with accessed_on matching the date of doctrine artifact creation."
source_references:
  - kind: "external"
    path: "https://github.com/Envy-7z/mobile-agent-skillpack/tree/main/skills/mutation-testing"
    note: "Full skillpack: workflow, operator tables, tool setup instructions, red flag checklist."
status: "adopted"
resulting_artifacts:
  - "src/doctrine/tactics/shipped/mutation-testing-workflow.tactic.yaml"
  - "src/doctrine/styleguides/shipped/mutation-aware-test-design.styleguide.yaml"
  - "src/doctrine/toolguides/shipped/python-mutation-tools.toolguide.yaml"
  - "src/doctrine/toolguides/shipped/PYTHON_MUTATION_TOOLS.md"
  - "src/doctrine/toolguides/shipped/typescript-mutation-tools.toolguide.yaml"
  - "src/doctrine/toolguides/shipped/TYPESCRIPT_MUTATION_TOOLS.md"
