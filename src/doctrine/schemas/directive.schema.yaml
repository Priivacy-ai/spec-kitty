$schema: https://json-schema.org/draft/2020-12/schema
$id: https://spec-kitty.dev/schemas/doctrine/directive.schema.yaml
title: Directive
description: Schema for governance directives with optional enrichment fields.
type: object
additionalProperties: false
required:
- id
- schema_version
- title
- intent
- enforcement
definitions:
  directive_reference:
    type: object
    additionalProperties: false
    required:
    - type
    - id
    properties:
      type:
        type: string
        minLength: 1
        enum:
        - directive
        - tactic
        - styleguide
        - toolguide
        - paradigm
        - procedure
        - agent_profile
        - mission_step_contract
        - template
      id:
        type: string
        minLength: 1
properties:
  id:
    type: string
    pattern: ^[A-Z][A-Z0-9_-]*$
  schema_version:
    type: string
    pattern: ^1\.0$
  title:
    type: string
    minLength: 1
  intent:
    type: string
    minLength: 1
  enforcement:
    type: string
    minLength: 1
    enum:
    - required
    - lenient-adherence
    - advisory
  scope:
    type: string
  procedures:
    type: array
    items:
      type: string
  integrity_rules:
    type: array
    items:
      type: string
  validation_criteria:
    type: array
    items:
      type: string
  explicit_allowances:
    type: array
    minItems: 1
    items:
      type: string
  references:
    type: array
    items:
      $ref: '#/definitions/directive_reference'
allOf:
- if:
    properties:
      enforcement:
        const: lenient-adherence
    required:
    - enforcement
  then:
    required:
    - explicit_allowances
