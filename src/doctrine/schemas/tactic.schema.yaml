$schema: https://json-schema.org/draft/2020-12/schema
$id: https://spec-kitty.dev/schemas/doctrine/tactic.schema.yaml
title: Tactic
description: Minimal schema for reusable behavior tactics.
type: object
additionalProperties: false
required:
- id
- schema_version
- name
- steps
definitions:
  tactic_reference:
    type: object
    additionalProperties: false
    required:
    - name
    - type
    - id
    - when
    properties:
      name:
        type: string
        minLength: 1
      type:
        type: string
        minLength: 1
        enum:
        - directive
        - tactic
        - styleguide
        - toolguide
        - paradigm
        - procedure
        - template
        description: Doctrine artifact type being referenced.
      id:
        type: string
        pattern: ^[A-Za-z][A-Za-z0-9_-]*$
      when:
        type: string
        minLength: 1
  tactic_step:
    type: object
    additionalProperties: false
    required:
    - title
    properties:
      title:
        type: string
        minLength: 1
      description:
        type: string
      examples:
        type: array
        minItems: 1
        items:
          type: string
      references:
        type: array
        minItems: 1
        items:
          $ref: '#/definitions/tactic_reference'
properties:
  id:
    type: string
    pattern: ^[a-z][a-z0-9-]*$
  schema_version:
    type: string
    pattern: ^1\.0$
  name:
    type: string
    minLength: 1
  overrides:
    type: string
    pattern: ^[a-z][a-z0-9-]*$
    description: ID of a built-in tactic this artifact replaces in full.
  enhances:
    type: string
    pattern: ^[a-z][a-z0-9-]*$
    description: ID of a built-in tactic this artifact augments via field-merge.
  purpose:
    type: string
  steps:
    type: array
    minItems: 1
    items:
      $ref: '#/definitions/tactic_step'
  failure_modes:
    type: array
    items:
      type: string
  applies_to_languages:
    type: array
    items:
      type: string
  references:
    type: array
    minItems: 1
    items:
      $ref: '#/definitions/tactic_reference'
  notes:
    type: string
    description: Free-form supplementary material (scoring rubrics, timing guidance, reference models, etc.) that 
      enriches the tactic but does not fit into a single step.
