schema_version: "1.0"
id: semantic-compression
name: Semantic Compression
summary: >
  Treat a software system as an over-expanded expression of observable
  behavior. The work is to remove accidental implementation complexity while
  preserving semantics: first map the behavior that must not change, then find
  duplicated or dead expressions of that behavior, extract one concept per
  responsibility, collapse parallel behavioral paths, and verify equivalence.
  The goal is not prettier code or architectural purity. The goal is a smaller
  implementation that still produces the same externally observable behavior,
  with evidence strong enough for the risk of the reduction.

