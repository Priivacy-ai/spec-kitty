schema_version: "1.0"
id: c4-incremental-detail-modeling
name: C4 Incremental Detail Modeling
summary: >
  Architecture communication through progressive zoom -- from the broadest
  system landscape down to individual components -- so that each audience
  sees the right level of detail without drowning in irrelevance. Inspired
  by Simon Brown's C4 model, the approach defines four hierarchical
  abstraction levels (Software System, Container, Component, Code) and a
  small set of supporting diagram types (System Landscape, Dynamic,
  Deployment). Each level answers a different question for a different
  stakeholder: Level 1 (Context) shows actors and boundaries for business
  sponsors; Level 2 (Containers) shows deployable units and technology
  choices for architects and DevOps; Level 3 (Components) shows logical
  structure for developers; Level 4 (Code) shows implementation detail only
  when automated generation makes it cheap. The paradigm is notation-
  independent and tooling-independent -- Mermaid, PlantUML, Structurizr, or
  whiteboard sketches all qualify, provided every diagram carries a title,
  a legend, labelled elements with descriptions, and labelled unidirectional
  relationships. The guiding heuristic: produce only the levels that add
  value and keep each diagram reviewable in under five minutes.

