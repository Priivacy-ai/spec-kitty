schema_version: "1.0"
id: specification-by-example
name: Specification by Example
summary: >
  Shared understanding of behavior is built from concrete, business-readable
  examples that become the canonical source of truth for requirements,
  acceptance checks, and living documentation. Teams refine examples
  collaboratively, turn stable examples into executable acceptance tests, and
  keep narrative specs in sync whenever behavior changes.
