# Mission-type governance profile — documentation
#
# Pinned by `tests/missions/test_mission_type_profile_resolution.py`.
# Schema: `charter.mission_type_profiles.MissionTypeProfile`
# Contract: kitty-specs/charter-mediated-doctrine-selection-01KRTZCA/contracts/mission-type-profile.md
#
# template_set is intentionally null: documentation missions resolve their own
# templates from `src/doctrine/missions/documentation/templates/`. Leaving
# this empty guarantees `software-dev-default` does not leak in
# (FR-011 / journey 4).
#
# `id` is the overlay identity for the `doctrine/base.py` builtin → org →
# project stack (it keys overlays on `id` and skips id-less files, base.py:249).
# INVARIANT (from WP05): `id == mission_type` for every governance-profile.yaml —
# shipped or a project override at `.kittify/doctrine/mission_types/documentation/`.
# A project override MUST repeat `id: documentation` or field-merge would skip it
# silently.
#
# Governance is authored REFERENCE-FIRST (WP06): existing shipped documentation
# doctrine is wired by canonical id; only the five net-new styleguides
# (divio-type-discipline, plain-language, docs-accessibility,
# publication-authority, docs-freshness-sla) are authored by this WP.
#
# FR-005 documentation domain — all eight items are HOMED (none unhomed):
#   1 Divio type       → selected_styleguides: divio-type-discipline
#   2 plain language   → selected_styleguides: plain-language
#   3 accessibility    → selected_styleguides: docs-accessibility
#   4 source-of-truth  → selected_styleguides: publication-authority (source-of-truth principles)
#   5 publication      → selected_styleguides: publication-authority (publication-gate principle)
#   6 freshness        → selected_styleguides: docs-freshness-sla
#   7 audience         → ACTION-GRAIN actions/discover/index.yaml (tactics: stakeholder-alignment);
#                        target-audience is a discovery-time concern. plain-language reinforces it
#                        (audience-calibrated prose) but the canonical home is the discover action.
#   8 review flow      → ACTION-GRAIN actions/validate/index.yaml + actions/accept/index.yaml
#                        (tactics: documentation-curation-audit) — an existing review tactic, not a
#                        sixth styleguide.
#
# FR-013 cross-grain disjointness: an artifact appears in the type-grain OR an
# action-grain, never both (compared on canonical URN). The living-docs directive
# (037), glossary-curation-interview, kitty-glossary-writing, retrospective-facilitator,
# stakeholder-alignment and documentation-curation-audit are ALL homed in the action
# grain, so they are deliberately absent from the type-grain below.
#
# The terminal DRG `regenerate-graph --check` is NOT run here — WP12 owns it once,
# after WP01 (dangler removal) and WP06 (this authoring) both land.
id: documentation
mission_type: documentation
template_set: null

# 042-common-docs is the type-wide Common Docs directive (single 13-section root,
# curate-by-delete). 037-living-documentation-sync is deliberately NOT listed here:
# it is action-homed across the audit/validate/accept/generate/publish action grains,
# and repeating it in the type-grain would be an FR-013 cross-grain double declaration.
selected_directives:
  - 042-common-docs

# Reference-first curation + authoring tactics. glossary-curation-interview and
# documentation-curation-audit and stakeholder-alignment are action-homed (retrospect /
# validate+accept / discover respectively) and are intentionally omitted here (FR-013).
selected_tactics:
  - common-docs-curation
  - common-docs-find
  - common-docs-scaffold
  - common-docs-write
  - usage-examples-sync

selected_paradigms: []

# Five net-new styleguides (this WP) + the shipped common-docs styleguide.
# kitty-glossary-writing is action-homed (retrospect) and omitted here (FR-013).
selected_styleguides:
  - common-docs
  - divio-type-discipline
  - docs-accessibility
  - docs-freshness-sla
  - plain-language
  - publication-authority

# Text-authored diagramming toolguides (accessibility + Common Docs both lean on them).
selected_toolguides:
  - mermaid-diagramming
  - plantuml-diagramming

# Documentation lifecycle procedures.
selected_procedures:
  - documentation-gap-prioritization
  - drill-down-documentation

# retrospective-facilitator is action-homed (retrospect) — omitted here (FR-013).
selected_agent_profiles: []

selected_mission_step_contracts: []
available_tools: []
activations: []
