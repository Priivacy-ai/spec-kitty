# Scenario 10 — augmentation (enhances / overrides) authored as DRG fragment
# edges across every topology-bearing kind: directive, toolguide,
# mission-step-contract, and mission-type. Proves the fragment-edge model is the
# single authoring surface for augmentation on all kinds (FR-004, FR-029).
pack_name: augment-all-kinds-pack
source_kind: local_path
source_ref: tests/doctrine/fixtures/relationship_packs/augment-all-kinds-pack
layer_index: 1
provenance_marker: org
nodes:
  - id: org-directive
    kind: directives
    title: "Org Directive Overlay (fixture)"
  - id: org-toolguide
    kind: toolguides
    title: "Org Toolguide Overlay (fixture)"
  - id: org-step-contract
    kind: mission_step_contracts
    title: "Org Mission Step Contract Overlay (fixture)"
  - id: org-mission-type
    kind: mission_types
    title: "Org Mission Type Overlay (fixture)"
edges:
  # enhances => field-level merge into a built-in of the same kind
  - source: org-directive
    target: org-directive
    relation: enhances
    reason: "Directive overlay enhances a built-in directive"
  - source: org-toolguide
    target: org-toolguide
    relation: enhances
    reason: "Toolguide overlay enhances a built-in toolguide"
  # overrides => full replacement of a built-in of the same kind
  - source: org-step-contract
    target: org-step-contract
    relation: overrides
    reason: "Step-contract overlay replaces a built-in step contract"
  - source: org-mission-type
    target: org-mission-type
    relation: overrides
    reason: "Mission-type overlay replaces a built-in mission type"
