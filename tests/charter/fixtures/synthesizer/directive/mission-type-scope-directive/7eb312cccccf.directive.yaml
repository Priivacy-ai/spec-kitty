id: PROJECT_001
schema_version: '1.0'
title: Mission Type Scope Directive
intent: >
  Define the primary mission scope and core user outcome that this project
  optimizes for, establishing a clear boundary for all development activity.
enforcement: required
scope: "All project work packages and feature development."
procedures:
  - "Ensure every feature specification references the mission type."
  - "Reject work that falls outside the stated mission scope."
