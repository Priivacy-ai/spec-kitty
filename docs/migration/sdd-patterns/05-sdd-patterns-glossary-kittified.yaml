# SDD Patterns Glossary — Kittified Format
# Scope: team_domain
# Status: ready for inclusion as glossary pack once upstream supports glossary packs
# Source: converted from data/glossary.toml with spec-kitty scoped glossary model additions
# Conversion date: 2025-05-25

scope: team_domain
pack_id: sdd-patterns
schema_version: "1.0"

terms:

  # ─── Content Model Terms ───────────────────────────────────────────────

  - surface: "Practice"
    definition: >
      A contextual problem-solution pattern that addresses a specific challenge
      in a defined domain. Practices include problem statement, intent, solution,
      contextual forces (enablers and deterrents), rationale, consequences, and
      examples. Each practice is evaluated against the AMMERSE framework.
    context: "Content Model"
    status: canonical
    confidence: 1.0
    see_also:
      - "Concept"
      - "Primer"
      - "AMMERSE"

  - surface: "Concept"
    definition: >
      A definitional content artifact that explains a term, idea, or mental model.
      Concepts provide definition, key components, background (origin and
      application), comparisons with related ideas, and examples.
    context: "Content Model"
    status: canonical
    confidence: 1.0
    see_also:
      - "Practice"
      - "Glossary Term"

  - surface: "Primer"
    definition: >
      An educational guide covering a programming language, tool, or technique.
      Primers follow a structured format: philosophy and history, syntax and
      paradigms, tooling ecosystem, testing frameworks, and real-world application.
    context: "Content Model"
    status: canonical
    confidence: 1.0
    see_also:
      - "Practice"
      - "Concept"

  - surface: "AMMERSE"
    definition: >
      A 7-dimension evaluation framework applied to every practice pattern.
      Dimensions are Agile, Minimal, Maintainable, Environmental, Reachable,
      Solvable, and Extensible. Each dimension receives a delta rating (-1.0 to
      +1.0) with a written rationale explaining the score.
    context: "Content Model"
    status: canonical
    confidence: 0.95
    see_also:
      - "Practice"
      - "Trade-off"

  - surface: "Contextual Forces"
    definition: >
      The factors that influence whether a practice is viable in a given situation.
      Divided into enablers (factors that increase viability) and deterrents
      (factors that decrease viability). Contextual forces embody the repository's
      "context over commandments" philosophy.
    context: "Content Model"
    status: canonical
    confidence: 0.95
    see_also:
      - "Practice"
      - "Trade-off"
      - "Context"

  - surface: "Further Exploration"
    definition: >
      A structured reference section in content artifacts linking to bibliography
      entries (by UUID) and external sources (raw links). References follow IEEE
      citation convention.
    context: "Content Model"
    status: canonical
    confidence: 0.9
    see_also:
      - "Bibliography Entry"

  # ─── Governance and Process Terms ──────────────────────────────────────

  - surface: "LEX Framework"
    definition: >
      A comprehensive writing style governance system consisting of three
      components: LEX_TONE_MAP (voice characteristics and compliance targets),
      LEX_STYLE_RULES (markdown structure and language rules), and LEX_DELTAS
      (deviation reports with remediation suggestions).
    context: "Governance"
    status: canonical
    confidence: 0.95
    see_also:
      - "Tone Map"
      - "Style Rules"
      - "LEX Delta"

  - surface: "Tone Map"
    definition: >
      The LEX_TONE_MAP component defining seven voice characteristics with
      compliance targets: Calm (94%), Clear (91%), Sincere (96%), Humble (93%),
      Collaborative (90%), Practical (92%), and Balanced (95%). Content is scored
      against these targets during review.
    context: "Governance"
    status: canonical
    confidence: 0.95
    see_also:
      - "LEX Framework"
      - "Style Rules"

  - surface: "Style Rules"
    definition: >
      The LEX_STYLE_RULES component defining markdown structure conventions and
      language rules. Key rules include active voice preference, avoidance of
      prescriptive absolutes, paragraph length limits, and IEEE citation format.
    context: "Governance"
    status: canonical
    confidence: 0.95
    see_also:
      - "LEX Framework"
      - "Tone Map"

  - surface: "LEX Delta"
    definition: >
      A deviation report generated by LEX analysis identifying specific content
      sections that fall below tone or style compliance thresholds. Deltas are
      prioritized (high/medium/low) with before/after suggestions.
    context: "Governance"
    status: canonical
    confidence: 0.9
    see_also:
      - "LEX Framework"

  - surface: "Context Stack"
    definition: >
      The ordered set of governance layers that agents must load during
      initialization: Bootstrap Protocol (root), General Guidelines (highest),
      Operational Guidelines (high), Project Vision (medium), Project Specific
      Guidelines (medium-low), and Command Aliases (medium-low).
    context: "Governance"
    status: canonical
    confidence: 0.9
    see_also:
      - "Bootstrap Protocol"
      - "Extended Directive"

  - surface: "Bootstrap Protocol"
    definition: >
      The root-priority initialization layer that defines load order, mode
      defaults, and fail-safe logic. Agents must complete bootstrap before
      any generation, reasoning, or decision-making.
    context: "Governance"
    status: canonical
    confidence: 0.9
    see_also:
      - "Context Stack"
      - "Validate Alignment"

  - surface: "Extended Directive"
    definition: >
      An optional, specialized instruction set externalized for token efficiency.
      Twelve extended directives (001-012) cover CLI tooling, context notes,
      repository reference, agent profiles, version governance, mode protocol,
      and operating procedures. Loaded on-demand via /require-directive NNN.
    context: "Governance"
    status: canonical
    confidence: 0.9
    see_also:
      - "Context Stack"

  - surface: "Validate Alignment"
    definition: >
      A runtime check command (/validate-alignment) that agents execute after
      loading context layers or after major mode shifts. Compares current tone
      and reasoning against Operational and Strategic references, self-correcting
      drift or requesting realignment.
    context: "Governance"
    status: canonical
    confidence: 0.9
    see_also:
      - "Bootstrap Protocol"
      - "Integrity Symbol"

  - surface: "Integrity Symbol"
    definition: >
      A visual marker used in agent output to signal alignment status. Three
      symbols are defined: critical error/misalignment detected, low confidence
      or assumption-based reasoning, and alignment confirmed.
    context: "Governance"
    status: canonical
    confidence: 0.85
    see_also:
      - "Validate Alignment"

  # ─── Agent Role Terms ─────────────────────────────────────────────────

  - surface: "Curator Agent"
    definition: >
      An agent profile responsible for content curation, pattern sourcing, and
      conceptual coherence across the pattern collection. Evaluates whether new
      patterns align with repository philosophy and assigns categories.
    context: "Agent Roles"
    status: canonical
    confidence: 0.9
    see_also:
      - "Researcher Agent"
      - "Synthesizer Agent"

  - surface: "Researcher Agent"
    definition: >
      An agent profile responsible for reference sourcing, bibliography expansion,
      source validation, and research synthesis. Validates author credentials and
      publication reputation before adding references.
    context: "Agent Roles"
    status: canonical
    confidence: 0.9
    see_also:
      - "Bibliography Entry"
      - "Curator Agent"

  - surface: "Lexical Agent"
    definition: >
      An agent profile responsible for terminology management, glossary curation,
      and tone/style analysis using the LEX framework. Verifies tag existence
      in the glossary and runs compliance scoring against the tone map.
    context: "Agent Roles"
    status: canonical
    confidence: 0.9
    see_also:
      - "LEX Framework"
      - "Glossary Term"

  - surface: "Writer-Editor Agent"
    definition: >
      An agent profile responsible for content authoring and quality polishing.
      Creates pattern content using appropriate templates and refines language
      to meet tone map compliance targets.
    context: "Agent Roles"
    status: canonical
    confidence: 0.9
    see_also:
      - "Lexical Agent"
      - "Practice"

  - surface: "Synthesizer Agent"
    definition: >
      An agent profile responsible for cross-pattern coherence and content
      synthesis. Reviews whether new content complements the existing collection,
      validates cross-references, and checks terminology consistency.
    context: "Agent Roles"
    status: canonical
    confidence: 0.9
    see_also:
      - "Curator Agent"
      - "Lexical Agent"

  - surface: "Diagrammer Agent"
    definition: >
      An agent profile responsible for PlantUML diagram generation and
      visualization. Creates consistent, accessible diagrams following the
      repository's theming conventions.
    context: "Agent Roles"
    status: canonical
    confidence: 0.9
    see_also:
      - "Practice"

  - surface: "Scribe Agent"
    definition: >
      An agent profile responsible for documentation writing and bootstrap
      artifact generation. Produces structural documentation like REPO_MAP,
      SURFACES, WORKFLOWS, and CONTEXT_LINKS.
    context: "Agent Roles"
    status: canonical
    confidence: 0.9
    see_also:
      - "Bootstrap Protocol"

  # ─── Data and Infrastructure Terms ─────────────────────────────────────

  - surface: "Glossary Term"
    definition: >
      An entry in data/glossary.toml defining a domain term with name,
      abbreviation, domain classification, description, aliases, and references.
      All content tags must reference terms in this registry.
    context: "Data Model"
    status: canonical
    confidence: 1.0
    see_also:
      - "Lexical Agent"
      - "Contextive Integration"

  - surface: "Bibliography Entry"
    definition: >
      An entry in data/bibliography.toml representing a book or reference
      resource with UUID, title, authors, publisher, year, link, image, levels,
      tags, and description. Auto-generates Hugo content pages.
    context: "Data Model"
    status: canonical
    confidence: 1.0
    see_also:
      - "Researcher Agent"
      - "Further Exploration"

  - surface: "Contextive Integration"
    definition: >
      IDE integration via .contextive/*.glossary.yml files that provide hover
      definitions and auto-complete for domain terminology. Files are
      auto-generated from data/glossary.toml, grouped by domain.
    context: "Tooling"
    status: canonical
    confidence: 0.85
    see_also:
      - "Glossary Term"

  # ─── Reasoning Mode Terms ─────────────────────────────────────────────

  - surface: "Analysis Mode"
    definition: >
      The default agent reasoning mode (/analysis-mode) used for fact-based,
      analytical reasoning. Prioritizes accuracy, evidence, and logical structure.
    context: "Agent Behaviour"
    status: canonical
    confidence: 0.85
    see_also:
      - "Creative Mode"
      - "Meta Mode"

  - surface: "Creative Mode"
    definition: >
      An alternative agent reasoning mode (/creative-mode) used for narrative,
      metaphor, and brainstorming. Mode transitions must be annotated.
    context: "Agent Behaviour"
    status: canonical
    confidence: 0.85
    see_also:
      - "Analysis Mode"
      - "Meta Mode"

  - surface: "Meta Mode"
    definition: >
      An agent reasoning mode (/meta-mode) used for self-reflection and process
      analysis. Enables agents to evaluate their own performance and suggest
      process improvements.
    context: "Agent Behaviour"
    status: canonical
    confidence: 0.85
    see_also:
      - "Analysis Mode"
      - "Creative Mode"

  # ─── Domain Knowledge Terms (selected high-value terms) ───────────────

  - surface: "Context Over Commandments"
    definition: >
      The foundational philosophy of the SDD Patterns repository. Rejects
      prescriptive best-practice mandates in favor of contextual guidance that
      helps readers build judgment based on their unique situation. Every pattern
      acknowledges trade-offs and situations where it should not be applied.
    context: "Philosophy"
    status: canonical
    confidence: 1.0
    see_also:
      - "Trade-off"
      - "Contextual Forces"
      - "Heuristic"

  - surface: "Trade-off"
    definition: >
      A conscious choice that balances competing priorities. In software and
      knowledge work, selecting one approach gains certain benefits but often
      sacrifices others. Recognizing and documenting trade-offs ensures teams
      understand the rationale behind chosen paths.
    context: "Decision Making"
    status: canonical
    confidence: 1.0
    see_also:
      - "Context Over Commandments"
      - "AMMERSE"

  - surface: "Progressive Disclosure"
    definition: >
      A content design principle where information is presented gradually,
      revealing complexity only when necessary. Prevents cognitive overload by
      ensuring users receive only the most relevant details at each stage.
    context: "User Experience"
    status: canonical
    confidence: 0.95
    see_also:
      - "Cognitive Load"

  - surface: "Cognitive Load"
    definition: >
      The amount of mental effort required to process information or complete
      a task. In knowledge work, high cognitive load reduces focus, increases
      errors, and slows decision-making. Pattern design should minimize
      unnecessary cognitive load on the reader.
    context: "Cognitive Science"
    status: canonical
    confidence: 0.95
    see_also:
      - "Progressive Disclosure"

  - surface: "Heuristic"
    definition: >
      A problem-solving approach that employs practical, experience-based methods
      for decision-making. Simplifies complex problems by substituting aspects
      with decent-enough approximations. Patterns in this collection are
      heuristics, not absolute rules.
    context: "Problem Solving"
    status: canonical
    confidence: 1.0
    see_also:
      - "Context Over Commandments"
      - "Silver Bullet"

  - surface: "Clean Code"
    definition: >
      Code that is easy to understand, maintain, and extend. Written to clearly
      communicate intent, accessible to other developers and to the original
      author when revisiting after time. Minimizes complexity and avoids
      unnecessary clutter.
    context: "Software Development"
    status: canonical
    confidence: 1.0
    see_also:
      - "Refactoring"
      - "Boyscout Rule"

  - surface: "Boyscout Rule"
    definition: >
      The principle that everyone should leave their environment a little better
      than they found it. In software, encourages cleaning up code messes during
      regular work. Related to the broken window theory.
    context: "Software Development"
    status: canonical
    confidence: 1.0
    see_also:
      - "Clean Code"
      - "Broken Window Theory"

  - surface: "Broken Window Theory"
    definition: >
      A theory from criminology applied to software: if an environment is already
      decayed, people have less ethical concern about making it worse. Outward
      signs of neglect signal that no one cares, reducing motivation to maintain
      quality.
    context: "Software Development"
    status: canonical
    confidence: 1.0
    see_also:
      - "Boyscout Rule"
      - "Clean Code"

  - surface: "Domain Driven Design"
    abbreviation: "DDD"
    definition: >
      A set of principles for creating optimal software by modeling the business
      domain. Creates shared understanding of the problem space, reinforced via
      conversations, code, and diagrams. Enhances synergy and alignment for
      sustainable value delivery.
    context: "Software Architecture"
    status: canonical
    confidence: 1.0
    see_also:
      - "Conway's Law"

  - surface: "Conway's Law"
    definition: >
      Any organization that designs a system will produce a design whose structure
      is a copy of the organization's communication structure. Software built by
      teams invariably resembles the team structure itself.
    context: "Software Architecture"
    status: canonical
    confidence: 1.0
    see_also:
      - "Domain Driven Design"
      - "Systems Thinking"

  - surface: "Systems Thinking"
    definition: >
      An approach to understanding complex problems by viewing them as parts of
      an interconnected whole. Involves recognizing patterns, relationships, and
      feedback loops to anticipate decision impacts and enable holistic solutions.
    context: "Learning"
    status: canonical
    confidence: 1.0
    see_also:
      - "Causal Loop Diagram"
      - "Complexity"

  - surface: "Sunk-Cost Fallacy"
    definition: >
      A psychological tendency to justify additional investment into a decision
      despite evidence that future costs will outweigh expected benefits, because
      of already-invested resources. Recognizing this fallacy helps teams make
      rational pivot-or-persist decisions.
    context: "Decision Making"
    status: canonical
    confidence: 1.0
    see_also:
      - "Cognitive Bias"
      - "Trade-off"

  - surface: "Bottom Line Up Front"
    abbreviation: "BLUF"
    definition: >
      A communication strategy where the main conclusion is stated at the
      beginning of the message. Common in military, executive, and high-stakes
      contexts where fast clarity is critical.
    context: "Communication"
    status: canonical
    confidence: 0.95
    see_also:
      - "Progressive Disclosure"
