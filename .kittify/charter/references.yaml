- id: PROCEDURE:adversarial-squad-deployment
  kind: procedure
  title: Adversarial Squad Deployment
  summary: "Deploy a small, bounded set of profile-loaded subagents in parallel at
    high-leverage review point-cuts so independent doctrine lenses converge on findings
    no single reviewer would catch. Turns review from one perspective into a cheap
    adversarial panel that resists laziness, accidental-pass, and single-lens blind
    spots. Optional and charter- or memory-activated — it enriches the flow, it does
    not gate it.\n"
  source_path: ''
  local_path: _LIBRARY/procedure-adversarial-squad-deployment.md
- id: PROCEDURE:bdd-scenario-lifecycle
  kind: procedure
  title: BDD Scenario Lifecycle
  summary: "Guide the Formulation, Automation, and Maintenance phases of the BDD cycle,
    picking up where the Example Mapping Workshop (Discovery phase) leaves off. Covers
    translating validated examples into Gherkin specifications, wiring them to executable
    step definitions, and maintaining them as living documentation as the system evolves.
    Toolchain-agnostic — applicable with Cucumber-JVM, Cucumber-JS, Behave, SpecFlow,
    or any Given/When/Then runner.\n"
  source_path: ''
  local_path: _LIBRARY/procedure-bdd-scenario-lifecycle.md
- id: PROCEDURE:disciplined-defect-diagnosis
  kind: procedure
  title: Disciplined Defect Diagnosis
  summary: "Diagnose hard bugs and performance regressions by first constructing a
    fast, trustworthy feedback loop, then testing ranked hypotheses with targeted
    instrumentation before applying a regression-tested fix. This procedure fills
    the gap before test-first bug fixing: it is for turning an unclear report into
    a reproducible, falsifiable, and cleanly verified defect.\n"
  source_path: ''
  local_path: _LIBRARY/procedure-disciplined-defect-diagnosis.md
- id: PROCEDURE:documentation-gap-prioritization
  kind: procedure
  title: Documentation Gap Prioritization
  summary: "Triage identified documentation gaps by user impact and fill them in priority
    order. Not all gaps are equal — a missing tutorial for a core workflow blocks
    more users than a missing explanation for an edge-case design decision. Prioritisation
    ensures that limited capacity is directed toward the gaps that most impede the
    target audience.\n"
  source_path: ''
  local_path: _LIBRARY/procedure-documentation-gap-prioritization.md
- id: PROCEDURE:domain-aware-decision-interview
  kind: procedure
  title: Domain-Aware Decision Interview
  summary: "Stress-test a plan or design through a one-question-at-a-time interview
    that uses project glossary, charter, doctrine, ADRs, and code evidence as the
    shared source of truth. The procedure resolves the decision tree without over-interviewing
    and records durable terminology or decision updates only when they have long-term
    value.\n"
  source_path: ''
  local_path: _LIBRARY/procedure-domain-aware-decision-interview.md
- id: PROCEDURE:drill-down-documentation
  kind: procedure
  title: Drill-Down Documentation
  summary: "Ensure that decisions, documentation, and architecture descriptions are
    captured at a consistent level of abstraction and scope. Each layer of the documentation
    hierarchy addresses a distinct audience and concern set — from organisational
    impact through architecture and design to code-level detail. The drill-down approach
    prevents reasoning from hopscotching between levels, avoids convoluting strategic
    rationale with implementation minutiae, and makes it easy to locate the right
    level of detail for any question.\n"
  source_path: ''
  local_path: _LIBRARY/procedure-drill-down-documentation.md
- id: PROCEDURE:event-storming-discovery
  kind: procedure
  title: Event Storming Discovery
  summary: "Discover domain events, commands, aggregates, policies, read models, and
    bounded context boundaries through a structured analysis of business flows. The
    procedure produces a shared domain model grounded in real business behaviour rather
    than technical assumptions. Based on Alberto Brandolini's Event Storming technique,
    adapted for agent-assisted discovery with human-in-charge validation at key decision
    points.\n"
  source_path: ''
  local_path: _LIBRARY/procedure-event-storming-discovery.md
- id: PROCEDURE:example-mapping-workshop
  kind: procedure
  title: Example Mapping Workshop
  summary: "Turn a behavior request into concrete rules, examples, and open questions
    that stakeholders and implementers can share as a canonical specification set.\n"
  source_path: ''
  local_path: _LIBRARY/procedure-example-mapping-workshop.md
- id: PROCEDURE:issue-triage-state-machine
  kind: procedure
  title: Issue Triage State Machine
  summary: "Triage incoming bugs and enhancements into a single current state, preserving
    durable handoff context for agents and durable rejection context for future maintainers.
    The procedure is tracker-neutral: GitHub labels are one possible carrier, but
    the invariant is a category plus exactly one workflow state.\n"
  source_path: ''
  local_path: _LIBRARY/procedure-issue-triage-state-machine.md
- id: PROCEDURE:legacy-codebase-triage
  kind: procedure
  title: Legacy Codebase Triage
  summary: "Convert an unfamiliar brownfield codebase into a defensible action plan
    by gathering version-control evidence, overlaying structural and complexity signals,
    optionally classifying domains, and bucketing the resulting findings into fix-this-week,
    fix-this-quarter, do-not-worry, and parallelisable work. The output is a triage
    document that anchors subsequent planning conversations and ADRs; it is not a
    replacement for deeper investigation, only a fast, evidence-backed first pass.\n"
  source_path: ''
  local_path: _LIBRARY/procedure-legacy-codebase-triage.md
- id: PROCEDURE:migrate-project-guidance-to-spec-kitty-charter
  kind: procedure
  title: Migrate Project Guidance to Spec Kitty Charter
  summary: "Convert an existing project guidance or charter document into doctrine-backed
    governance artifacts that can be compiled into a Spec Kitty charter bundle with
    functional parity.\n"
  source_path: ''
  local_path: 
    _LIBRARY/procedure-migrate-project-guidance-to-spec-kitty-charter.md
- id: PROCEDURE:mission-tracer-files
  kind: procedure
  title: Mission Tracer Files
  summary: "Give every mission a lightweight running log of tooling friction, approach
    evolution, and design rationale through three sparse tracer files. The files are
    seeded at mission start, appended to during implementation, and assessed at mission
    close. Captured friction and rationale feed the next mission's planning and make
    recurring tool and process gaps visible instead of repeatedly re-discovered.\n"
  source_path: ''
  local_path: _LIBRARY/procedure-mission-tracer-files.md
- id: PROCEDURE:mission-wrap-up-sequence
  kind: procedure
  title: Mission Wrap-Up Sequence
  summary: "Drive a mission from \"all work packages approved\" to \"a clean, reviewable
    draft pull request handed to the operator\" through one standing, repeatable close-out
    sequence. The sequence makes the last mile deterministic: it verifies readiness,
    resolves every tracked-issue verdict, subjects the aggregate diff to an independent
    review, lands locally, compacts the branch into readable history, and opens a
    draft PR — so no mission ends in an ad-hoc, unreviewed, or messy state. It complements
    (does not replace) the per-work-package implement/review loop.\n"
  source_path: ''
  local_path: _LIBRARY/procedure-mission-wrap-up-sequence.md
- id: PROCEDURE:post-merge-arch-gate-adjudication
  kind: procedure
  title: Post-Merge Arch-Gate Adjudication
  summary: "After merging one or more lane branches, architectural gate failures may
    appear that were not visible during per-lane review. This procedure distinguishes
    pre-existing failures (present on the mission base branch before any lane work)
    from regressions introduced by the merge. Correct adjudication prevents teams
    from either ignoring real regressions or blocking on failures they did not cause.\n"
  source_path: ''
  local_path: _LIBRARY/procedure-post-merge-arch-gate-adjudication.md
- id: PROCEDURE:refactoring
  kind: procedure
  title: Refactoring
  summary: "Improve internal code structure without changing external behavior. This
    procedure provides a disciplined workflow for identifying improvement opportunities,
    selecting the right refactoring tactic, applying changes in safe increments, and
    verifying behavior preservation throughout.\n"
  source_path: ''
  local_path: _LIBRARY/procedure-refactoring.md
- id: PROCEDURE:situational-assessment
  kind: procedure
  title: Situational Assessment
  summary: "Establish a shared, documented understanding of the context, stakeholders,
    constraints, and problem structure before any solution is designed or selected.
    A situational assessment ensures that architectural decisions are grounded in
    operational reality rather than technology preference, and that the trade-off
    assessments that follow address the right problem.\n"
  source_path: ''
  local_path: _LIBRARY/procedure-situational-assessment.md
- id: PROCEDURE:test-first-bug-fixing
  kind: procedure
  title: Test-First Bug Fixing
  summary: "Resolve software defects by writing a failing test that reproduces the
    issue before modifying any production code. Transforms bug fixing from trial-and-error
    into a systematic, verifiable procedure with built-in regression prevention.\n"
  source_path: ''
  local_path: _LIBRARY/procedure-test-first-bug-fixing.md
